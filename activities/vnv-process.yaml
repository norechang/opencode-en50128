  # ── Deviations and Platform Decisions ────────────────────────────────────────
  deviations:
    - id: "D-01"
      description: >
        Item 23 (SW Integration Verification Report) is assigned to Phase 7, not
        Phase 6. Annex C Table C.1 is the normative basis. This corrects a common
        misreading that places item 23 in Phase 6.
      reference: "Annex C Table C.1"
    - id: "D-02"
      description: >
        Item 20 (SW Component Test Report) is assigned to Phase 5 on this platform,
        not Phase 7. See DELIVERABLES.md Note 5 for rationale.
      reference: "DELIVERABLES.md Note 5"
    - id: "D-03"
      description: >
        Item 4 (SVP) is written by VER, not PM. Item 5 (SVaP) is written by VAL,
        not PM. Items 45–46 (Assessment) are written by ASR, not PM.
      reference: "DELIVERABLES.md; VnV-PROCESS.md Diagram 1 notes"
    - id: "D-04"
      description: >
        Item 27 (Release Note, Phase 7) authorship is unresolved in Annex C
        (footnote 'a' = project-specific). Projects shall designate the Phase 7
        Release Note author explicitly in the SQAP.
      reference: "§7.7.4.12, DELIVERABLES.md Note 3"
    - id: "D-05"
      description: >
        VMGR is a platform-defined role not present in EN 50128:2011 Annex B.
        Its use at SIL 1–4 must be approved by the Safety Authority and
        documented in the SQAP.
      reference: "ORGANIZATION.md Platform Role Notice; §5.1.2.10(e–f)"
    - id: "D-06"
      description: >
        Item † (SW Validation Verification Report) is not assigned an independent
        Annex C item number in the printed standard. It is produced as the output
        of VER's review of VAL reports in Phase 7 Step B2 per §6.3.4.12.
        Subject to Safety Authority confirmation of item numbering.
        A corresponding update to DELIVERABLES.md is required.
      reference: "§6.3.4.12, §6.3.4.13, §6.3.4.14; ISA finding F-01"
    - id: "D-07"
      description: >
        activities/workflow.yaml per_phase_phase7.track_b.sil_34 does not yet
        include the SW Validation Verification Report step (item †). The corrected
        flow is encoded in this file (phase7_corrected_track_b_sil_34). workflow.yaml
        must be updated to reflect this correction.
      reference: "ISA finding F-01; §6.3.4.12"
