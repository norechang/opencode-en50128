  # ── Mandatory Baseline ────────────────────────────────────────────────────────
  # Minimum QUA activities independent of SIL level.
  # These apply at ALL SIL levels (0 through 4) without exception.
  mandatory_baseline:
    note: >
      Below SIL 3-4, the SQAP MAY document a rationale for not applying HR/M+
      techniques, per EN 50128:2011 Section 1 (SIL-appropriate application principle).
      The Safety Authority must accept any downward deviation from HR obligations.
    items:
