# EN 50128 Quality Assurance Process
# Source: tasks/QUALITY_PROCESS.md (ISA PASS), EN 50128:2011
#
# This file is the machine-readable translation of tasks/QUALITY_PROCESS.md.
# tasks/QUALITY_PROCESS.md remains the ISA-reviewed human-readable authority;
# this YAML encodes the same information for direct LLM agent consumption.
#
# Primary consumer: QUA agent.
# Also consumed by: COD (gate-check enforcement), PM (phase coordination).
#
# Upstream documents embedded here (option A — full encoding, no lookup required):
#   WORKFLOW.md  → two-track model, QUA gate positions
#   DELIVERABLES.md → per-item writer/checker; qua_required flags
#
# This file SUPPLEMENTS deliverables.yaml — it does NOT duplicate it.
# Cross-reference by annex_c_item number for QUA-specific fields not present
# in deliverables.yaml (qua_check_type, one_pass_rule, self_cert_conflict).
#
# Normative clauses: §6.5, §6.5.4.3, §6.5.4.5, §6.5.4.10, §6.5.4.11,
#                    §6.5.4.14–17, §7.5.4.10, §9.2.4, Table A.9, Annex C Table C.1

quality_process:
  source_document: "tasks/QUALITY_PROCESS.md (ISA PASS)"
  standard: "EN 50128:2011"
  upstream_documents:
    - "WORKFLOW.md (ISA PASS)"
    - "DELIVERABLES.md (ISA PASS)"
    - "TRACEABILITY.md (ISA PASS)"
    - "ORGANIZATION.md (ISA PASS)"
  clauses:
    - "§6.5"
    - "§6.5.4.3"
    - "§6.5.4.5"
    - "§6.5.4.10"
    - "§6.5.4.11"
    - "§6.5.4.14"
    - "§6.5.4.15"
    - "§6.5.4.16"
    - "§6.5.4.17"
    - "§7.5.4.10"
    - "§9.2.4"
    - "Table A.9"
    - "Annex C Table C.1"

  # ── Key Definitions ───────────────────────────────────────────────────────────
  key_definitions:
    template_compliance_check: >
      QUA reviews a deliverable for format and structure correctness: Document ID
      format, Document Control table, Approvals table, required sections present,
      SIL-appropriate approvers. QUA checks FORMAT — not technical content. Technical
      content review is performed by VER (1st Check column, DELIVERABLES.md) after
      QUA accepts the document.
    one_pass_rule: >
      Applies to VER/VAL reports only. If QUA rejects a VER or VAL report for
      template non-compliance, VER/VAL may resubmit once. If the resubmission also
      fails, PM/COD is notified (process failure — training intervention required).
      Development deliverables allow up to 3 iterations before PM escalates.
    independence: >
      QUA SHALL NOT report to DES, IMP, TST, or Software Manager. QUA reports to
      COD/PM directly. QUA decisions to reject deliverables CANNOT be overridden by
      the development team. At SIL 3-4 QUA MUST be a documented independent function.
      PLATFORM GOVERNANCE POLICY ONLY — EN 50128:2011 does not define a normative QUA
      independence requirement. §6.5.2 is the Input Documents clause only. See
      ORGANIZATION.md Independence Reference Matrix, which records QUA independence
      as "No" at all SIL levels.

  # ── Diagram 1: QUA Tasks Across the V-Model Lifecycle ────────────────────────
  # Per-phase QUA trigger, activities, outputs, and SIL conditions.
  # Phase 8 is encoded explicitly as qua_activity: none with normative rationale.
  # cross_cutting[] encodes activities active throughout all phases.
  phase_activities:

    - phase: 0
      phase_name: "Initialization"
      qua_activity: "none"
      rationale: >
        COD generates system-level documents (S1-S4). QUA is not yet instantiated;
        the SQAP that governs QUA does not yet exist.

    - phase: 1
      phase_name: "Planning"
      clauses: ["§5", "§6.5", "§6.6"]
      trigger: "PM invokes @pm execute-phase 1"
      activities:
        - id: "1A"
          label: "SQAP authorship"
          description: >
            QUA writes the Software Quality Assurance Plan (item 1) under VER
            direction and responsibility (§6.5.4.3, deviation D8). QUA cannot
            2nd-check its own plan (self-certification conflict).
          normative_clause: "§6.5.4.3"
          sil_condition: "all"                  # MANDATORY at all SIL
          deviation: "D8"
          annex_c_item: 1
          self_cert_conflict: true
        - id: "1B"
          label: "Template compliance — all Phase 1 deliverables"
          description: >
            Template compliance check on items 1-5. Item 1 is author-exception
            (QUA authors; VER 1st-checks). Items 4 and 5 are author-exceptions
            where VER/VAL author their own planning documents; QUA still performs
            template compliance on all five.
          annex_c_items: [1, 2, 3, 4, 5]
          note: "Item 4 (SVP) and item 5 (SVaP) are VER/VAL-authored; QUA still checks format."
      outputs:
        - "QUA Review Reports for items 1-5"
      gate_input: "All items QUA-PASS before PM reports Track A complete"

    - phase: 2
      phase_name: "Requirements"
      clauses: ["§7.2"]
      trigger: >
        PM invokes @pm execute-phase 2; REQ+SAF produce SRS; TST produces
        Overall Test Spec; VER produces Requirements VER Report
      activities:
        - id: "2A"
          label: "Template compliance: Item 6 — SRS"
          annex_c_item: 6
          qua_check_type: "template_compliance"
          user_approval_required: true
          user_approval_clause: "§7.2.4.1"
        - id: "2B"
          label: "Template compliance: Item 7 — Overall Software Test Specification"
          annex_c_item: 7
          qua_check_type: "template_compliance"
        - id: "2C"
          label: "Template compliance + 1-Pass: Item 8 — Software Requirements VER Report"
          annex_c_item: 8
          qua_check_type: "template_compliance_one_pass"
          one_pass_rule: true
          note: "QUA checks VER report before VMGR reviews it — SIL 3-4."
        - id: "2D"
          label: "Traceability audit — T1, T2"
          description: >
            VER checks T1-T2 (§6.5.4.14-17); QUA audits traceability completeness
            evidence (mandatory SIL 3-4 per Table A.9 Technique 7). QUA does NOT
            independently re-check traceability links.
          sil_condition: "sil >= 3"
          normative_clause: "§6.5.4.14-17, Table A.9 T7"
          traceability_rules: ["T1", "T2"]
      outputs:
        - "QUA Review Reports for items 6-8"
        - "Traceability Audit Report (SIL 3-4)"

    - phase: 3
      phase_name: "Architecture and Design"
      clauses: ["§7.3"]
      trigger: >
        PM invokes @pm execute-phase 3; DES+SAF produce SAS, SDS, Interface
        Specs, Integration Test Specs; VER produces Architecture VER Report
      activities:
        - id: "3A"
          label: "Template compliance: Item 9 — Software Architecture Specification"
          annex_c_item: 9
          qua_check_type: "template_compliance"
        - id: "3B"
          label: "Template compliance: Item 10 — Software Design Specification"
          annex_c_item: 10
          qua_check_type: "template_compliance"
        - id: "3C"
          label: "Template compliance: Item 11 — Software Interface Specifications"
          annex_c_item: 11
          qua_check_type: "template_compliance"
          note: "Plural form per §7.3.3 item 3."
        - id: "3D"
          label: "Template compliance: Item 12 — Software Integration Test Specification"
          annex_c_item: 12
          qua_check_type: "template_compliance"
        - id: "3E"
          label: "Template compliance: Item 13 — Software/Hardware Integration Test Spec"
          annex_c_item: 13
          qua_check_type: "template_compliance"
        - id: "3F"
          label: "Template compliance + 1-Pass: Item 14 — Architecture and Design VER Report"
          annex_c_item: 14
          qua_check_type: "template_compliance_one_pass"
          one_pass_rule: true
          note: "QUA checks VER report; 1-Pass Rule applies; VMGR reviews after QUA PASS."
        - id: "3G"
          label: "Traceability audit — T3-T5c"
          description: >
            VER checks T3-T5c (§7.3.4.42-7.3.4.43); QUA audits traceability
            completeness evidence (SIL 3-4).
          sil_condition: "sil >= 3"
          normative_clause: "§7.3.4.42-7.3.4.43, Table A.9 T7"
          traceability_rules: ["T3", "T4", "T5a", "T5b", "T5c"]
      outputs:
        - "QUA Review Reports for items 9-14"
        - "Traceability Audit Report (SIL 3-4)"

    - phase: 4
      phase_name: "Component Design"
      clauses: ["§7.4"]
      trigger: >
        PM invokes @pm execute-phase 4; DES produces Component Design Spec;
        TST produces Component Test Spec; VER produces Component Design VER Report
      activities:
        - id: "4A"
          label: "Template compliance: Item 15 — Software Component Design Specification"
          annex_c_item: 15
          qua_check_type: "template_compliance"
        - id: "4B"
          label: "Template compliance: Item 16 — Software Component Test Specification"
          annex_c_item: 16
          qua_check_type: "template_compliance"
        - id: "4C"
          label: "Template compliance + 1-Pass: Item 17 — Component Design VER Report"
          annex_c_item: 17
          qua_check_type: "template_compliance_one_pass"
          one_pass_rule: true
          note: >
            Item 17 has no VAL 2nd check (blank in DELIVERABLES.md); QUA template
            compliance still applies before VER produces and VMGR reviews this report.
        - id: "4D"
          label: "Traceability audit — T6, T11"
          description: >
            VER checks T6, T11 (§7.4.4.13); QUA audits (SIL 3-4).
          sil_condition: "sil >= 3"
          normative_clause: "§7.4.4.13, Table A.9 T7"
          traceability_rules: ["T6", "T11"]
      outputs:
        - "QUA Review Reports for items 15-17"
        - "Traceability Audit Report (SIL 3-4)"

    - phase: 5
      phase_name: "Implementation and Testing"
      clauses: ["§7.5"]
      trigger: >
        PM invokes @pm execute-phase 5; IMP produces source code; TST produces
        Component Test Report; VER produces Source Code VER Report
      activities:
        - id: "5A"
          label: "Template compliance: Item 18 — Software Source Code and Supporting Docs"
          annex_c_item: 18
          qua_check_type: "template_compliance"
          description: >
            QUA checks FORMAT of the source code delivery package (document structure,
            Document ID, required sections). QUA does NOT perform code inspection or
            coding standards checking — that is VER's duty under §7.5.4.10.
        - id: "5B"
          label: "Template compliance + 1-Pass: Item 19 — Source Code VER Report"
          annex_c_item: 19
          qua_check_type: "template_compliance_one_pass"
          one_pass_rule: true
          description: >
            VER performs the actual code review (§7.5.4.10): MISRA C compliance, coding
            standards, cyclomatic complexity, correctness of implementation against SDS.
            VER records findings in item 19. QUA then checks that item 19 is FORMAT-correct
            before VMGR reviews it. 1-Pass Rule applies.
          note: >
            Code review execution (MISRA checking, static analysis, complexity measurement)
            belongs to VER (§7.5.4.10(c)) and IMP+TST — not to QUA.
        - id: "5C"
          label: "Template compliance: Item 20 — Software Component Test Report"
          annex_c_item: 20
          qua_check_type: "template_compliance"
          deviation: "D2"
          note: "Platform deviation D2: Phase 5 (Annex C places in Integration phase)."
        - id: "5D"
          label: "Traceability audit — T7, T12"
          description: >
            QUA audits the EVIDENCE that VER performed traceability checking (T7, T12
            per §7.5.4.10) and that the evidence is recorded and CM-controlled
            (§6.5.4.14-17, Table A.9 T7). QUA does not independently re-check
            traceability links.
          sil_condition: "sil >= 3"
          normative_clause: "§7.5.4.10, §6.5.4.14-17, Table A.9 T7"
          traceability_rules: ["T7", "T12"]
        - id: "5E"
          label: "QA process data recording (Table A.9 T8)"
          description: >
            QUA records QA process data per the SQAP: NCR counts, gate pass/fail rates,
            process audit findings, QUA review outcomes. QUA verifies that measurement
            data required by T8 (coverage reports, defect counts, complexity distributions)
            has been produced by IMP/TST/VER and is placed under CM control.
            QUA does NOT run measurement tools (cppcheck, gcov, lizard) itself — those
            are IMP/TST/VER responsibilities. QUA audits that the evidence exists.
          sil_condition_mandatory: "sil >= 3"   # MANDATORY SIL 3-4
          sil_condition_hr: "sil <= 2"          # HR SIL 0-2
          normative_clause: "Table A.9 T8 (D.12)"
      outputs:
        - "QUA Review Reports for items 18-20"
        - "QA Process Data Record (SIL 3-4, Table A.9 T8)"
        - "Traceability Audit Report (SIL 3-4)"

    - phase: 6
      phase_name: "Integration"
      clauses: ["§7.6"]
      trigger: "PM invokes @pm execute-phase 6; INT+TST produce Integration Test Reports"
      activities:
        - id: "6A"
          label: "Template compliance: Item 21 — Software Integration Test Report"
          annex_c_item: 21
          qua_check_type: "template_compliance"
        - id: "6B"
          label: "Template compliance: Item 22 — Software/Hardware Integration Test Report"
          annex_c_item: 22
          qua_check_type: "template_compliance"
        - id: "6C"
          label: "Traceability audit — T10a, T10b, T12"
          description: >
            VER checks T10a, T10b, T12 (§7.6.4.13); QUA audits (SIL 3-4).
          sil_condition: "sil >= 3"
          normative_clause: "§7.6.4.13, Table A.9 T7"
          traceability_rules: ["T10a", "T10b", "T12"]
      outputs:
        - "QUA Review Reports for items 21-22"
        - "Traceability Audit Report (SIL 3-4)"
      note: >
        Item 23 (Software Integration Verification Report) is produced in Phase 7 per
        Annex C, not Phase 6. QUA checks item 23 in Phase 7.

    - phase: 7
      phase_name: "Validation"
      clauses: ["§7.7"]
      trigger: "PM orchestrates TST (Track A); COD -> VMGR coordinates VER+VAL (Track B)"
      activities:
        track_a:
          - id: "7A"
            label: "Template compliance: Item 24 — Overall Software Test Report"
            annex_c_item: 24
            qua_check_type: "template_compliance"
            track: "A"
            note: "Track A deliverable; QUA checks before PM reports to COD."
        track_b:
          - id: "7B"
            label: "Template compliance + 1-Pass: Item 23 — Software Integration VER Report"
            annex_c_item: 23
            qua_check_type: "template_compliance_one_pass"
            one_pass_rule: true
            track: "B"
            note: >
              Produced by VER; 1-Pass Rule applies; VMGR reviews after QUA PASS.
              Normative production clause §7.6.4.11 (Integration); placed Phase 7 per Annex C.
          - id: "7C"
            label: "Template compliance + 1-Pass: Item 25 — Software Validation Report"
            annex_c_item: 25
            qua_check_type: "template_compliance_one_pass"
            one_pass_rule: true
            track: "B"
            independence_required_sil: [3, 4]
            clause: "§5.1.2.10(f)"
            note: "VAL MUST BE INDEPENDENT SIL 3-4. No 2nd Check — VAL cannot 2nd-check own report."
          - id: "7D"
            label: "Template compliance + 1-Pass: Item 26 — Tools Validation Report"
            annex_c_item: 26
            qua_check_type: "template_compliance_one_pass"
            one_pass_rule: true
            track: "B"
            conditional: true
            sil_recommendation: "HR SIL 1+; R SIL 0"
            note: "Same independence constraint as item 25."
          - id: "7E"
            label: "Template compliance: Item 27 — Release Note"
            annex_c_item: 27
            qua_check_type: "template_compliance"
            track: "B"
            note: >
              Authorship unresolved in Annex C (footnote a). Author per project SQAP.
              See DELIVERABLES.md Note 3 for Annex C numbering ambiguity.
      phase_7_note: >
        This is the only phase where QUA template-checks VAL-authored formal Validation
        Reports. QUA checks FORMAT only; VMGR reviews technical content (SIL 3-4).
      outputs:
        - "QUA Review Reports for items 23-27"
        - "QA Template Compliance Reports (for VER/VAL reports, 1-Pass Rule)"

    - phase: 8
      phase_name: "Assessment"
      clauses: ["§6.4"]
      qua_activity: "none"
      rationale: >
        ASR (Assessor) is fully independent from the project AND supplier
        (§5.1.2.5-5.1.2.7). ASR is not directed by COD, PM, or QUA.
        COD does not coordinate QUA activities during Phase 8.
        Items 45-46 are ASR-authored; VER performs 1st check only; no VAL 2nd check
        and no QUA template compliance step (ASR operates outside the standard
        Track A -> QUA -> PM -> COD chain).
      mandatory:
        sil_levels: [1, 2, 3, 4]
        clause: "§6.4.1.1"
      sil_0_exemption: "§6.4.1.2"

    - phase: 9
      phase_name: "Deployment"
      clauses: ["§9.1"]
      trigger: >
        PM invokes @pm execute-phase 9; PM/DES/CM produce deployment docs;
        VER produces Deployment VER Report
      activities:
        - id: "9A"
          label: "Template compliance: Item 36 — Software Release and Deployment Plan"
          annex_c_item: 36
          qua_check_type: "template_compliance"
        - id: "9B"
          label: "Template compliance: Item 37 — Software Deployment Manual"
          annex_c_item: 37
          qua_check_type: "template_compliance"
          note: "Author per project SQAP (Annex C footnote a)."
        - id: "9C"
          label: "Template compliance: Item 38 — Release Notes"
          annex_c_item: 38
          qua_check_type: "template_compliance"
          note: "Plural — distinct from item 27 (Release Note, Phase 7)."
        - id: "9D"
          label: "Template compliance: Item 39 — Deployment Records"
          annex_c_item: 39
          qua_check_type: "template_compliance"
          note: "Author per project SQAP (Annex C footnote a)."
        - id: "9E"
          label: "Template compliance + 1-Pass: Item 40 — Deployment Verification Report"
          annex_c_item: 40
          qua_check_type: "template_compliance_one_pass"
          one_pass_rule: true
          deviation: "D3"
          note: >
            VER-authored; no VAL 2nd check per Annex C (see deviation D3).
            1-Pass Rule applies to this VER report.
      outputs:
        - "QUA Review Reports for items 36-40"

    - phase: 10
      phase_name: "Maintenance"
      clauses: ["§9.2"]
      trigger: "Each CCB-approved Change Request; PM re-executes affected phases"
      recurring: true
      activities:
        - id: "10A"
          label: "Template compliance: Item 41 — Software Maintenance Plan"
          annex_c_item: 41
          qua_check_type: "template_compliance"
        - id: "10B"
          label: "Template compliance: Item 42 — Software Change Records"
          annex_c_item: 42
          qua_check_type: "template_compliance"
          note: "Annex C typo ('Software Chang Records') — correct name per §9.2.4."
        - id: "10C"
          label: "Template compliance: Item 43 — Software Maintenance Records"
          annex_c_item: 43
          qua_check_type: "template_compliance"
        - id: "10D"
          label: "Template compliance + 1-Pass: Item 44 — Maintenance VER Report"
          annex_c_item: 44
          qua_check_type: "template_compliance_one_pass"
          one_pass_rule: true
          deviation: "D4"
          note: >
            VER-authored; VAL 2nd check is a project addition (deviation D4).
            1-Pass Rule applies on the VER report.
        - id: "10E"
          label: "Process audit — CCB change control procedures"
          description: >
            Verify CCB change control procedures followed per SCMP and §6.6.4.2.
          sil_condition: "sil >= 3"             # MANDATORY SIL 3-4
          normative_clause: "§6.6.4.2"
        - id: "10F"
          label: "Traceability impact audit"
          description: >
            Verify all downstream traceability links re-checked for each CR scope
            (MANDATORY SIL 3-4 per §6.5.4.14-17; continuous traceability obligation
            applicable through maintenance per §9.2.4).
          sil_condition: "sil >= 3"             # MANDATORY SIL 3-4
          normative_clause: "§6.5.4.14-17, §9.2.4"
      outputs:
        - "QUA Review Reports for items 41-44"
        - "Process Audit Report (SIL 3-4)"

  # ── Cross-cutting activities (all phases except Phase 8) ─────────────────────
  cross_cutting:
    - id: "P"
      label: "Process audits"
      frequency:
        sil_34: "Monthly (MANDATORY, Table A.9 Technique 8)"
        sil_2: "Quarterly (HR)"
        sil_01: "Optional"
      sil_condition_mandatory: "sil >= 3"
      normative_clause: "Table A.9 T8"
      outputs:
        - "Process Audit Reports"

    - id: "M"
      label: "Quality metrics collection and trend analysis"
      frequency:
        sil_34: "Per phase (MANDATORY, Table A.9 Technique 8)"
        sil_12: "Per phase (HR)"
        sil_0: "Optional"
      sil_condition_mandatory: "sil >= 3"
      sil_condition_hr: "sil >= 1 and sil <= 2"
      normative_clause: "Table A.9 T8"
      outputs:
        - "Quality Metrics Reports"

    - id: "T"
      label: "Traceability audits"
      description: >
        DISTINCT from VER traceability checking. VER checks technical completeness
        of traceability (§6.5.4.14-17). QUA audits the evidence that VER traceability
        checking was performed, recorded, and baselined under CM control (§6.5.4.15).
      sil_condition_mandatory: "sil >= 3"
      sil_condition_hr: "sil >= 1 and sil <= 2"
      normative_clause: "§6.5.4.15, Table A.9 T7"
      outputs:
        - "Traceability Audit Reports"

    - id: "N"
      label: "Non-conformance management"
      description: >
        QUA logs and tracks NCRs; escalates to PM/COD if unresolved.
        MANDATORY SIL 3-4: recording and trend analysis.
      sil_condition_mandatory: "sil >= 3"
      normative_clause: "§6.5.4.5"
      outputs:
        - "Non-Conformance Reports (NCRs)"

  # ── Diagram 2: QUA Touchpoints on All Annex C Deliverables ───────────────────
  # This section SUPPLEMENTS deliverables.yaml — it does NOT replace it.
  # deliverables.yaml carries the canonical per-item data (writer, doc_id, path, etc.).
  # This section adds QUA-specific fields: qua_check_type, one_pass_rule,
  # self_cert_conflict, deviation.
  #
  # qua_check_type values:
  #   "template_compliance"          — [QUA]       dev deliverable; up to 3 iterations
  #   "template_compliance_one_pass" — [QUA-VER] or [QUA-VAL]; VER/VAL reports; 1-Pass Rule
  #   "none"                         — [—]          QUA has no check (ASR documents only)
  #
  # Phase 8 items (45-46) have qua_check_type: "none" — ASR is fully independent.
  #
  # Section 8 items (28-35) are included for completeness (generic platform / pre-existing
  # software scope only — not applicable to bespoke software development).
  deliverable_touchpoints:

    # ── Phase 1: Planning ──────────────────────────────────────────────────────
    - annex_c_item: 1
      name: "Software Quality Assurance Plan"
      phase: 1
      writer: "qua"
      qua_check_type: "template_compliance"
      self_cert_conflict: true
      self_cert_note: >
        QUA authors under VER direction (§6.5.4.3, deviation D8). VER holds
        normative §6.5.4.3 responsibility; QUA performs authoring.
        QUA cannot 2nd-check its own document (self-certification conflict).
      deviation: "D8"
      first_check: "ver"
      second_check: "val"

    - annex_c_item: 2
      name: "Software QA Verification Report"
      phase: 1
      writer: "ver"
      qua_check_type: "template_compliance_one_pass"
      one_pass_rule: true
      first_check: null
      second_check: "val"
      note: "1-Pass Rule applies. VMGR reviews after QUA PASS (SIL 3-4)."

    - annex_c_item: 3
      name: "Software Configuration Management Plan"
      phase: 1
      writer: "cm"
      qua_check_type: "template_compliance"
      first_check: "ver"
      second_check: "val"

    - annex_c_item: 4
      name: "Software Verification Plan"
      phase: 1
      writer: "ver"
      qua_check_type: "template_compliance_one_pass"
      one_pass_rule: true
      first_check: null
      second_check: "val"
      note: "1-Pass Rule applies. VER authors own planning document (Track A exception)."

    - annex_c_item: 5
      name: "Software Validation Plan"
      phase: 1
      writer: "val"
      qua_check_type: "template_compliance_one_pass"
      one_pass_rule: true
      first_check: "ver"
      second_check: null
      second_check_exempt_reason: "VAL cannot 2nd-check its own document."
      deviation: "D1"
      note: "Platform deviation D1: placed Phase 1 (Annex C places in Phase 2)."

    # ── Phase 2: Requirements ──────────────────────────────────────────────────
    - annex_c_item: 6
      name: "Software Requirements Specification"
