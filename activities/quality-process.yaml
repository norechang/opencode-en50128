  # ── Diagram 3: QUA in the Two-Track Workflow ──────────────────────────────────
  # This section encodes QUA's gate positions and logic within the per-phase
  # execution loop defined in WORKFLOW.md. Agents read this to understand
  # HOW QUA intervenes, not what QUA checks (that is phase_activities[]).
  workflow:

    qua_gate_summary:
      gate_1:
        track: "A"
        position: "Between deliverable production and PM -> COD handoff"
        applies_to: "All development deliverables (every phase except Phase 8)"
      gate_2:
        track: "B"
        position: "Between VER report production and VMGR technical review (SIL 3-4) or COD receipt (SIL 0-2)"
        applies_to: "All VER Verification Reports"
      gate_3:
        track: "B"
        position: "Between VAL report production and VMGR technical review (SIL 3-4)"
        applies_to: "VAL Validation Reports — Phase 7 only"

    blocking_rule: >
      COD CANNOT open a gate-check until QUA has passed ALL deliverables for that phase.

    track_a:
      description: "Development track — PM orchestrates. QUA is a MANDATORY gate between deliverable production and PM->COD handoff."
      sequence:
        - step: 1
          actor: "pm"
          action: "PM orchestrates development agents (REQ, DES, IMP, INT, TST, SAF, CM as applicable)"
        - step: 2
          actor: "dev_agent"
          action: "Deliverable produced"
        - step: 3
          actor: "qua"
          action: "QUA template compliance check"
          checks:
            - "Document ID format correct"
            - "Document Control table present and complete"
            - "Approvals table with SIL-appropriate roles"
            - "All required sections present"
            - "No obvious structural violations"
          qua_does_not_check: "Technical content — that is VER's role"
        - step: 4a
          condition: "FAIL"
          actor: "pm"
          action: "PM notifies author; author fixes; resubmits"
          max_iterations: 3
          on_max_exceeded: "PM escalates (process failure)"
        - step: 4b
          condition: "PASS"
          actor: "pm"
          action: "PM marks deliverable QUA-ACCEPTED in LIFECYCLE_STATE.md"
        - step: 5
          actor: "pm"
          condition: "All phase deliverables QUA-ACCEPTED"
          action: "PM reports Track A complete to COD"

    track_b:
      sil_34:
        description: "Independent V&V track — COD coordinates via VMGR. PM has NO authority over any agent in this track."
        sequence:
          - step: 1
            actor: "cod"
            action: "COD receives Track A complete from PM; requests verification from VMGR"
            note: "No direct COD->VER path at SIL 3-4."
          - step: 2
            actor: "vmgr"
            action: "VMGR assigns VER; VER performs technical verification; VER produces Verification Report"
          - step: 3
            actor: "qua"
            action: "QUA template compliance check — VER report (1-Pass Rule)"
            checks:
              - "Document ID format correct"
              - "Document Control table present"
              - "Approvals table with SIL-appropriate roles (VER, VMGR, COD for SIL 3-4)"
              - "All required sections present"
              - "No obvious formatting violations"
            one_pass_rule: true
          - step: 4a
            condition: "FAIL"
            actor: "ver"
            action: "VER re-issues report (once only)"
            on_second_fail: "Escalate to PM/COD (process failure — VER does not know own template)"
          - step: 4b
            condition: "PASS"
            actor: "vmgr"
            action: "VMGR reviews VER report — technical content"
            vmgr_reject_path: "VER reworks technical content; new report -> QUA re-checks"
            vmgr_approve_path: "Proceed to Phase 7 VAL step (if Phase 7) or COD gate-check"
          - step: 5
            phase_7_only: true
            actor: "vmgr"
            action: "VMGR assigns VAL; VAL performs final validation; VAL produces Validation Reports (items 25, 26)"
          - step: 6
            phase_7_only: true
            actor: "qua"
            action: "QUA template compliance check — VAL report (1-Pass Rule)"
            one_pass_rule: true
            note: "Same format checks as VER report. QUA checks FORMAT; VMGR reviews technical content."
          - step: 7
            phase_7_only: true
            condition: "PASS"
            actor: "vmgr"
            action: "VMGR reviews VAL reports — technical content"
            vmgr_reject_path: "VAL reworks; new report -> QUA re-checks"
            vmgr_approve_path: "VMGR Final V&V Decision (cannot be overridden by COD or PM)"
          - step: 8
            phase_7_only: true
            actor: "vmgr"
            action: "VMGR reports V&V outcome to COD"

      sil_02:
        description: "SIL 0-2: No VMGR. Track A is identical. Track B simplified."
        track_a: "Identical to SIL 3-4 (QUA template checks mandatory at all SIL)."
        track_b: >
          COD invokes VER directly -> VER produces report -> QUA template check
          (1-Pass Rule still applies) -> QUA PASS -> COD receives VER report.
          Phase 7: COD invokes VAL directly -> VAL produces reports -> QUA checks
          -> COD receives reports directly.

    cod_gate_check:
      description: "COD reads QUA-passed and VMGR-approved reports. Gate cannot open until all criteria are met."
      criteria:
        - "All phase deliverables QUA-passed (Track A)"
        - "VER Verification Report QUA-passed and VMGR-approved (Track B, SIL 3-4) OR VER report QUA-passed and received directly (SIL 0-2)"
        - "VAL reports QUA-passed and VMGR-approved (Phase 7 only; SIL 3-4)"
        - "Traceability complete (from VER Verification Report findings)"
        - "Zero critical open defects"
      on_pass: "COD authorizes next phase"
      on_fail: "COD BLOCKS; PM coordinates rework; COD re-runs gate"

  # ── Diagram 4: Table A.9 SIL-Tiered Obligations ───────────────────────────────
  # EN 50128:2011 Table A.9 (Software Quality Assurance Techniques) mapped to
  # lifecycle phases where each technique is exercised.
  # SIL obligation values: M = Mandatory, HR = Highly Recommended, R = Recommended,
  #                        "-" = not applicable this phase
  table_a9_obligations:

    - technique_id: "T1"
      name: "Accredited to EN ISO 9001"
      reference: "§7.1"
      sil_0: "R"
      sil_1: "HR"
      sil_2: "HR"
      sil_3: "HR"
      sil_4: "HR"
      mandatory_floor: false
      lifecycle_trigger: "Phase 0 (project initialization)"
      activity: "Organisation holds EN ISO 9001 accreditation."
      qua_role: "Confirm accreditation certificate exists and is in scope; record in SQAP."
      phases_active: [0]
      outputs:
        - "SQAP (accreditation reference section)"
      note: >
        Accreditation (T1) != compliance (T2). T2 is MANDATORY even if T1 is only HR.
        These are distinct obligations.

    - technique_id: "T2"
      name: "Compliant with EN ISO 9001"
      reference: "§7.1"
      sil_0: "M"
      sil_1: "M"
      sil_2: "M"
      sil_3: "M"
      sil_4: "M"
      mandatory_floor: true             # MANDATORY ALL SIL — no SIL-based waiver
      lifecycle_trigger: "Continuous (all phases)"
      activity: "Quality management system compliant with ISO 9001:2015."
      qua_role: >
        Develop and maintain SQAP (item 1) documenting how quality system complies;
        conduct process audits to verify compliance; report non-conformances.
      phases_active: [1, 2, 3, 4, 5, 6, 7, 9, 10]   # Phase 8 excluded (QUA not active)
      outputs:
        - "SQAP"
        - "Process Audit Reports"
        - "Non-Conformance Reports (NCRs)"
      note: "Phase 1: SQAP written. Phases 2-10: SQAP enforced through audits."

    - technique_id: "T3"
      name: "Compliant with ISO/IEC 90003"
      reference: "§7.1"
      sil_0: "R"
      sil_1: "R"
      sil_2: "R"
      sil_3: "R"
      sil_4: "R"
      mandatory_floor: false
      lifecycle_trigger: "Phase 1 (referenced in SQAP)"
      activity: "Apply ISO/IEC 90003:2014 software engineering guidelines for ISO 9001."
      qua_role: "Note ISO/IEC 90003 applicability in SQAP if adopted; no mandatory audit."
      phases_active: [1]
      note: >
        Recommended only at all SIL. ISO/IEC 90003 provides guidance on applying
        ISO 9001 to software — useful but not required by the standard.

    - technique_id: "T4"
      name: "Company Quality System"
      reference: "§7.1"
      sil_0: "M"
      sil_1: "M"
      sil_2: "M"
      sil_3: "M"
      sil_4: "M"
      mandatory_floor: true             # MANDATORY ALL SIL — no SIL-based waiver
      lifecycle_trigger: "Continuous (all phases)"
      activity: "Organisation has a documented company quality management system."
      qua_role: >
        Reference company QMS in SQAP; verify project practices are consistent
        with company QMS procedures; audit for QMS compliance.
      phases_active: [1, 2, 3, 4, 5, 6, 7, 9, 10]
      outputs:
        - "SQAP (QMS reference section)"
        - "Process Audit Reports"
      note: "Phase 1: SQAP documents QMS reference. Phases 2-10: audited continuously."

    - technique_id: "T5"
      name: "Software Configuration Management"
      reference: "D.48"
      sil_0: "M"
      sil_1: "M"
      sil_2: "M"
      sil_3: "M"
      sil_4: "M"
      mandatory_floor: true             # MANDATORY ALL SIL — no SIL-based waiver
      lifecycle_trigger: "Phase 1 (SCMP produced); continuous thereafter"
      activity: "SCM processes for version control, baselines, change control per §6.6."
      qua_role: >
        Audit CM processes at each phase gate (SIL 3-4); verify:
        - All deliverables placed under CM from first issue (§6.5.4.10)
        - Changes to CM items authorised and recorded (§6.5.4.11)
        - Traceability is under CM control (§6.5.4.15)
        - Baseline integrity maintained between phases
      phases_active: [1, 2, 3, 4, 5, 6, 7, 9, 10]
      outputs:
        - "Process Audit Reports (CM section)"
        - "Non-Conformance Reports (NCRs) for CM violations"
      note: >
        CM is performed by CM agent; QUA audits CM process but does not own it.
        Phase 1: SCMP reviewed. Phases 2-10: CM audited at each gate.

    - technique_id: "T6"
      name: "Checklists"
      reference: "D.7"
      sil_0: "R"
      sil_1: "HR"
      sil_2: "HR"
      sil_3: "HR"
      sil_4: "HR"
      mandatory_floor: false
      lifecycle_trigger: "Each deliverable review; each audit"
      activity: "Structured checklists for reviews, inspections, audits."
      qua_role: >
        Maintain and apply checklists for:
        - Phases 1-4: Document template compliance checklists (Document ID, Document
          Control table, Approvals table, required sections)
        - Phase 5: Template compliance checklists for items 18-20 only.
          Code review checklists covering MISRA C, cyclomatic complexity, defensive
          programming are VER tools under §7.5.4.10 — NOT QUA tools.
        - Phases 5-7: Test report template compliance checklists (format only, not
          test coverage adequacy)
        - All phases: Process audit checklists
      phases_active: [1, 2, 3, 4, 5, 6, 7, 9, 10]
      outputs:
        - "Completed checklists included in QUA Review Reports"

    - technique_id: "T7"
      name: "Traceability"
      reference: "D.58"
      sil_0: "R"
      sil_1: "HR"
      sil_2: "HR"
      sil_3: "M"
      sil_4: "M"
      mandatory_floor: false
      mandatory_floor_sil: 3            # MANDATORY at SIL 3-4; HR at SIL 1-2; R at SIL 0
      lifecycle_trigger: "Each phase gate; mandatory per §6.5.4.14-17"
      activity: "Bi-directional traceability S1->SRS->SAS->SDS->Code->Test (forward and backward)."
      qua_role: >
        QUA audits the EVIDENCE of traceability (that VER checked it and recorded
        findings in the Verification Report; that traceability is under CM control
        per §6.5.4.15). QUA does NOT independently check traceability links (that
        is VER's technical responsibility per §6.5.4.14-17 and TRACEABILITY.md).
      phases_active: [2, 3, 4, 5, 6, 7]
      traceability_rules_by_phase:
        phase_2: ["T1", "T2"]
        phase_3: ["T3", "T4", "T5a", "T5b", "T5c"]
        phase_4: ["T6", "T11"]
        phase_5: ["T7", "T12"]
        phase_6: ["T10a", "T10b"]
        phase_7: ["T8", "T9", "T13"]
      traceability_rule_reference: "TRACEABILITY.md Section 9 (rules T1-T15)"
      outputs:
        - "Traceability Audit Reports (per-phase gate, SIL 3-4)"

    - technique_id: "T8"
      name: "Data Recording and Analysis"
      reference: "D.12"
      sil_0: "HR"
      sil_1: "HR"
      sil_2: "HR"
      sil_3: "M"
      sil_4: "M"
      mandatory_floor: false
      mandatory_floor_sil: 3            # MANDATORY at SIL 3-4; HR at SIL 0-2
      lifecycle_trigger: "Each phase gate (SIL 3-4); periodic (SIL 1-2)"
      activity: "Collect, record, and trend-analyze quality metrics across the lifecycle."
      qua_role: >
        Collect and report metrics at each phase:
        - Phase 2: Requirements count, SIL distribution, complexity
        - Phase 3: Design module count, interface count, coupling metrics
        - Phase 5: SLOC, comment density, cyclomatic complexity distribution,
                   MISRA C violation counts (mandatory/required/advisory),
                   defect density (defects/KLOC)
        - Phases 5-7: Statement coverage %, branch coverage %,
                      condition coverage % (SIL 3-4), test case count,
                      defect detection rate, defect removal efficiency
        - All phases: NCR counts by severity; open vs. closed trends
      phases_active: [1, 2, 3, 4, 5, 6, 7, 9, 10]
      frequency:
        sil_34: "Per phase (MANDATORY)"
        sil_12: "Per phase (HR)"
        sil_0: "Optional"
      outputs:
        - "Quality Metrics Reports (per phase)"
        - "Trend charts in SQAP updates"

