        description: "Produce SQAP"
        normative_clause: "§6.5.4.3"
        note: "'shall be written' — no SIL exemption"
      - id: 2
        description: "Implement quality system compliant with EN ISO 9001"
        technique: "T2"
        sil_obligation: "MANDATORY ALL SIL"
      - id: 3
        description: "Use company quality management system"
        technique: "T4"
        sil_obligation: "MANDATORY ALL SIL"
      - id: 4
        description: "Enforce software configuration management"
        technique: "T5"
        sil_obligation: "MANDATORY ALL SIL"
      - id: 5
        description: "Enforce quality gates — no phase transition without QUA approval"
        note: "COD CANNOT open a gate-check until QUA has passed ALL deliverables."

