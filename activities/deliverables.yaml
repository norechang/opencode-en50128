# EN 50128 Deliverables — Annex C Table C.1
# Source: DELIVERABLES.md (ISA PASS), EN 50128:2011 Annex C
#
# This file encodes all 46 Annex C deliverables with:
#   - Phase assignment (platform lifecycle phases 0–10)
#   - Writer, 1st Check, 2nd Check roles
#   - Document IDs and template paths
#   - SIL recommendation levels
#   - Normative override notes
#   - Platform deviations from Annex C Table C.1 (documented in SQAP)
#
# LLM agents consume this file to:
#   - Determine which documents must be produced in a given phase
#   - Identify the responsible agent (writer) for each document
#   - Check QUA/VER/VAL review chain for each document
#   - Generate document IDs using the DOC-<TYPE>-YYYY-NNN convention

deliverables:
  source_document: "DELIVERABLES.md (ISA PASS)"
  standard: "EN 50128:2011"
  annex_c: "Annex C (informative) — Documents Control Summary"
  note: >
    Annex C Table C.1 is INFORMATIVE, not normative. Normative SIL requirements
    are in the corresponding Section 7.x clauses. See 'normative_overrides' below
    for cases where 'shall' clauses override Annex C's informative HR labels.

  # ── Normative Overrides ───────────────────────────────────────────────────
  normative_overrides:
    - item: 1
      document: "Software Quality Assurance Plan"
      annex_c_level: "HR"
      normative_clause: "§6.5.4.3"
      effective_level: "M (all SIL)"
      override: "§6.5.4.3 'shall' clause overrides HR — mandatory at all SIL levels"
    - item: 3
      document: "Software Configuration Management Plan"
      annex_c_level: "HR"
      normative_clause: "§6.6.4.1"
      effective_level: "M (all SIL)"
      override: "§6.6.4.1 'shall' clause — mandatory at all SIL levels"
    - item: 4
      document: "Software Verification Plan"
      annex_c_level: "HR"
      normative_clause: "§6.2.4.2"
      effective_level: "M (all SIL)"
      override: "§6.2.4.2 'shall' clause — mandatory at all SIL levels"
    - item: 5
      document: "Software Validation Plan"
      annex_c_level: "HR"
      normative_clause: "§6.3.4.2"
      effective_level: "M (all SIL)"
      override: "§6.3.4.2 'shall' clause — mandatory at all SIL levels"

  # ── Platform Deviations from Annex C Table C.1 ────────────────────────────
  # These must be documented in the project SQAP and are subject to Safety Authority review.
  platform_deviations:
    - item: 5
      document: "Software Validation Plan"
      annex_c_phase: "Software requirements"
      platform_phase: 1
      justification: "§6.3.4.3 (SVaP based on input docs) and §5.3.2.4 (planning before lifecycle phase commencement) require early placement"
    - item: 20
      document: "Software Component Test Report"
      annex_c_phase: "Integration"
      platform_phase: 5
      justification: "§7.5.4.5 (normative output clause) and logical prerequisite that integration requires prior unit test completion; Table A.1 associates item 20 with Component Implementation and Testing"
    - item: 40
      document: "Deployment Verification Report"
      annex_c_phase: "Software maintenance (Annex C column)"
      platform_phase: 9
      justification: "§9.1 normative deployment clause and logical dependency that deployment must be verified before maintenance begins"
    - item: 44
      document: "Software Maintenance Verification Report"
      annex_c_phase: "Software assessment (Annex C column)"
      platform_phase: 10
      justification: "§9.2 normative maintenance clause and logical dependency that maintenance activities generate the verification report"

  # ── Document Naming Convention ─────────────────────────────────────────────
  doc_id_convention: "DOC-<ABBREVIATION>-YYYY-NNN"
  doc_id_notes:
    - "EN 50128 uses EXACT document names with precise singular/plural forms"
    - "Example: 'Software Interface Specifications' (plural per §7.3.3 item 3)"
    - "File naming: exact EN 50128 name with hyphens replacing spaces"
    - "Abbreviations like SAS, SDS NOT recommended — use exact names"

  # ── Full Annex C Catalogue ────────────────────────────────────────────────
  # Phase numbers reference platform lifecycle phases (LIFECYCLE.md).
  # SIL columns use Annex C values; normative_overrides above may supersede.
