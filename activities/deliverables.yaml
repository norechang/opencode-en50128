      abbreviation: "SQAP"
      doc_id_example: "DOC-SQAP-2026-001"
      written_by: "qua"                   # §6.5.4.3 — written under QUA responsibility
      first_check: "ver"
      second_check: "val"
      template: "planning/Software-Quality-Assurance-Plan.yaml"
      sil_0: "HR"                         # Normative override: M (§6.5.4.3)
      sil_14: "HR"                        # Normative override: M (§6.5.4.3)
      normative_override: "M — §6.5.4.3 'shall' clause mandatory at all SIL levels"
      notes: "Annex C 'Written by' column is blank for item 1; QUA is responsible per §6.5.4.3"

    - annex_c_item: 2
