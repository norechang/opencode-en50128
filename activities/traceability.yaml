  # ── Section 12: Platform Deviations from Annex C Table C.1 ──────────────────
  # All deviations from the informative Annex C Table C.1 phase-column assignments
  # or authorship assignments. Each MUST be documented in the project SQAP and is
  # subject to Safety Authority review.
  # D1–D4 are also encoded in deliverables.yaml (platform_deviations); this file
  # extends with D5–D9 for completeness of the traceability record.
  platform_deviations:
    - id: "D1"
      annex_c_item: 5
      document_name: "Software Validation Plan"
      annex_c_position: "Requirements phase (Phase 2)"
      platform_assignment: "Phase 1: Planning"
      normative_justification: >
        §6.3.4.3 ("written on the basis of input documents" — system docs available
        at project start); §5.3.2.4 ("plans shall be drawn up at the start of the
        project"). Validation planning must precede requirements elaboration to
        establish acceptance criteria.

    - id: "D2"
      annex_c_item: 20
      document_name: "Software Component Test Report"
      annex_c_position: "Integration phase (Phase 6)"
      platform_assignment: "Phase 5: Implementation and Testing"
      normative_justification: >
        §7.5.4.5 normative production clause ("A Software Component Test Report
        shall be written"). Integration testing presupposes prior unit-test
        completion. The Annex C placement in the "Integration" phase column is
        an internal inconsistency in the standard (cf. Table A.1 which associates
        this document with "Component Implementation and Testing").

    - id: "D3"
      annex_c_item: 40
      document_name: "Deployment Verification Report"
      annex_c_position: "Maintenance phase (Phase 10)"
      platform_assignment: "Phase 9: Deployment"
      normative_justification: >
        §9.1 (normative deployment clause) — deployment must be verified before
        maintenance begins.

    - id: "D4"
      annex_c_item: 44
      document_name: "Software Maintenance Verification Report"
      annex_c_position: "Assessment phase (Phase 8)"
      platform_assignment: "Phase 10: Maintenance"
      normative_justification: >
        §9.2 (normative maintenance clause) — maintenance activities generate
        the verification report.

    - id: "D5"
      annex_c_item: 23
      document_name: "Software Integration Verification Report"
      annex_c_position: "Phase 7 per informative Annex C Table C.1"
      platform_assignment: "Phase 7: consistent with informative Annex C"
      normative_justification: >
        Normative production clause is §7.6.4.11 (Integration phase); platform
        places it in Phase 7 consistent with informative Annex C Table C.1.
        The normative vs. informative tension must be noted. Assessors SHALL
        apply §7.6.4.11 requirements (not §7.7) to this document's content.

    - id: "D6"
      annex_c_item: 19
      document_name: "Software Source Code Verification Report"
      annex_c_position: "2nd Check: blank per Annex C Table C.1"
      platform_assignment: "2nd Check: blank (consistent with Annex C)"
      normative_justification: >
        Platform default is blank, consistent with Annex C. If the project SQAP
        assigns VAL as 2nd check, this constitutes a project addition beyond Annex C
        requirements; it must be explicitly stated in the SQAP.

    - id: "D7"
      annex_c_item: 44
      document_name: "Software Maintenance Verification Report"
      annex_c_position: "2nd Check: per Annex C Table C.1"
      platform_assignment: "2nd Check (VAL) assigned in this platform"
      normative_justification: >
        2nd Check (VAL) assigned in this platform. Verify against printed Annex C
        Table C.1. If the printed standard shows blank, document as a deliberate
        project addition in the SQAP.

    - id: "D8"
      annex_c_item: 1
      document_name: "Software Quality Assurance Plan"
      annex_c_position: "Written by: blank (Annex C); §6.5.4.3: under responsibility of Verifier"
      platform_assignment: "QUA authors under VER direction and responsibility"
      normative_justification: >
        The SQAP must document this role split: VER holds normative §6.5.4.3
        responsibility; QUA may perform the authoring.

    - id: "D9"
      annex_c_item: 13
      document_name: "Software/Hardware Integration Test Specification"
      annex_c_position: >
        §7.3.4.33 requires a "System Design Description" as normative input.
      platform_assignment: >
        This platform has no standalone "System Design Description" document.
        The term is mapped to S1 (System Requirements Specification) + S2
        (System Architecture Description) as joint inputs.
        normative_justification: >
          See Section 11 doc 13 and Phase 0 note in TRACEABILITY.md Diagram 2.
          The SQAP must document this mapping and the Safety Authority must confirm
          it is adequate for the project context.

  # ── Section 14: Traceability Evidence Workflow Guidance ─────────────────────
  # Official workflow per Option B decision (2026-04-03): manual CSV creation
  # by Configuration Manager. This section provides machine-consumable guidance
  # for agents (CM, PM, VER) on the per-phase workflow.
  workflow_guidance:
    official_method: "manual_csv_creation"
    experimental_methods: ["trace_extract"]
    description: >
      The official EN 50128 traceability workflow for this platform uses manual
      CSV creation by the Configuration Manager (CM). CM reads deliverables
      produced by document authors and extracts trace relationships into CSV
      files using the canonical naming convention doc{source}_to_doc{target}.csv.
      The `trace extract` tool is marked as OPTIONAL/EXPERIMENTAL and is not
      required for compliance.
    
    cm_responsibilities:
      - responsibility: "Create traceability CSV files"
        when: "After document authors complete deliverables"
        how: "Read documents; extract trace relationships; write CSV files using Write tool"
      - responsibility: "Validate CSV completeness"
        when: "Before submitting to VER"
        command: "trace validate --phase {phase} --sil {sil}"
      - responsibility: "Pre-gate check"
        when: "Before COD gate"
        command: "trace gate-check --phase {phase} --sil {sil}"
      - responsibility: "Update baselines"
        when: "After COD gate PASS"
        how: "Tag CSV files in git with phase baseline"
      - responsibility: "Re-trace after CCB changes"
        when: "After approved Change Request"
        how: "Update affected CSV files; re-validate"
    
    per_phase_csv_files:
      phase_2_requirements:
        expected_files: 2
        files:
          - "doc6_to_docS1.csv"
          - "doc6_to_docS2.csv"
        traceability_rules: ["T1", "T2"]
      
      phase_3_architecture_design:
        expected_files: 13-14
        files:
          - "doc9_to_doc6.csv"
          - "doc10_to_doc9.csv"
          - "doc10_to_doc6.csv"
          - "doc10_to_doc11.csv"
          - "doc12_to_doc6.csv"
          - "doc12_to_doc9.csv"
          - "doc12_to_doc10.csv"
          - "doc12_to_doc11.csv"
          - "doc13_to_docS1.csv"
          - "doc13_to_docS2.csv"
          - "doc13_to_doc6.csv"
          - "doc13_to_doc9.csv"
          - "doc13_to_doc10.csv"
        traceability_rules: ["T3", "T4", "T5a", "T5b", "T5c", "T10a", "T10b"]
      
      phase_4_component_design:
        expected_files: 2
        files:
          - "doc15_to_doc10.csv"
          - "doc16_to_doc15.csv"
        traceability_rules: ["T6", "T11"]
      
      phase_5_implementation_testing:
        expected_files: 3
        files:
          - "doc18_to_doc15.csv"
          - "doc20_to_doc16.csv"
          - "doc20_to_doc18.csv"
        traceability_rules: ["T7", "T12"]
      
      phase_6_integration:
        expected_files: 4
        files:
          - "doc21_to_doc12.csv"
          - "doc21_to_doc18.csv"
          - "doc22_to_doc13.csv"
          - "doc22_to_doc18.csv"
        traceability_rules: ["T12"]
      
      phase_7_validation:
        expected_files: 3
        files:
          - "doc24_to_doc7.csv"
          - "doc25_to_doc24.csv"
          - "doc25_to_doc6.csv"
        traceability_rules: ["T12", "T13"]
    
    mandatory_tools:
      - tool: "trace validate"
        purpose: "Validate CSV completeness and SIL thresholds"
        required_for: "SIL 3-4 compliance"
      - tool: "trace gate-check"
        purpose: "Per-phase gate validation with rule checking (T1-T15)"
        required_for: "All phases"
    
    optional_tools:
      - tool: "trace extract"
        purpose: "Auto-extraction using proximity heuristics"
        status: "OPTIONAL/EXPERIMENTAL"
        warning: "May produce incorrect semantic mappings"
      - tool: "trace sync"
        purpose: "Synchronize CSV ↔ JSON ↔ Markdown formats"
        status: "OPTIONAL"
    
    references:
      - "TRACEABILITY.md Section 13"
      - ".opencode/skills/en50128-configuration/SKILL.md Section 3.4"
      - "tools/README_TRACEABILITY.md"
