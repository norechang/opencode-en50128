# EN 50128 Deliverable Traceability
# Source: TRACEABILITY.md v1.3 (ISA PASS — UNCONDITIONAL), EN 50128:2011
#
# This file encodes the complete traceability structure from TRACEABILITY.md in
# machine-consumable form. LLM agents (COD, VER, VMGR) consume this file to:
#   - Verify forward and backward traceability chains at phase gates
#   - Identify normative traceability obligations (T1–T15) per clause
#   - Determine system-level inputs and their software-level targets
#   - Apply the correct role independence rules when assigning review authority
#   - Assess CCB change request impact on open traceability links
#   - Look up platform deviations from Annex C Table C.1 (D1–D9)
#
# ASCII diagrams (V-Model, traceability chain, authorship table) are in
# TRACEABILITY.md — they are human-readable aids only and are not encoded here.
# This file encodes only the structured data behind those diagrams.
#
# Cross-file references:
#   deliverables.yaml    → by annex_c_item number (catalogue, writer/checker, SIL)
#   lifecycle.yaml       → by phase id (phase sequence, FSM transitions)
#   workflow.yaml        → authority structure, CCB re-entry loop
#   organization.yaml    → full role independence matrix

traceability:
  source_document: "TRACEABILITY.md v1.3 (ISA PASS — UNCONDITIONAL)"
  standard: "EN 50128:2011"
  version: "1.3"
  date: "2026-03-23"
  references:
    - "LIFECYCLE.md"
    - "DELIVERABLES.md"
    - "WORKFLOW.md"
    - "AGENTS.md"
  description: >
    Complete traceability of deliverables across all lifecycle phases (Phase 0–10),
    including system-level input documents, responsible roles, V&V correspondences,
    and inter-document traceability chains. Traceability is bidirectional per
    §5.3.2.7: for each document, traceability shall be provided in terms of a
    unique reference number and a defined and documented relationship with other
    documents. Traceability is enforced at every COD phase gate check.

  # ── Section 6: System-Level to Software-Level Traceability ──────────────────
  # System-level documents (Phase 0) are mandatory inputs to Phase 2 per §7.2.2.
  # S2 (System Architecture Description) is a §7.2.2 input to the Requirements
  # phase (informing the SRS); the SRS is then the sole normative input to the
  # Architecture phase per §7.3.2 and §7.3.4.1. S2 is NOT a §7.3.2 normative
  # input to the SAS — it is contextual/informative only.
  # S1 + S2 together constitute the "System Design Description" referenced in
  # §7.3.4.33. No separate System Design Description document is produced in
  # this platform; this mapping must be confirmed in the project SQAP (see D9).
  system_inputs:
    - doc_id: "S1"
      document_name: "System Requirements Specification"
      phase: 0
      primary_software_targets:
        - annex_c_item: 6
          document_name: "Software Requirements Specification"
          relationship: "System requirements allocated to software"
          normative_clause: "§7.2.2"
      notes: >
        Mandatory input to Phase 2. S1 + S2 together constitute the
        "System Design Description" per §7.3.4.33 (see D9).

    - doc_id: "S2"
      document_name: "System Architecture Description"
      phase: 0
      primary_software_targets:
        - annex_c_item: 6
          document_name: "Software Requirements Specification"
          relationship: "§7.2.2 input to Requirements phase — informs SRS"
          normative_clause: "§7.2.2"
        - annex_c_item: 9
          document_name: "Software Architecture Specification"
          relationship: "Informative/contextual input only — NOT a §7.3.2 normative input"
          normative_clause: "§7.3.4.1 (SAS normative basis is SRS only)"
      notes: >
        S2 is a §7.2.2 input to the Requirements phase. The SRS is then the
        sole normative input to the Architecture phase per §7.3.2 and §7.3.4.1.
        S2 is NOT a §7.3.2 normative input to the SAS. S1 + S2 together
        constitute the "System Design Description" per §7.3.4.33 (see D9).

    - doc_id: "S3"
      document_name: "System Safety Plan"
      phase: 0
      primary_software_targets:
        - annex_c_item: 1
          document_name: "Software Quality Assurance Plan"
          relationship: "Feeds SQAP safety planning"
          normative_clause: "§6.5.4.3"
        - annex_c_item: 4
          document_name: "Software Verification Plan"
          relationship: "Feeds SVP"
          normative_clause: "§6.2.4.2"
        - annex_c_item: 5
          document_name: "Software Validation Plan"
          relationship: "Feeds SVaP"
          normative_clause: "§6.3.4.2, §6.3.4.3"

    - doc_id: "S4"
      document_name: "System Safety Requirements Specification"
      phase: 0
      primary_software_targets:
        - annex_c_item: 6
          document_name: "Software Requirements Specification"
          relationship: "Safety requirements allocated to software"
          normative_clause: "§7.2.2"
        - annex_c_item: 1
          document_name: "Software Quality Assurance Plan"
          relationship: "Feeds SQAP"
          normative_clause: "§6.5.4.3"

  # ── Section 5: V-Model Specification-to-Report Correspondence ───────────────
  # Every specification document on the V-Model left side has a corresponding
  # test/verification report on the right side. Also encoded in deliverables.yaml
  # (v_model_correspondence); included here for standalone agent use.
  v_model_correspondence:
    - specification_doc: "Overall Software Test Specification"
      spec_annex_c_item: 7
      spec_phase: 2
      spec_phase_name: "Requirements"
      report_doc: "Overall Software Test Report"
      report_annex_c_item: 24
      report_phase: 7
      report_phase_name: "Validation"

    - specification_doc: "Software Integration Test Specification"
      spec_annex_c_item: 12
      spec_phase: 3
      spec_phase_name: "Architecture and Design"
      report_doc: "Software Integration Test Report"
      report_annex_c_item: 21
      report_phase: 6
      report_phase_name: "Integration"

    - specification_doc: "Software/Hardware Integration Test Specification"
      spec_annex_c_item: 13
      spec_phase: 3
      spec_phase_name: "Architecture and Design"
      report_doc: "Software/Hardware Integration Test Report"
      report_annex_c_item: 22
      report_phase: 6
      report_phase_name: "Integration"

    - specification_doc: "Software Component Test Specification"
      spec_annex_c_item: 16
      spec_phase: 4
      spec_phase_name: "Component Design"
      report_doc: "Software Component Test Report"
      report_annex_c_item: 20
      report_phase: 5
      report_phase_name: "Implementation and Testing"

  # ── Section 7: Phase Gate Enforcement (COD) ──────────────────────────────────
  # VER performs traceability completeness checking at each phase per the
  # per-phase VER clauses and records findings in the Verification Report.
  # COD reads VER's Verification Report and blocks the gate if gaps are found.
  # VER does NOT report to COD; at SIL 3–4, VMGR coordinates VER and communicates
  # V&V outcomes to COD without hierarchical subordination (§5.1.2.10f).
  gate_enforcement:
    description: >
      VER performs traceability completeness checking at each phase (per per-phase
      clauses below) and records findings in the Verification Report. COD reads
      VER's Verification Report and enforces the gate: COD blocks phase progression
      if VER reports traceability gaps. COD does not perform traceability checking
      itself. At SIL 3–4, VMGR coordinates VER and communicates V&V outcomes to
      COD without hierarchical subordination (§5.1.2.10f — VMGR is independent
      from COD and PM).
    traceability_checks_at_every_gate:
      - check: "Forward: all requirements traced to design/code/test"
        owner: "VER"
      - check: "Backward: all tests traced to requirements"
        owner: "VER"
      - check: "V&V reports reference correct deliverable baselines"
        owner: "VER"
      - check: "All 1st and 2nd checks completed per Annex C Table C.1"
        owner: "VER"
      - check: "Traceability subject to configuration management"
        owner: "CM"
        normative_clause: "§6.5.4.15"
      - check: "Gate blocked if VER Verification Report records gaps"
        owner: "COD"
    ver_traceability_clauses_by_phase:
      - phase: 1
        phase_name: "Planning"
        normative_clause: "§6.2.4.11(a)"
      - phase: 2
        phase_name: "Requirements"
        normative_clause: "§7.2.4.22(b)"
      - phase: 3
        phase_name: "Architecture and Design"
        normative_clause: "§7.3.4.42(c–e), §7.3.4.43(a–b)"
      - phase: 4
        phase_name: "Component Design"
        normative_clause: "§7.4.4.13(b,d)"
      - phase: 5
        phase_name: "Implementation and Testing"
        normative_clause: "§7.5.4.10(d)"
      - phase: 6
        phase_name: "Integration"
        normative_clause: "§7.6.4.13(b,d)"
    gate_commands:
      - phase: 1
        phase_name: "Planning"
        command: "@cod gate-check planning"
      - phase: 2
        phase_name: "Requirements"
        command: "@cod gate-check requirements"
      - phase: 3
        phase_name: "Architecture and Design"
        command: "@cod gate-check design"
      - phase: 4
        phase_name: "Component Design"
        command: "@cod gate-check component-design"
      - phase: 5
        phase_name: "Implementation and Testing"
        command: "@cod gate-check implementation-testing"
      - phase: 6
        phase_name: "Integration"
        command: "@cod gate-check integration"
      - phase: 7
        phase_name: "Validation"
        command: "@cod gate-check validation"
      - phase: 8
        phase_name: "Assessment"
        command: "@cod gate-check assessment"
      - phase: 9
        phase_name: "Deployment"
        command: "@cod gate-check deployment"

  # ── Section 8: Role Independence Reference ───────────────────────────────────
  # Independence requirements directly affect traceability review authority —
  # who may perform the 1st and 2nd checks on each deliverable.
  role_independence:
    note: >
      Assessment (ASR) is mandatory for SIL 1 through SIL 4 per §6.4.1.1.
      The SIL 0 exemption under §6.4.1.2 applies only where an EN ISO 9001
      certificate is held. SIL 1 is NOT exempt.
    roles:
      - role: "VER"
        role_name: "Verifier"
        sil_0: "Not required"
        sil_1: "Not required"
        sil_2: "HR"
        sil_34: "Mandatory"
        sil_34_clause: "§5.1.2.10e"
        traceability_impact: >
          Must be independent from authors of all documents VER checks.

      - role: "VAL"
        role_name: "Validator"
        sil_0: "Not required"
        sil_1: "Not required"
        sil_2: "HR"
        sil_34: "Mandatory"
        sil_34_clause: "§5.1.2.10f"
        traceability_impact: >
          Must be independent from all development roles.

      - role: "ASR"
        role_name: "Assessor"
        sil_0: "Exempt"
        sil_0_clause: "§6.4.1.2 (ISO 9001 cert required for exemption)"
        sil_1: "Mandatory"
        sil_1_clause: "§6.4.1.1"
        sil_2: "Mandatory"
        sil_2_clause: "§6.4.1.1"
        sil_34: "Mandatory"
        sil_34_clause: "§6.4.1.1"
        traceability_impact: >
          Must be independent from project AND supplier (§5.1.2.5–5.1.2.7).

      - role: "VMGR"
        role_name: "V&V Manager"
        sil_0: "N/A"
        sil_1: "N/A"
        sil_2: "N/A"
        sil_34: "Mandatory"
        traceability_impact: >
          Independent from COD and PM (§5.1.2.10f). Manages VER team. Provides
          final V&V approval. Communicates outcomes to COD without hierarchical
          subordination.

  prohibited_combinations:
    note: "Applies at SIL 3–4; compromises traceability review independence."
    combinations:
      - combination: "Designer/Implementer + Verifier"
        reason: "Cannot verify own work"
      - combination: "Any development role + Validator"
        reason: "VAL must be independent"
      - combination: "Any project role + Assessor"
        reason: "ASR must be independent from project"
      - combination: "Implementer + Tester (own code)"
        reason: "Cannot test own implementation"

  # ── Section 9: Normative Traceability Rules ──────────────────────────────────
  # Rules T1–T15: normatively required by EN 50128:2011.
  # document_chain uses doc numbers (S1, S2, S3, S4 for system docs;
  # integers for Annex C item numbers).
  # COD SHALL verify all applicable rules at each phase gate.
  traceability_rules:
    - id: "T1"
      rule: >
        All system requirements (S1) allocated to software must trace to
        SRS entries.
      scope: "S1 → [6]"
      document_chain:
        from: ["S1"]
        to: ["6"]
      normative_clause: "§7.2.2"

    - id: "T2"
      rule: >
        All safety requirements (S4) must trace to identified safety
        requirements in SRS.
      scope: "S4 → [6]"
      document_chain:
        from: ["S4"]
        to: ["6"]
      normative_clause: "§7.2.2"

    - id: "T3"
      rule: >
        All SRS requirements must trace to at least one architecture element
        in SAS.
      scope: "[6] → [9]"
      document_chain:
        from: ["6"]
        to: ["9"]
      normative_clause: "§7.3.4.2, §7.3.4.3"

    - id: "T4"
      rule: >
        All architecture elements in SAS must trace to SRS requirements.
      scope: "[9] → [6]"
      document_chain:
        from: ["9"]
        to: ["6"]
      normative_clause: "§7.3.4.2, §7.3.4.5"

    - id: "T5a"
      rule: >
        All SDS design elements must trace to SAS architecture decisions.
      scope: "[10] → [9]"
      document_chain:
        from: ["10"]
        to: ["9"]
      normative_clause: "§7.3.4.20"

    - id: "T5b"
      rule: >
        All SDS design elements must trace to SRS requirements.
      scope: "[10] → [6]"
      document_chain:
        from: ["10"]
        to: ["6"]
      normative_clause: "§7.3.4.20"

    - id: "T5c"
      rule: >
        All SDS design elements must trace to Software Interface
        Specifications.
      scope: "[10] → [11]"
      document_chain:
        from: ["10"]
        to: ["11"]
      normative_clause: "§7.3.4.20"

    - id: "T6"
      rule: >
        All component design elements must trace to SDS.
      scope: "[15] → [10]"
      document_chain:
        from: ["15"]
        to: ["10"]
      normative_clause: "§7.4.4.1"

    - id: "T7"
      rule: >
        All source code modules must trace to component design
        specifications.
      scope: "[18] → [15]"
      document_chain:
        from: ["18"]
        to: ["15"]
      normative_clause: "§7.5.4.1"

    - id: "T8"
      rule: >
        All test cases in Overall SW Test Spec must trace to SRS
        requirements.
      scope: "[7] → [6]"
      document_chain:
        from: ["7"]
        to: ["6"]
      normative_clause: "§7.2.4.16, §7.2.4.19"

    - id: "T9"
      rule: >
        Every SRS requirement must have at least one test case in Overall
        SW Test Spec.
      scope: "[6] → [7]"
      document_chain:
        from: ["6"]
        to: ["7"]
      normative_clause: "§7.2.4.19"

    - id: "T10a"
      rule: >
        SW Integration Test Spec test cases must trace to SRS, SAS, SDS,
        and Interface Specifications.
      scope: "[12] → [6],[9],[10],[11]"
      document_chain:
        from: ["12"]
        to: ["6", "9", "10", "11"]
      normative_clause: "§7.3.4.29"

    - id: "T10b"
      rule: >
        SW/HW Integration Test Spec test cases must trace to System Design
        Description (mapped to S1+S2 — see Phase 0 note in TRACEABILITY.md
        Diagram 2 and deviation D9), SRS, SAS, and SDS.
      scope: "[13] → S1+S2 (≡ System Design Description per §7.3.4.33 — see D9),[6],[9],[10]"
      document_chain:
        from: ["13"]
        to: ["S1", "S2", "6", "9", "10"]
      system_design_description_mapping: >
        §7.3.4.33 requires a "System Design Description" as normative input.
        This platform maps that term to S1 (System Requirements Specification)
        + S2 (System Architecture Description). SQAP must document this mapping;
        Safety Authority must confirm. See platform deviation D9.
      normative_clause: "§7.3.4.33"

    - id: "T11"
      rule: >
        All component test cases must trace to component design
        specifications.
      scope: "[16] → [15]"
      document_chain:
        from: ["16"]
        to: ["15"]
      normative_clause: "§7.4.4.7"

    - id: "T12"
      rule: >
        All test reports must reference specific test specification items.
      scope: "[20],[21],[22],[24] → [16],[12],[13],[7]"
      document_chain:
        from: ["20", "21", "22", "24"]
        to: ["16", "12", "13", "7"]
      per_report_clauses:
        - report_annex_c_item: 20
          normative_clause: "§7.5.4.5"
        - report_annex_c_item: 21
          normative_clause: "§7.6.4.3"
        - report_annex_c_item: 22
          normative_clause: "§7.6.4.7"
        - report_annex_c_item: 24
          normative_clause: "§7.7.4.1"
      normative_clause: "§7.5.4.5, §7.6.4.3, §7.6.4.7, §7.7.4.1"

    - id: "T13"
      rule: >
        Validation Report must confirm all SRS requirements are validated.
      scope: "[25] → [6]"
      document_chain:
        from: ["25"]
        to: ["6"]
      normative_clause: "§7.7.4.8(b)"

    - id: "T14"
      rule: >
        Traceability is mandatory SIL 3-4; recommended SIL 0-2.
        100% requirement coverage required at SIL 3-4.
      scope: "All documents"
      document_chain:
        from: ["all"]
        to: ["all"]
      sil_conditions:
        sil_34: "Mandatory — 100% coverage"
        sil_02: "Recommended"
      normative_clause: "§7.2, Table A.2"

    - id: "T15"
      rule: >
        VER checks traceability completeness at each phase gate (per per-phase
        clauses §6.2.4.11(a), §7.2.4.22(b), §7.3.4.42(c–e)/§7.3.4.43(a–b),
        §7.4.4.13(b,d), §7.5.4.10(d), §7.6.4.13(b,d)) and records findings in
        the Verification Report. COD reads VER's report and blocks phase
        progression if gaps are reported.
      scope: "All gates"
      document_chain:
        from: ["all"]
        to: ["all"]
      normative_clause: "§6.2.4.11(a), §7.2.4.22(b), §7.3.4.42(c–e), §7.3.4.43(a–b), §7.4.4.13(b,d), §7.5.4.10(d), §7.6.4.13(b,d) (VER checking); §5.3.2.7 (COD enforcement)"

  # ── Section 10: CCB Change Request Re-entry Traceability Impact ──────────────
  # When a Change Request (CR) is approved by the CCB, all affected deliverables
  # must be re-traced. COD marks impacted phases as "re-entry-required" and all
  # downstream traceability links must be re-verified.
  # At SIL 3-4, all re-entries must be authorized by CCB per §9.2.4.2. COD
  # blocks phase progression until CCB authorization is documented.
  ccb_reentry_impact:
    note: >
      At SIL 3-4, all re-entries must be authorized by CCB per §9.2.4.2.
      VER re-checks traceability completeness for all affected phases; COD
      re-runs the gate check and blocks progression until VER's updated
      Verification Report confirms gaps are resolved and CCB authorization
      is documented.
    impacts:
      - cr_scope: "System requirements (S1/S4)"
        earliest_reentry_phase: 2
        earliest_reentry_phase_name: "Requirements"
        affected_traceability_rules: ["T1", "T2", "T3", "T4", "T5a", "T5b", "T5c",
                                      "T6", "T7", "T8", "T9", "T10a", "T10b",
                                      "T11", "T12", "T13", "T14", "T15"]
        note: "All rules (T1–T15)"

      - cr_scope: "Software requirements"
        earliest_reentry_phase: 2
        earliest_reentry_phase_name: "Requirements"
        affected_traceability_rules: ["T3", "T4", "T5a", "T5b", "T5c",
                                      "T6", "T7", "T8", "T9", "T10a", "T10b",
                                      "T11", "T12", "T13", "T14", "T15"]
        note: "T3–T15"

      - cr_scope: "Architecture/Design"
        earliest_reentry_phase: 3
        earliest_reentry_phase_name: "Architecture and Design"
        affected_traceability_rules: ["T5a", "T5b", "T5c", "T6", "T7",
                                      "T10a", "T10b", "T11", "T12",
                                      "T14", "T15"]
        note: "T5a–T5c, T6–T7, T10a, T10b, T11–T12, T14–T15"

      - cr_scope: "Component Design"
        earliest_reentry_phase: 4
        earliest_reentry_phase_name: "Component Design"
        affected_traceability_rules: ["T6", "T7", "T11", "T12", "T14", "T15"]
        note: "T6–T7, T11–T12, T14–T15"

      - cr_scope: "Source code / unit tests"
        earliest_reentry_phase: 5
        earliest_reentry_phase_name: "Implementation and Testing"
        affected_traceability_rules: ["T7", "T11", "T12", "T14", "T15"]
        note: "T7, T11–T12, T14–T15"

      - cr_scope: "Integration"
        earliest_reentry_phase: 6
        earliest_reentry_phase_name: "Integration"
        affected_traceability_rules: ["T10a", "T10b", "T11", "T12", "T13",
                                      "T14", "T15"]
        note: "T10a, T10b, T11–T13, T14–T15"

  # ── Section 11: Document Traceability Matrix ──────────────────────────────────
  # Complete forward (traces_to) and backward (traces_from) traceability for
  # all 46 Annex C deliverables plus Phase 0 system documents.
  # doc_number uses S1–S4 for system docs; integers (as strings) for Annex C items.
  # "COD gate" means the document is consumed as gate evidence by COD.
  document_matrix:
    # ── Phase 0: System-Level Inputs ──────────────────────────────────────────
    - doc_number: "S1"
      document_name: "System Requirements Specification"
      phase: 0
      traces_from: ["Customer/System"]
      traces_to: ["6"]

    - doc_number: "S2"
      document_name: "System Architecture Description"
      phase: 0
      traces_from: ["Customer/System"]
      traces_to_normative: ["6"]
      traces_to_informative: ["9"]
      notes: >
        S2 → [6] SRS is normative (§7.2.2). S2 → [9] SAS is informative/contextual
        only (not §7.3.2 normative). S1 + S2 together constitute the
        "System Design Description" per §7.3.4.33 — see D9.

    - doc_number: "S3"
      document_name: "System Safety Plan"
      phase: 0
      traces_from: ["Customer/System"]
      traces_to: ["1", "4", "5"]

    - doc_number: "S4"
      document_name: "System Safety Requirements Specification"
      phase: 0
      traces_from: ["Customer/Hazard Analysis"]
      traces_to: ["6"]

    # ── Phase 1: Planning ──────────────────────────────────────────────────────
    - doc_number: "1"
      document_name: "Software Quality Assurance Plan"
      annex_c_item: 1
      phase: 1
      traces_from: ["S3", "S4"]
      traces_to: ["all phases (enforces quality)"]

    - doc_number: "3"
      document_name: "Software Configuration Management Plan"
      annex_c_item: 3
      phase: 1
      traces_from: []
      traces_to: ["all phases (controls baselines)"]

    - doc_number: "4"
      document_name: "Software Verification Plan"
      annex_c_item: 4
      phase: 1
      traces_from: ["S3"]
      traces_to: ["2", "8", "14", "17", "19", "23", "40", "44"]

    - doc_number: "5"
      document_name: "Software Validation Plan"
      annex_c_item: 5
      phase: 1
      traces_from: ["S3"]
      traces_to: ["25", "26"]

    # ── Phase 2: Requirements ──────────────────────────────────────────────────
    - doc_number: "6"
      document_name: "Software Requirements Specification"
      annex_c_item: 6
      phase: 2
      traces_from: ["S1", "S4"]
      traces_to: ["7", "8", "9"]

