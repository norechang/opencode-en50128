phase:
  id: "assessment"
  number: 8
  name: "Software Assessment"

  # SPECIAL STRUCTURE: Phase 8 has NO Track A activities.
  #
  # Assessment is performed by an INDEPENDENT ASSESSOR (ASR) — a role that is entirely
  # outside the PM authority chain. ASR is mandatory for SIL 1-4 (§6.4.1.1, §5.1.2.4)
  # and is typically external to the development organization for SIL 3-4.
  #
  # ASR produces Annex C #45 (Software Assessment Plan) and #46 (Software Assessment Report).
  # These documents are written by ASR, NOT by PM or any agent PM can orchestrate.
  #
  # PM's role in Phase 8 is purely facilitative:
  #   - Facilitate ASR access to all lifecycle artifacts
  #   - Respond to ASR queries and provide evidence
  #   - Track open assessment findings and manage resolution
  #   - Report phase status to COD
  #
  # COD orchestrates the phase gate directly (COD → ASR → COD gate-check assessment).
  # VER may produce a Software Assessment Verification Report per §6.4.4.6 (Track B).
  #
  # SIL 0 EXEMPTION: Phase 8 is EXEMPT for SIL 0 per §6.4.1.2 (ISO 9001 organisations).
  # COD skips this phase for SIL 0 projects.

  # Agent activities — TRACK A ONLY (PM-orchestrated)
  # For Phase 8, PM has only facilitation activities (no document production by dev agents).
  # ASR activities are NOT listed here — ASR is independent and outside PM authority.
  activities:
    # Activity 0: PM facilitates assessment — provides all lifecycle artifacts to ASR
    - agent: "pm"
      task_description: "Facilitate Software Assessment by: (1) Providing ASR with complete access to all lifecycle artifacts (SQAP, SCMP, SVP, SVaP, SRS, SAS, SDS, all verification reports, validation reports, test results, source code); (2) Tracking assessment findings and coordinating resolution; (3) Confirming SIL 0 exemption and requesting COD skip gate-check if SIL 0. Report Phase 8 Track A facilitation complete to COD when ASR has confirmed receipt of all artifacts."
      owner: "pm"
      deliverables: []   # No PM-produced document; facilitation only
  
  # Phase completion criteria (EN 50128 Section 6.4)
  completion_criteria:
    all_deliverables_qua_accepted: false   # ASR deliverables are outside QUA review scope
    traceability_complete: true
    custom_checks:
      - "SIL 0 EXEMPT: Phase 8 skipped for SIL 0 per §6.4.1.2 (ISO 9001 organisations)"
      - "Software Assessment Plan (Annex C #45) produced by independent ASR"
      - "Software Assessment Report (Annex C #46) produced by independent ASR"
      - "ASR completely independent from development organization (MANDATORY SIL 3-4)"
      - "ASR has reviewed ALL lifecycle artifacts: SQAP, SCMP, SVP, SVaP, SRS, Hazard Log, SAS, SDS, all verification reports, all test results, source code, validation reports"
      - "Software Assessment Verification Report produced by VER per §6.4.4.6 (normative output)"
      - "All assessment findings addressed and resolved (or justified deviations accepted by ASR)"
      - "Safety case accepted by ASR"
      - "Deployment authorization obtained from ASR"
  
  # Verification requirements (EN 50128 §6.4.4.6)
  # VER produces a Software Assessment Verification Report as a normative §6.4.4.6 output.
  verification:
    required: true
    verifier: "ver"
    criteria:
      - "Software Assessment Plan template compliance (DOC-ID, Document Control, Approvals)"
      - "Software Assessment Plan covers all mandatory §6.4 activities"
      - "Software Assessment Report template compliance"
      - "Software Assessment Report documents compliance with EN 50128 for applicable SIL"
      - "All lifecycle artifacts reviewed by ASR with objective evidence"
      - "All findings addressed and resolved (no open critical findings)"
      - "Assessment conclusion clearly states software is/is not fit for deployment"
      - "ASR independence confirmed (organizational separation documented)"
  
  # Validation requirements
  # No separate VAL activity for Phase 8 — ASR subsumes the independent review function.
  validation:
    required_sil: []   # ASR assessment fulfils the independent review for SIL 3-4
    validator: "val"
    criteria: []
  
  # Gate check configuration
  gate_check:
    mandatory_sil: [1, 2, 3, 4]   # Mandatory for SIL 1-4 (§6.4.1.1); SIL 0 exempt (§6.4.1.2)
    blocking_sil: [1, 2, 3, 4]    # Gate check blocks transition for SIL 1-4
    criteria:
      - "SIL 0: Phase 8 SKIPPED (exempt per §6.4.1.2)"
      - "Software Assessment Plan produced (ASR)"
      - "Software Assessment Report produced (ASR) — confirms fitness for deployment"
      - "Software Assessment Verification Report produced (VER) per §6.4.4.6"
      - "ASR independence verified (MANDATORY SIL 1-4)"
      - "All assessment findings resolved"
      - "Deployment authorization granted by ASR"
