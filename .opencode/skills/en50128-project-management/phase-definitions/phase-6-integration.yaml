phase:
  id: "integration"
  number: 6
  name: "Integration"
  
  # Agent activities (EN 50128 Section 7.6 - 2 Annex C documents produced here)
  # NOTE: Software Integration Verification Report (Annex C #23) is produced in Phase 7 (Validation)
  #       per DELIVERABLES.md. Only Annex C #21 and #22 are Phase 6 outputs.
  # WORKFLOW: INT coordinates → TST executes tests → INT documents results
  # EN 50128 5.1.2.10c: "Integrator and Tester can be same person"
  # For SIL 3-4: Separate roles RECOMMENDED for independence
  
  activities:
    # Activity 0: Software Integration Testing (INT → TST → INT workflow)
    # Sub-activity 0a: INT reviews specifications and coordinates test execution
    - agent: "int"
      task_description: "Review Software Integration Test Specification and coordinate integration test execution with TST. If INT and TST are separate roles (SIL 3-4 recommended), hand off specifications to TST for test execution."
      owner: "int"
      deliverables: []  # No deliverable - coordination activity
      parallel_group: 1
    
    # Sub-activity 0b: TST executes Software Integration Tests
    - agent: "tst"
      task_description: "Create integration test code/harness based on Software Integration Test Specification. Execute all integration test cases (73 tests). Record results in machine-readable format (XML/JSON preferred per EN 50128 7.6.4.5b). Collect coverage data. Provide test results to INT."
      owner: "tst"
      deliverables:
        - path: "test/integration/software_integration_results.xml"
          doc_id: "N/A"
          doc_type: "Test-Execution-Results"
          qua_required: false
      dependencies: [0]  # TST depends on INT coordination (activity 0)
      parallel_group: 1
    
    # Sub-activity 0c: INT documents Software Integration Test Report (Annex C #21)
    - agent: "int"
      task_description: "Create Software Integration Test Report based on actual test results from TST execution. Document all test case results, component configurations, Table A.6 technique usage. CRITICAL: All results SHALL be from actual TST execution (not fabricated)."
      owner: "int"
      deliverables:
        - path: "docs/test/Software-Integration-Test-Report.md"
          doc_id: "DOC-INTTESTRPT-2026-001"
          doc_type: "Software-Integration-Test-Report"
          qua_required: true
      dependencies: [1]  # INT report depends on TST results (activity 1)
      parallel_group: 1
    
    # Activity 1: Software/Hardware Integration Testing (INT → TST → INT workflow)
    # Sub-activity 1a: INT coordinates HW/SW integration test execution
    - agent: "int"
      task_description: "Review Software/Hardware Integration Test Specification and coordinate HW/SW integration test execution with TST. Check hardware availability. If hardware not available, document limitation."
      owner: "int"
      deliverables: []  # No deliverable - coordination activity
      parallel_group: 2
    
    # Sub-activity 1b: TST executes Software/Hardware Integration Tests (or documents limitation)
    - agent: "tst"
      task_description: "Create HW/SW integration test code based on Software/Hardware Integration Test Specification. Execute tests if hardware available. If hardware NOT available, document limitation clearly. WCET estimates (not measurements) if using simulation. Record results in machine-readable format. Provide results to INT."
      owner: "tst"
      deliverables:
        - path: "test/integration/hw_sw_integration_results.xml"
          doc_id: "N/A"
          doc_type: "Test-Execution-Results"
          qua_required: false
      dependencies: [3]  # TST depends on INT coordination (activity 3)
      parallel_group: 2
    
    # Sub-activity 1c: INT documents Software/Hardware Integration Test Report (Annex C #22)
    - agent: "int"
      task_description: "Create Software/Hardware Integration Test Report based on actual test results from TST execution. Document hardware limitations if applicable. Distinguish measurements (real HW) from estimates (simulation). CRITICAL: All results SHALL be from actual TST execution (not fabricated)."
      owner: "int"
      deliverables:
        - path: "docs/test/Software-Hardware-Integration-Test-Report.md"
          doc_id: "DOC-HWINTTESTRPT-2026-001"
          doc_type: "Software-Hardware-Integration-Test-Report"
          qua_required: true
      dependencies: [4]  # INT report depends on TST results (activity 4)
      parallel_group: 2
    
    # Activity 2 (Platform Extension): VAL creates Software Integration Validation Report (SIL 3-4)
    # NOTE: This is a platform-specific per-phase validation report, NOT an Annex C deliverable.
    # The Annex C Software Integration Verification Report (#23) is produced in Phase 7 (Validation).
    # NOTE: For SIL 3-4, VMGR performs this validation activity (not VAL agent)
    - agent: "val"
      task_description: "Create Software Integration Validation Report validating that integrated software meets architectural specifications and performs correctly on target hardware. For SIL 3-4, VMGR performs this activity. NOTE: This is a platform-specific per-phase validation report (not Annex C). The Annex C #23 Software Integration Verification Report is produced in Phase 7."
      owner: "val"
      deliverables:
        - path: "docs/reports/Software-Integration-Validation-Report.md"
          doc_id: "DOC-INTVAL-2026-001"
          doc_type: "Software-Integration-Validation-Report"
          qua_required: true        # VAL reports require QUA template review
      dependencies: [2, 5]  # Validation depends on both integration test reports (activities 2, 5)
    
    # Activity 3: QUA reviews Validation Report for template compliance (MANDATORY SIL 3-4)
    - agent: "qua"
      task_description: "Review Software Integration Validation Report for template compliance (Document ID format, Document Control table, Approvals table, required sections). 1-pass rule: Approve or reject with ONE resubmission allowed."
      owner: "qua"
      deliverables:
        - path: "docs/reports/QA-Template-Review-Integration-Validation.md"
          doc_id: "DOC-QAREV-2026-010"
          doc_type: "QA-Template-Compliance-Review"
          qua_required: false      # QUA self-review not required
      dependencies: [6]            # QUA depends on VAL report (activity 6)
      sil_requirements:
        sil_0: "optional"
        sil_1: "recommended"
        sil_2: "recommended"
        sil_3: "mandatory"
        sil_4: "mandatory"
  
  # Phase completion criteria (EN 50128 Section 7.6)
  completion_criteria:
    all_deliverables_qua_accepted: true
    traceability_complete: true
    coverage_requirements:
      architecture_to_integration: 100   # 100% architectural interfaces tested
      components_to_integration: 100     # 100% component integrations tested
    custom_checks:
      - "Annex C deliverables for Phase 6: Software Integration Test Report (#21), Software/Hardware Integration Test Report (#22)"
      - "NOTE: Software Integration Verification Report (Annex C #23) is produced in Phase 7 (Validation)"
      - "TST executed all integration tests (actual execution, not fabricated results)"
      - "INT documented actual TST test results in reports"
      - "Progressive integration strategy documented (bottom-up, top-down, or sandwich)"
      - "All component interfaces tested"
      - "All software-hardware interfaces tested on target platform (or limitation documented)"
      - "All integration test cases executed and passed (100% pass rate)"
      - "Test cases repeatable and preferably automated"
      - "All test results recorded in machine-readable form (XML/JSON preferred)"
      - "Identity and configuration of all items documented"
      - "Correct use of techniques from Table A.6 demonstrated"
      - "Impact analysis performed for any changes during integration"
      - "All failures recorded with circumstances"
      - "Performance testing performed (HR for SIL 3-4)"
      - "Interface testing performed (HR for all SILs)"
      - "Hardware limitations documented if applicable (no fabricated HW measurements)"
      - "QUA template compliance reviews approved (SIL 3-4 MANDATORY)"
      - "VMGR V&V approval obtained (SIL 3-4 MANDATORY)"
  
  # Verification requirements for Phase 6 integration test outputs
  # NOTE: The Software Integration Verification Report (Annex C #23) is produced in Phase 7.
  #       Phase 6 verification criteria are checked by VER when producing that Phase 7 report.
  verification:
    required: false    # VER produces the Annex C #23 report in Phase 7, not Phase 6
    verifier: "ver"
    criteria:
      - "Software Integration Test Report adequately records tests per Software Integration Test Specification"
      - "Software/Hardware Integration Test Report adequately records tests per Software/Hardware Integration Test Specification"
      - "All integration test objectives and criteria met"
      - "Test results demonstrate correct component interface behavior"
      - "Test results demonstrate correct software-hardware interaction"
      - "Progressive integration strategy correctly applied"
      - "All test cases executed and results recorded"
      - "Configuration of tested items properly documented"
      - "Techniques from Table A.6 correctly applied (Functional/Black-box Testing HR for all SILs)"
      - "Interface testing performed and verified (HR for all SILs)"
      - "Performance testing performed and verified (R for SIL 1-2, HR for SIL 3-4)"
      - "All failures investigated and resolved or justified"
      - "Traceability: Architecture → Integration Test Spec → Integration Test Report"
      - "Impact analysis performed for changes"
  
  # Validation requirements (EN 50128 Section 7.6, independent validation SIL 3-4)
  validation:
    required_sil: [3, 4]
    validator: "val"
    criteria:
      - "Integrated software meets architectural specifications"
      - "Software-hardware integration correct on target platform"
      - "Integration test results demonstrate correct system behavior"
      - "Performance requirements met on target hardware"
      - "Interface specifications satisfied"
      - "Integration strategy appropriate for SIL level"
  
  # Gate check configuration
  gate_check:
    mandatory_sil: [0, 1, 2, 3, 4]
    blocking_sil: [3, 4]
    criteria:
      - "All deliverables QUA accepted"
      - "Validation report approved (SIL 3-4 only)"
      - "Traceability complete (Architecture → Integration Tests → Integration Results)"
      - "No open critical or high defects"
      - "All integration tests passed (100% pass rate)"
      - "All component interfaces tested"
      - "All software-hardware interfaces tested on target"
      - "Performance testing completed (HR for SIL 3-4)"
      - "Configuration management applied (all items under control)"
      - "Impact analysis complete for any integration changes"
