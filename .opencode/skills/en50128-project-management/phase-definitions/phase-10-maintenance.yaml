phase:
  id: "maintenance"
  number: 10
  name: "Software Maintenance"

  # Agent activities — TRACK A ONLY (PM-orchestrated development activities)
  # VER produces the Software Maintenance Verification Report (Annex C #44) — Track B.
  # Track B is driven by the `verification:` and `validation:` sections below.
  #
  # EN 50128 Section 9.2 — 4 Annex C documents: #41, #42, #43, #44
  # NOTE: Phase 10 is RECURRING — it repeats for each maintenance release (CCB-driven).
  # The Software Maintenance Plan (#41) is produced once; items #42, #43, #44 recur per release.
  # NOTE: Annex C item 42 contains a typo in the standard ("Software Chang Records").
  #       The correct name per Section 9.2.4 is "Software Change Records".
  activities:
    # Activity 0: PM creates Software Maintenance Plan (Annex C #41)
    # Produced once at the start of the maintenance phase.
    - agent: "pm"
      task_description: "Create Software Maintenance Plan documenting the procedures for managing software changes during the operational lifetime. Include: CCB process, change request classification (corrective/adaptive/perfective/preventive), impact analysis procedures, regression testing requirements, re-verification requirements by SIL level, baseline management, and maintenance release cadence per EN 50128 Section 9.2."
      owner: "pm"
      deliverables:
        - path: "docs/maintenance/Software-Maintenance-Plan.md"
          doc_id: "DOC-MAINTPLAN-2026-001"
          doc_type: "Software-Maintenance-Plan"
          qua_required: true
    
    # Activity 1: PM/CM creates Software Change Records (Annex C #42)
    # Recurring — one record (or record set) per maintenance release / change request.
    # NOTE: Standard has typo "Software Chang Records" — correct name is "Software Change Records".
    - agent: "cm"
      task_description: "Create Software Change Records documenting all change requests received during the maintenance period. For each change: unique ID, description, classification (corrective/adaptive/perfective/preventive), priority, impact analysis result, approval status, and resolution. Per EN 50128 Section 9.2.4. NOTE: Standard Annex C typo is 'Software Chang Records' — correct name per §9.2.4 is 'Software Change Records'."
      owner: "cm"
      deliverables:
        - path: "docs/maintenance/Software-Change-Records.md"
          doc_id: "DOC-CHANGEREC-2026-001"
          doc_type: "Software-Change-Records"
          qua_required: true
      dependencies: [0]        # Change Records require Maintenance Plan to be in place
    
    # Activity 2: CM creates Software Maintenance Records (Annex C #43)
    # Recurring — updated per maintenance release.
    - agent: "cm"
      task_description: "Create Software Maintenance Records documenting all maintenance activities performed on the software, including: baseline identification before and after each change, testing performed, regression test results, re-verification activities, configuration changes, and evidence that maintenance changes meet the original SIL requirements per EN 50128 Section 9.2."
      owner: "cm"
      deliverables:
        - path: "docs/maintenance/Software-Maintenance-Records.md"
          doc_id: "DOC-MAINTREC-2026-001"
          doc_type: "Software-Maintenance-Records"
          qua_required: true
      dependencies: [1]        # Maintenance Records depend on Change Records
  
  # Phase completion criteria (EN 50128 Section 9.2) — per maintenance release
  completion_criteria:
    all_deliverables_qua_accepted: true
    traceability_complete: true
    custom_checks:
      - "All 4 Phase 10 deliverables produced per maintenance release: Software Maintenance Plan (#41, once), Software Change Records (#42), Software Maintenance Records (#43), Software Maintenance Verification Report (#44)"
      - "CCB has approved all changes before implementation"
      - "Impact analysis performed for each change"
      - "Regression testing performed for all changes (scope per SIL and impact)"
      - "Software Maintenance Verification Report produced by VER confirming maintenance correctness"
      - "Maintenance changes meet original SIL requirements"
      - "Configuration baseline updated after each maintenance release"
      - "Change Records and Maintenance Records complete and traceable"
  
  # Verification requirements (EN 50128 Section 9.2, Annex C #44)
  verification:
    required: true
    verifier: "ver"
    criteria:
      - "Software Maintenance Plan template compliance (DOC-ID, Document Control, Approvals)"
      - "Maintenance Plan covers all mandatory §9.2 activities"
      - "Software Change Records template compliance and completeness"
      - "All change requests have unique IDs and are classified correctly"
      - "Impact analysis documented for each change"
      - "CCB approval confirmed for each implemented change"
      - "Software Maintenance Records template compliance and completeness"
      - "Maintenance Records confirm all changes implemented correctly"
      - "Regression testing scope appropriate for change impact and SIL level"
      - "All maintenance changes meet original SIL requirements"
      - "Traceability: Change Request → Impact Analysis → Implementation → Test → Records"
      - "Configuration baseline updated correctly"
  
  # Validation requirements
  # No separate VAL activity for Phase 10 — maintenance verification by VER is sufficient.
  # For SIL 3-4, significant functional changes may trigger a re-validation (COD decision).
  validation:
    required_sil: []   # Per-change validation triggered by COD if functional/safety scope warrants
    validator: "val"
    criteria:
      - "Significant functional changes: VAL confirms changed functionality still meets SRS"
      - "Safety-critical changes: SAF confirms updated Hazard Log and safety mitigations"
      - "Performance changes: VAL confirms performance requirements still met"
  
  # Gate check configuration
  # Phase 10 gate check is per maintenance release, not a one-time exit gate.
  gate_check:
    mandatory_sil: [0, 1, 2, 3, 4]
    blocking_sil: [3, 4]
    criteria:
      - "Software Maintenance Plan approved (once)"
      - "Software Change Records complete for all changes in this release"
      - "Software Maintenance Records complete"
      - "Software Maintenance Verification Report approved (VER)"
      - "CCB approval confirmed for all implemented changes"
      - "Regression testing complete and passed"
      - "Maintenance changes meet original SIL requirements"
      - "Configuration baseline updated"
      - "No open critical or high defects from this maintenance release"
