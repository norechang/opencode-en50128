    notes: "§6.3.4.10: exact software baseline tested (version, CM tag)"
  - heading: "Known Deficiencies"
    notes: "§6.3.4.11: any known deficiencies and their assessed impact on safety"
  - heading: "Conclusion"
    notes: "§7.7.4.11: validation criteria met / not met"
