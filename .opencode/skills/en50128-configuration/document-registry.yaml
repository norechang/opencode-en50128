# EN 50128 Configuration Manager — Document-to-Phase Registry
# Source authority: activities/deliverables.yaml (Annex C Table C.1)
#
# CM uses this file to implement:
#   - query-location: document_key → phase_dir + filename → canonical path
#   - evidence-path:  evidence_type → phase_dir + evidence_subdir → canonical path
#
# All agents MUST call CM query-location before writing any document.
# All evidence-producing agents (VER, TST, SAF) MUST call CM evidence-path before
# storing any evidence artifact.
#
# Canonical path: {workspace_root}/{phase_dir}/{filename}
# workspace_root is resolved from .workspace JSON → examples/<project_name>/

# ── Document Registry ────────────────────────────────────────────────────────
