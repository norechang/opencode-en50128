# ── Evidence Registry ─────────────────────────────────────────────────────────
# CM evidence-path capability maps evidence_type → phase_dir/evidence/subdir
# §6.2.4.8: VER evidence retained in format defined/referenced in SVP
# §9.1.4.13: Deployment Record as tracked evidence artifact

evidence:

  - evidence_type: static-analysis
    description: "MISRA checker raw output, static analysis tool results (.xml/.json)"
    phase: 5
    phase_dir: phase-5-implementation-testing
    evidence_subdir: evidence/static-analysis
    produced_by: [ver, imp]
    clause: "§6.2.4.8, Table A.19"

  - evidence_type: coverage
    description: "gcov/lcov data files, HTML coverage reports, MC/DC data"
    phase: 5
    phase_dir: phase-5-implementation-testing
    evidence_subdir: evidence/coverage
    produced_by: [tst, ver]
    clause: "§6.2.4.8, Table A.21"

  - evidence_type: unit-test-log
    description: "Unity test framework execution logs, test result files"
    phase: 5
    phase_dir: phase-5-implementation-testing
    evidence_subdir: evidence/test-logs
    produced_by: [tst]
    clause: "§6.2.4.8, §7.5.4.5"

  - evidence_type: tool-qualification
    description: "Tool qualification evidence per §7.4.4.14, tool validation records"
    phase: 5
    phase_dir: phase-5-implementation-testing
    evidence_subdir: evidence/tool-qualification
    produced_by: [val]
    clause: "§7.4.4.14"

  - evidence_type: design-analysis
    description: "FMEA/FTA raw tool outputs, safety analysis worksheets"
    phase: 3
    phase_dir: phase-3-architecture-design
    evidence_subdir: evidence/design-analysis
    produced_by: [saf]
    clause: "§7.3.4, Table A.8"

  - evidence_type: design-review
    description: "Design inspection checklists, peer review records"
    phase: 4
    phase_dir: phase-4-component-design
    evidence_subdir: evidence/design-review
    produced_by: [ver, des]
    clause: "§6.2.4.8"

  - evidence_type: integration-test-log
    description: "Software integration test execution logs"
    phase: 6
    phase_dir: phase-6-integration
    evidence_subdir: evidence/integration-test-logs
    produced_by: [int, tst]
    clause: "§6.2.4.8, §7.6.4"

  - evidence_type: hw-integration-log
    description: "Hardware/software integration test evidence"
    phase: 6
    phase_dir: phase-6-integration
    evidence_subdir: evidence/hw-integration-logs
    produced_by: [int]
    clause: "§7.6.4"

  - evidence_type: system-test-log
    description: "System/acceptance test execution logs, VAL test records"
    phase: 7
    phase_dir: phase-7-validation
    evidence_subdir: evidence/system-test-logs
    produced_by: [val, tst]
    clause: "§6.3.4, §7.7.4"

  - evidence_type: validation-record
    description: "VAL evidence records, acceptance test witness records"
    phase: 7
    phase_dir: phase-7-validation
    evidence_subdir: evidence/validation-records
    produced_by: [val]
    clause: "§6.3.4"

  - evidence_type: assessor-record
    description: "ASR review notes, checklists, interview records (§6.4.4.10)"
    phase: 8
    phase_dir: phase-8-assessment
    evidence_subdir: evidence/assessor-records
    produced_by: [asr]
    clause: "§6.4.4.10, §6.4.4.13"

  - evidence_type: deployment-record
    description: "Evidence that intended software has been loaded (§9.1.4.13)"
    phase: 9
    phase_dir: phase-9-deployment
    evidence_subdir: evidence/deployment-records
    produced_by: [pm, ver]
    clause: "§9.1.4.13"

  - evidence_type: maintenance-log
    description: "Change execution records, regression test evidence"
    phase: 10
    phase_dir: phase-10-maintenance
    evidence_subdir: evidence/maintenance-logs
    produced_by: [imp, tst, ver]
    clause: "§9.2"
