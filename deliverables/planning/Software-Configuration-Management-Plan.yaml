        recommendation: "M"
      - technique_name: "Traceability"
        table_reference: "A.9"
        technique_id: "D.58"
        recommendation: "HR"
    additional_requirements:
      - "Baseline management"
      - "Change Control Board (CCB) established"
      - "Configuration status accounting"
      - "Configuration audits planned"
  
  sil_2:
    mandatory: true
    techniques:
      - technique_name: "Software Configuration Management"
        table_reference: "A.9"
        technique_id: "D.48"
        recommendation: "M"
      - technique_name: "Traceability"
        table_reference: "A.9"
        technique_id: "D.58"
        recommendation: "HR"
      - technique_name: "Data Recording and Analysis"
        table_reference: "A.9"
        technique_id: "D.12"
        recommendation: "HR"
    additional_requirements:
      - "Formal CCB with documented procedures"
      - "Impact analysis for all changes"
      - "Physical Configuration Audit (PCA) planned"
      - "Functional Configuration Audit (FCA) planned"
  
  sil_3:
    mandatory: true
    techniques:
      - technique_name: "Software Configuration Management"
        table_reference: "A.9"
        technique_id: "D.48"
        recommendation: "M"
      - technique_name: "Traceability"
        table_reference: "A.9"
        technique_id: "D.58"
        recommendation: "M"
      - technique_name: "Data Recording and Analysis"
        table_reference: "A.9"
        technique_id: "D.12"
        recommendation: "M"
    additional_requirements:
      - "Formal CCB with independent QA representation"
      - "Impact analysis MANDATORY for all changes"
      - "Cumulative impact analysis for multiple changes"
      - "Tool configuration management (development environment)"
