# Software Configuration Management Plan (SCMP)
# EN 50128 Deliverable #3 - Section 6.6

# ===== Basic Identification =====
deliverable_id: "DOC-003-SCMP"
number: 3
name: "Software Configuration Management Plan"
abbreviation: "SCMP"

# ===== Lifecycle Context =====
phase: "planning"
standard_section: "6.6"

# ===== Ownership (EN 50128 Table C.1) =====
written_by: "CM"
first_check: "QUA"
second_check: "VAL"

# ===== Template =====
template_path: ".opencode/skills/en50128-configuration/templates/Software-Configuration-Management-Plan-template.md"
template_exists: true

# ===== SIL Requirements =====
