# =============================================================================

configuration_management:
  baseline_required: true
  baseline_timing: "After Phase 1 (Planning) completion, before Phase 7 (Validation) begins"
  change_control: "All changes to baselined SVaP require CCB approval (Change Control Board)"
  version_control: "docs/plans/SVaP.md under Git control, baseline tagged as baseline-svap-v1.0"
  review_frequency: "Review annually or when validation testing fails acceptance criteria"
  update_triggers:
    - "Addition of new validation scenarios"
    - "Change in SIL level"
    - "Change in validation approach or techniques"
    - "Customer feedback on acceptance criteria"
    - "Identification of new operational scenarios"
    - "EN 50128 standard updates"
    - "Lessons learned from validation testing"

