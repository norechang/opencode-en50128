    mandatory: true  # HR for SVaP
    techniques:
      - technique_name: "Functional and Black-Box Testing"
        table_reference: "A.7"
        technique_id: "A.14"
        recommendation: "M"
      - technique_name: "Performance Testing"
        table_reference: "A.7"
        technique_id: "A.18"
        recommendation: "M"
      - technique_name: "Modelling"
        table_reference: "A.7"
        technique_id: "A.17"
        recommendation: "R"
