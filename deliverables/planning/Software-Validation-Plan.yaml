    additional_requirements:
      - "Software Validation Plan HIGHLY RECOMMENDED (HR)"
      - "INDEPENDENT VALIDATION MANDATORY (VAL team separate from DEV and VER teams)"
      - "Functional and black-box testing MANDATORY"
      - "Performance testing MANDATORY"
      - "Operational scenarios MANDATORY"
      - "Customer acceptance MANDATORY"
      - "Target environment testing MANDATORY"
      - "Safety scenario validation MANDATORY"
      - "Independent Validator MANDATORY"
    evidence_thresholds:
