# =============================================================================
# EVIDENCE REQUIREMENTS
# =============================================================================
# Evidence required to demonstrate SVaP completeness and compliance

evidence_requirements:
  - evidence_id: "svap-validation-strategy"
    description: "Documented validation strategy per 6.3.4.4"
    mandatory_sil: 1  # HR for SIL 1+
    source: "VAL"
    format: "Section in SVaP document (markdown)"
    storage_path: "docs/plans/SVaP.md"
    automation_level: "manual"
    collect_on_agent_action: "val-create-svap"
    verification_criteria:
      - "Strategy justifies validation approach chosen"
      - "Strategy addresses operational environment testing"
      - "Strategy addresses acceptance testing with customer"
      - "Strategy addresses safety scenario validation"
      - "Strategy references EN 50128 Table A.7 techniques"

  - evidence_id: "svap-validation-techniques"
    description: "Documented validation techniques and methods per Table A.7"
    mandatory_sil: 1  # HR for SIL 1+
    source: "VAL"
    format: "Section in SVaP document with technique mapping table"
    storage_path: "docs/plans/SVaP.md"
    automation_level: "manual"
    collect_on_agent_action: "val-create-svap"
    verification_criteria:
      - "All mandatory techniques listed for target SIL level"
      - "Functional and black-box testing defined (MANDATORY SIL 3-4)"
      - "Performance testing defined (MANDATORY SIL 3-4)"
      - "Operational scenario testing defined"
      - "Acceptance testing approach defined"
      - "Test environment specification defined (target hardware)"

  - evidence_id: "svap-independence-plan"
    description: "Independence plan for validation activities (SIL 3-4 MANDATORY)"
    mandatory_sil: 3  # MANDATORY for SIL 3-4
    source: "VAL"
    format: "Section in SVaP document"
    storage_path: "docs/plans/SVaP.md"
    automation_level: "manual"
    collect_on_agent_action: "val-create-svap"
    verification_criteria:
      - "Validator independence from Designer/Implementer/Tester/Verifier documented"
      - "Organizational independence demonstrated (separate reporting line)"
      - "Personnel independence demonstrated (different individuals)"
      - "Validator SHALL NOT report to Project Manager (SIL 3-4)"

  - evidence_id: "svap-operational-scenarios"
    description: "Documented operational scenarios for validation testing"
    mandatory_sil: 3  # MANDATORY for SIL 3-4
    source: "VAL"
    format: "Section in SVaP document with scenario descriptions"
    storage_path: "docs/plans/SVaP.md"
    automation_level: "manual"
    collect_on_agent_action: "val-create-svap"
    verification_criteria:
      - "All normal operational scenarios documented"
      - "All degraded operational scenarios documented (failures)"
      - "All safety-critical scenarios documented"
      - "Each scenario includes: preconditions, steps, expected results, acceptance criteria"
      - "Scenarios cover all software requirements from SRS"
      - "Minimum number of scenarios meets SIL threshold"

  - evidence_id: "svap-acceptance-criteria"
    description: "Documented acceptance criteria for validation per 6.3.4.6"
    mandatory_sil: 1  # HR for SIL 1+
    source: "VAL"
    format: "Section in SVaP document"
    storage_path: "docs/plans/SVaP.md"
    automation_level: "manual"
    collect_on_agent_action: "val-create-svap"
    verification_criteria:
      - "Acceptance criteria defined for each operational scenario"
      - "Performance acceptance criteria defined (timing, throughput)"
      - "Safety acceptance criteria defined (safety requirements from SRS)"
      - "Customer approval process defined"
      - "Acceptance criteria quantifiable and measurable"

  - evidence_id: "svap-baseline"
    description: "Baselined SVaP document approved by PM and customer"
    mandatory_sil: 1  # HR for SIL 1+
    source: "CM"
    format: "Baselined markdown file with approvals"
    storage_path: "docs/plans/SVaP.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "cm-baseline-deliverable"
    verification_criteria:
      - "Document has version 1.0 or higher"
      - "Document status is 'Approved' or 'Baseline'"
      - "Approvals section complete (VAL author, QA, PM)"
      - "Approvals section includes VER (first check)"
      - "Independent Validator approval present (SIL 3-4)"
      - "Customer representative approval present"
      - "Document under configuration control"
      - "Baseline recorded in SCMP baseline register"

# =============================================================================
# DEPENDENCIES
# =============================================================================

depends_on:
  - deliverable_id: "DOC-001-SQAP"
    reason: "SQAP defines quality framework; SVaP implements validation quality processes"
    dependency_type: "blocking"

  - deliverable_id: "DOC-003-SCMP"
    reason: "SCMP defines configuration management for validation artifacts"
    dependency_type: "blocking"

  - deliverable_id: "DOC-004-SVP"
    reason: "SVP verification techniques inform SVaP validation techniques (coordinate V&V)"
    dependency_type: "informational"

  - deliverable_id: "DOC-006-SRS"
    reason: "SRS defines requirements; SVaP validates software meets those requirements"
    dependency_type: "blocking"

feeds_into:
  - deliverable_id: "DOC-025-VALIDATION-REPORT"
    reason: "SVaP defines validation approach; Validation Report implements and documents validation results"

  - deliverable_id: "DOC-007-OVERALL-TEST-SPEC"
    reason: "SVaP validation scenarios inform Overall Test Specification test cases"

# =============================================================================
# VERIFICATION CRITERIA
# =============================================================================

verification_criteria:
  completeness:
    - "All sections of SVaP template completed per 6.3.4.4-6.3.4.6"
    - "Validation strategy justified per 6.3.4.4"
    - "All EN 50128 Table A.7 mandatory techniques addressed for target SIL"
    - "All operational scenarios defined with acceptance criteria"
    - "All validation roles and responsibilities defined"
    - "Independence plan complete (SIL 3-4)"
    - "Customer involvement plan complete"
    - "Target environment specification complete"

  correctness:
    - "Validation techniques appropriate for target SIL level"
    - "Functional and black-box testing approach correct (MANDATORY SIL 3-4)"
    - "Performance testing approach correct (MANDATORY SIL 3-4)"
    - "Operational scenarios realistic and representative"
    - "Acceptance criteria align with SRS requirements"
    - "Independence requirements met per 5.3.7.11 (SIL 3-4)"
    - "Customer acceptance process appropriate"

  consistency:
    - "Validation strategy consistent with SQAP quality processes"
    - "Operational scenarios consistent with SRS requirements"
    - "Acceptance criteria consistent with SRS acceptance criteria"
    - "Validation techniques complement (not duplicate) verification techniques in SVP"
    - "Target environment consistent with system requirements"

  traceability:
    - "Forward traceability: SRS requirements → Operational scenarios"
    - "Forward traceability: Operational scenarios → Acceptance criteria"
    - "Forward traceability: SVaP → Validation Report"
    - "Backward traceability: Acceptance criteria → SRS requirements"
    - "References to EN 50128 Table A.7, A.14, A.18 present"

# =============================================================================
