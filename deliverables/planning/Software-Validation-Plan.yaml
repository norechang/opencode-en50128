# Software Validation Plan (SVaP) - Deliverable Metadata
# EN 50128:2011 Section 6.3.4, Section 7.7, Table A.7, Table C.1
# This file defines the metadata, requirements, evidence, and verification criteria
# for the Software Validation Plan deliverable.

deliverable_id: "DOC-005-SVAP"
number: 5
name: "Software Validation Plan"
abbreviation: "SVaP"
phase: "planning"
standard_section: "6.3.4"
written_by: "VAL"
first_check: "VER"
second_check: "NONE"
template_path: ".opencode/skills/en50128-documentation/templates/Software-Validation-Plan-template.md"
template_exists: true

# =============================================================================
# SIL-DEPENDENT REQUIREMENTS
# =============================================================================
# Requirements scale by SIL level per EN 50128 Table A.7
# Validation confirms software fulfills its intended use in operational environment

sil_requirements:
  sil_0:
    mandatory: false  # Validation recommended but not mandatory
    techniques:
      - technique_name: "Software Validation"
        table_reference: "A.7"
        technique_id: "A.7"
        recommendation: "R"
      - technique_name: "Functional and Black-Box Testing"
        table_reference: "A.7"
        technique_id: "A.14"
        recommendation: "R"
    additional_requirements:
      - "Basic validation activities recommended"
      - "No specific techniques mandatory"
      - "No independence requirement"
      - "Operational testing recommended"
    evidence_thresholds:
      min_operational_scenarios: "N/A"
      min_acceptance_tests: "N/A"
      performance_testing_required: false
      independent_validation: false

  sil_1:
    mandatory: true  # HR (Highly Recommended) - treat as mandatory
    techniques:
      - technique_name: "Functional and Black-Box Testing"
        table_reference: "A.7"
        technique_id: "A.14"
        recommendation: "HR"
      - technique_name: "Performance Testing"
        table_reference: "A.7"
        technique_id: "A.18"
        recommendation: "HR"
      - technique_name: "Modelling"
        table_reference: "A.7"
        technique_id: "A.17"
        recommendation: "R"
    additional_requirements:
      - "Software Validation Plan HIGHLY RECOMMENDED (HR)"
      - "Functional and black-box testing HIGHLY RECOMMENDED"
      - "Performance testing HIGHLY RECOMMENDED"
      - "Operational scenarios RECOMMENDED"
      - "Customer acceptance RECOMMENDED"
      - "No mandatory independence requirement"
    evidence_thresholds:
      min_operational_scenarios: "3"  # HR
      min_acceptance_tests: "5"  # HR
      performance_testing_required: true  # HR
      independent_validation: false

  sil_2:
    mandatory: true  # HR for SVaP
    techniques:
      - technique_name: "Functional and Black-Box Testing"
        table_reference: "A.7"
        technique_id: "A.14"
        recommendation: "HR"
      - technique_name: "Performance Testing"
        table_reference: "A.7"
        technique_id: "A.18"
        recommendation: "HR"
      - technique_name: "Modelling"
        table_reference: "A.7"
        technique_id: "A.17"
        recommendation: "R"
    additional_requirements:
      - "Software Validation Plan HIGHLY RECOMMENDED (HR)"
      - "Functional and black-box testing HIGHLY RECOMMENDED"
      - "Performance testing HIGHLY RECOMMENDED"
      - "Operational scenarios HIGHLY RECOMMENDED"
      - "Customer acceptance HIGHLY RECOMMENDED"
      - "No mandatory independence requirement"
    evidence_thresholds:
      min_operational_scenarios: "5"  # HR
      min_acceptance_tests: "10"  # HR
      performance_testing_required: true  # HR
      independent_validation: false

  sil_3:
    mandatory: true  # HR for SVaP
    techniques:
      - technique_name: "Functional and Black-Box Testing"
        table_reference: "A.7"
        technique_id: "A.14"
        recommendation: "M"
      - technique_name: "Performance Testing"
        table_reference: "A.7"
        technique_id: "A.18"
        recommendation: "M"
      - technique_name: "Modelling"
        table_reference: "A.7"
        technique_id: "A.17"
