# =============================================================================
# NOTES
# =============================================================================

notes: |
  CRITICAL INFORMATION:
  
  1. **Verification vs. Validation**:
     - Verification: "Are we building the product right?" (outputs match specifications)
     - Validation: "Are we building the right product?" (meets user needs, fit for purpose)
     - SVP covers verification; SVaP covers validation
     - Validation performed AFTER verification completes
  
  2. **SIL Requirements**:
     - SIL 0: Validation recommended (R), no mandatory techniques
     - SIL 1-2: SVaP HIGHLY RECOMMENDED (HR), functional testing HR, performance testing HR
     - SIL 3-4: SVaP HIGHLY RECOMMENDED (HR), functional testing MANDATORY, performance testing MANDATORY
     - Independence MANDATORY for SIL 3-4 (Validator separate from DEV, VER, TST teams)
  
  3. **EN 50128 Table A.7 Validation Techniques** (minimum required):
     - Functional and Black-Box Testing (Table A.14): SIL 3-4 MANDATORY
     - Performance Testing (Table A.18): SIL 3-4 MANDATORY
     - Modelling (Table A.17): SIL 1-4 RECOMMENDED
  
  4. **Operational Scenarios**:
     - Define realistic use cases in target operational environment
     - Include normal operation, degraded operation, failure scenarios
     - Include all safety-critical scenarios from Hazard Log
     - Each scenario: preconditions, steps, expected results, acceptance criteria
     - Minimum number of scenarios scales with SIL level
  
  5. **Performance Testing** (MANDATORY SIL 3-4):
     - Timing analysis (execution time, response time, real-time constraints)
     - Throughput analysis (data processing rate, message handling)
     - Resource usage (memory, CPU, I/O)
     - Load testing (peak load, sustained load)
     - Stress testing (overload conditions)
  
  6. **Independence Requirements** (Section 5.3.7.11):
     - SIL 0-2: No mandatory independence
     - SIL 3-4: Validator SHALL NOT be Requirements Manager, Designer, Implementer, Integrator, Tester, or Verifier
     - SIL 3-4: Validator SHALL NOT report to Project Manager (reports to customer/safety authority)
     - SIL 3-4: Organizational independence required (separate reporting line)
  
  7. **SVaP Contents** (Section 6.3.4.4-6.3.4.6):
     - Validation organization (roles, responsibilities)
     - Validation strategy justification
     - Validation techniques and methods (Table A.7)
     - Operational scenarios (test cases)
     - Acceptance criteria per scenario
     - Customer involvement plan
     - Target environment specification
     - Validation reporting format
  
  8. **Target Environment Testing** (Section 7.7.4.5):
     - Software exercised by connection to real hardware or actual systems
     - Testing in simulated environment acceptable if justified
     - Target hardware must represent production environment
     - All interfaces exercised (hardware, software, communication)
  
  9. **Customer Acceptance**:
     - Customer defines acceptance criteria
     - Customer witnesses validation tests
     - Customer approves validation results
     - Customer representative approval required in SVaP
     - Customer approval required before software release (6.3.4.16)
  
  10. **Relationship to Other Plans**:
      - SQAP: Defines quality framework, SVaP implements validation quality processes
      - SCMP: Defines configuration management for validation artifacts
      - SVP: Verification plan, SVaP complements (validation after verification)
      - SRS: Requirements specification, SVaP validates software meets requirements
      - Overall Test Specification: Detailed test cases, SVaP defines validation approach
  
  11. **Agent Workflow**:
      - VAL agent creates SVaP using /val plan command
      - SVaP baselined in Phase 1 (Planning)
      - VAL agent executes validation testing per SVaP in Phase 7 (Validation)
      - VAL agent creates Validation Report documenting results
      - VAL agent provides acceptance recommendation to customer
  
  12. **Critical Success Factors**:
      - Early establishment (Phase 1, before requirements complete)
      - Customer involvement from planning through execution
      - Independence preserved (SIL 3-4)
      - Operational scenarios realistic and comprehensive
      - Acceptance criteria quantifiable and measurable
      - Target environment testing (real hardware)
      - Safety scenario coverage complete
