# =============================================================================
# NOTES
# =============================================================================

notes: |
  CRITICAL INFORMATION:
  
  1. **Verification vs. Validation**:
     - Verification: "Are we building the product right?" (outputs match specifications)
     - Validation: "Are we building the right product?" (meets user needs)
     - SVP covers verification; Software Validation Plan (SVaP) covers validation
  
  2. **SIL Requirements**:
     - SIL 0: Verification recommended (R), no mandatory techniques
     - SIL 1-2: SVP HIGHLY RECOMMENDED (HR), dynamic analysis HR, static analysis HR
     - SIL 3-4: SVP HIGHLY RECOMMENDED (HR), dynamic analysis MANDATORY (M), static analysis MANDATORY (M)
     - Independence MANDATORY for SIL 3-4 (Verifier separate from DEV team)
  
  3. **EN 50128 Table A.5 Verification Techniques** (minimum required):
     - Dynamic Analysis and Testing (Table A.13): SIL 3-4 MANDATORY
     - Static Analysis (Table A.19): SIL 3-4 MANDATORY
     - Test Coverage for Code (Table A.21): SIL 3-4 MANDATORY
     - Functional and Black-Box Testing (Table A.14): SIL 3-4 MANDATORY
     - Traceability (D.58): SIL 3-4 MANDATORY
  
  4. **Test Coverage Requirements** (Table A.21):
     - SIL 0: No mandatory coverage
     - SIL 1: Statement (HR), Branch (HR)
     - SIL 2: Statement (HR), Branch (MANDATORY)
     - SIL 3: Statement (M), Branch (M), Condition (M)
     - SIL 4: Statement (M), Branch (M), Condition (M), MC/DC (HR - treat as M)
  
  5. **Static Analysis Requirements** (Table A.19):
     - SIL 3-4: Data flow analysis (M), Control flow analysis (M)
     - Tools: Cppcheck, PC-lint Plus, Clang Static Analyzer
     - MISRA C:2012 compliance verification MANDATORY for SIL 2+
  
  6. **Independence Requirements** (Section 5.3.5.10):
     - SIL 0-2: No mandatory independence
     - SIL 3-4: Verifier SHALL NOT be Designer, Implementer, Integrator, or Tester
     - SIL 3-4: Organizational independence required (separate reporting line)
  
  7. **SVP Contents** (Section 6.2.4.9):
     - Verification organization (roles, responsibilities)
     - Verification plans per phase (requirements, architecture, design, implementation, integration)
     - Verification techniques and tools (Table A.5)
     - Verification criteria and acceptance thresholds
     - Evidence collection and storage
     - Verification reporting format (per 6.2.4.13)
  
  8. **Tool Qualification**:
     - T1: No error introduction, inspection sufficient (Cppcheck, gcov)
     - T2: May introduce errors, tool validation required (compilers)
     - T3: Safety-critical output, tool qualification required
     - Tool selection and qualification status must be documented in SVP
  
  9. **Verification Reports** (Section 6.2.4.12-13):
     - One Verification Report per lifecycle phase
     - Format defined in 6.2.4.13 (phase, activities, results, deviations, conclusion)
     - Reports implement SVP verification plan per phase
     - Reports feed evidence to SVP continuous improvement
  
  10. **Relationship to Other Plans**:
      - SQAP: Defines quality framework, SVP implements verification quality processes
      - SCMP: Defines configuration management for verification artifacts
      - SVaP: Defines validation (different from verification)
      - Overall Test Specification: Test plan, SVP defines test verification criteria
  
  11. **Agent Workflow**:
      - VER agent creates SVP using /ver plan command
      - SVP baselined in Phase 1 (Planning)
      - VER agent references SVP when creating Verification Reports per phase
      - VER agent updates SVP based on lessons learned from verification activities
  
  12. **Critical Success Factors**:
      - Early establishment (Phase 1, before requirements)
      - Independence preserved (SIL 3-4)
      - Tool selection appropriate for C and MISRA C
      - Coverage thresholds aligned with SIL level
      - Traceability approach comprehensive (SIL 3-4)
      - Verification reporting format standardized per 6.2.4.13
