# =============================================================================
# VERIFICATION CRITERIA
# =============================================================================

verification_criteria:
  completeness:
    - "All sections of SVP template completed per 6.2.4.3-6.2.4.9"
    - "Verification strategy covers all lifecycle phases (7.2-7.7)"
    - "All EN 50128 Table A.5 mandatory techniques addressed for target SIL"
    - "All verification activities defined with entry/exit criteria"
    - "All verification roles and responsibilities defined"
    - "All verification tools identified with qualification status"
    - "Independence plan complete (SIL 3-4)"
    - "Traceability approach complete (SIL 3-4 mandatory)"

  correctness:
    - "Verification techniques appropriate for target SIL level"
    - "Static analysis techniques align with Table A.19 (data flow, control flow)"
    - "Dynamic analysis techniques align with Table A.13 (unit testing, integration testing)"
    - "Test coverage techniques align with Table A.21 (statement, branch, condition, MC/DC)"
    - "Verification activities align with lifecycle phase outputs"
    - "Tool selection appropriate for C language and MISRA C verification"
    - "Independence requirements met per 5.3.5.10 (SIL 3-4)"

  consistency:
    - "Verification strategy consistent with SQAP quality processes"
    - "Traceability approach consistent with SCMP traceability requirements"
    - "Tool usage consistent across all lifecycle phases"
    - "Verification reporting format consistent per 6.2.4.13"
    - "Coverage thresholds consistent with SIL requirements"
    - "Complexity thresholds consistent with SIL requirements"

  traceability:
    - "Forward traceability: SQAP quality requirements → SVP verification activities"
    - "Forward traceability: SVP verification techniques → Verification Reports per phase"
    - "Backward traceability: Verification Reports → SVP verification plan"
    - "References to EN 50128 Table A.5, A.13, A.19, A.21 present"

