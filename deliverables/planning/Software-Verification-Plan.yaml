# =============================================================================
# EVIDENCE REQUIREMENTS
# =============================================================================
# Evidence required to demonstrate SVP completeness and compliance

evidence_requirements:
  - evidence_id: "svp-verification-strategy"
    description: "Documented verification strategy covering all lifecycle phases per 6.2.4.3"
    mandatory_sil: 1  # HR for SIL 1+
    source: "VER"
    format: "Section in SVP document (markdown)"
    storage_path: "docs/plans/SVP.md"
    automation_level: "manual"
    collect_on_agent_action: "ver-create-svp"
    verification_criteria:
      - "Strategy covers all lifecycle phases (requirements, architecture, design, implementation, integration, validation)"
      - "Strategy defines verification activities per phase"
      - "Strategy references EN 50128 Table A.5 techniques"
      - "Strategy addresses SIL-specific requirements"

  - evidence_id: "svp-verification-techniques"
    description: "Documented verification techniques and tools per 6.2.4.5 (Table A.5)"
    mandatory_sil: 1  # HR for SIL 1+
    source: "VER"
    format: "Section in SVP document with technique mapping table"
    storage_path: "docs/plans/SVP.md"
    automation_level: "manual"
    collect_on_agent_action: "ver-create-svp"
    verification_criteria:
      - "All mandatory techniques listed for target SIL level"
      - "Static analysis techniques defined (data flow, control flow, MISRA C)"
      - "Dynamic analysis techniques defined (unit testing, integration testing)"
      - "Test coverage techniques defined (statement, branch, condition, MC/DC)"
      - "Tools identified for each technique (Cppcheck, PC-lint, gcov/lcov)"
      - "Tool qualification status documented (T1/T2/T3)"

  - evidence_id: "svp-independence-plan"
    description: "Independence plan for verification activities (SIL 3-4 MANDATORY)"
    mandatory_sil: 3  # MANDATORY for SIL 3-4
    source: "VER"
    format: "Section in SVP document"
    storage_path: "docs/plans/SVP.md"
    automation_level: "manual"
    collect_on_agent_action: "ver-create-svp"
    verification_criteria:
      - "Verifier independence from Designer/Implementer/Tester documented"
      - "Organizational independence demonstrated (separate reporting line)"
      - "Personnel independence demonstrated (different individuals)"
      - "Technical independence demonstrated (separate tools/environment)"

  - evidence_id: "svp-traceability-approach"
    description: "Traceability approach (requirements → design → code → tests)"
    mandatory_sil: 3  # MANDATORY for SIL 3-4, HR for SIL 1-2
    source: "VER"
    format: "Section in SVP document"
    storage_path: "docs/plans/SVP.md"
    automation_level: "manual"
    collect_on_agent_action: "ver-create-svp"
    verification_criteria:
      - "Forward traceability defined (requirements → design → code → tests)"
      - "Backward traceability defined (tests → code → design → requirements)"
      - "Traceability matrix format defined"
      - "Traceability tools identified"
      - "Traceability verification criteria defined"

  - evidence_id: "svp-verification-reporting"
    description: "Verification reporting structure and format per 6.2.4.8"
    mandatory_sil: 1  # HR for SIL 1+
    source: "VER"
    format: "Section in SVP document"
    storage_path: "docs/plans/SVP.md"
    automation_level: "manual"
    collect_on_agent_action: "ver-create-svp"
    verification_criteria:
      - "Verification report format defined per 6.2.4.13"
      - "Evidence collection approach defined"
      - "Evidence storage location defined"
      - "Deviation handling process defined"
      - "Report review and approval process defined"

  - evidence_id: "svp-baseline"
    description: "Baselined SVP document approved by PM and VAL"
    mandatory_sil: 1  # HR for SIL 1+
    source: "CM"
    format: "Baselined markdown file with approvals"
    storage_path: "docs/plans/SVP.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "cm-baseline-deliverable"
    verification_criteria:
      - "Document has version 1.0 or higher"
      - "Document status is 'Approved' or 'Baseline'"
      - "Approvals section complete (VER author, QA, PM)"
      - "Approvals section includes VAL (second check)"
      - "Independent Verifier approval present (SIL 3-4)"
      - "Document under configuration control"
      - "Baseline recorded in SCMP baseline register"

