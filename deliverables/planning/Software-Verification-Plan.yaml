# Software Verification Plan (SVP) - Deliverable Metadata
# EN 50128:2011 Section 6.2, Table C.1
# This file defines the metadata, requirements, evidence, and verification criteria
# for the Software Verification Plan deliverable.

deliverable_id: "DOC-004-SVP"
