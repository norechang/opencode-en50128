# ===== Notes =====
notes: |
  **Purpose**: The Software Quality Assurance Verification Report verifies that the SQAP itself
  is complete, internally consistent, readable, traceable, and meets all EN 50128 requirements.
  This is a "verification of the verification plan" - ensuring the QA Plan is sound before it
  is used to guide quality assurance activities throughout the project.

  **Key Characteristics**:
  1. **Plan Verification**: Verifies the SQAP document (not QA activities execution)
  2. **Completeness Check**: All EN 50128 Section 6.5.4 requirements addressed by SQAP
  3. **Consistency Check**: SQAP internally consistent (no contradictions)
  4. **Readability Check**: SQAP meets document quality requirements (5.3.2.7-10)
  5. **Traceability Check**: SQAP traceable to EN 50128 requirements
  6. **Independent Review**: Independent Verifier for SIL 3-4

  **What is Verified**:
  - SQAP completeness (all EN 50128 requirements covered)
  - SQAP internal consistency (no contradictions)
  - SQAP readability (clear, understandable)
  - SQAP traceability (EN 50128 requirements → SQAP sections)
  - QA activities coverage (all lifecycle phases have QA activities)
  - SQAP tailoring to project (SIL level, domain, project size)

  **SIL-Specific Requirements**:
  - **SIL 0-2**: Completeness, consistency, readability verification HIGHLY RECOMMENDED
  - **SIL 3-4**: Completeness, consistency, readability verification MANDATORY,
    Independent verification MANDATORY

  **Workflow**:
  1. SQAP author (QUA) creates SQAP
  2. VER reviews SQAP for completeness (Section 6.5.4.4-6)
  3. VER reviews SQAP for internal consistency
  4. VER reviews SQAP for readability/traceability (Section 5.3.2.7-10, 6.5.4.14-17)
  5. VER checks QA activities coverage for all lifecycle phases
  6. VER identifies non-conformities and issues
  7. VER creates SQAP Verification Report
  8. VER informs SQAP author of non-conformities
  9. SQAP author resolves critical non-conformities
  10. VER re-verifies SQAP (if needed)
  11. VER approves or rejects SQAP
  12. VAL performs second check of verification report

  **Pass Criteria** (SIL 3-4):
  - Completeness: All EN 50128 requirements addressed (100%)
  - Consistency: Zero contradictions found
  - Readability: All document quality requirements met
  - Traceability: All EN 50128 requirements traceable to SQAP sections
  - QA Coverage: All lifecycle phases have QA activities
  - Non-conformities: Zero critical non-conformities
  - Independent verification: Complete with approval

  **Critical Dependencies**:
  - SQAP must exist before verification can begin
  - SQAP Verification Report approval required before project proceeds to development
  - If SQAP verification finds critical non-conformities, SQAP must be corrected and re-verified

  **Key Difference from Other Verification Reports**:
  - Most verification reports verify work products (SRS, SAS, Source Code)
  - SQAP Verification Report verifies a PLAN document (the SQAP itself)
  - Focus is on plan completeness and consistency, not execution of QA activities
  - QA activities execution is verified later by QA reviews and audits

  **Template Compliance**:
  - Document ID format: DOC-002-QA-VER-REPORT-YYYY-NNN
  - Approvals section MUST include VER signature
  - All sections from EN 50128 6.2.4.11 / 6.5.4.8 MUST be present
  - Completeness checklist MUST reference EN 50128 sections
  - Non-conformities MUST be documented with severity

  **Evidence Automation**:
  - Completeness checklist: SEMI-AUTOMATIC (parse SQAP, manual verification)
  - Consistency analysis: MANUAL (requires judgment)
  - Readability check: MANUAL (subjective assessment)
  - Traceability check: SEMI-AUTOMATIC (parse SQAP for EN 50128 references)
  - Non-conformities: MANUAL (Verifier judgment)
  - Verification decision: MANUAL (Verifier approval)
