# ===== Notes =====
notes: |
  Software Maintenance Verification is MANDATORY for ALL SIL levels per EN 50128 Section 9.2.4.6(b).
  Verification SHALL verify: maintenance records, change authorization, impact analysis, regression testing.
  Independent verification MANDATORY for SIL 3-4 per Section 9.2.4.6(b).
  Verification follows Software Verification Plan (SVP) techniques per Section 6.2.
  Impact Analysis verification: HIGHLY RECOMMENDED SIL 1-2, MANDATORY SIL 3-4 (Table A.10).
  Traceability verification: HIGHLY RECOMMENDED SIL 2, MANDATORY SIL 3-4 (Table A.10).
  Static analysis verification: MANDATORY SIL 2+ (MISRA C compliance).
  Test coverage verification: 100% statement/branch/condition for SIL 3+, 100% MC/DC for SIL 4.
  Complexity verification: ≤10 for SIL 3-4, ≤15 for SIL 2.
  Verification Report created per maintenance release.
  Verification conclusion must be PASS/FAIL with justification.

