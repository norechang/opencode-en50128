# ===== Notes =====
notes: |
  **Software Maintenance Plan (Deliverable #41)**
  
  **Purpose**: Establish procedures for software maintenance to preserve software safety integrity
  level and dependability when making corrections, enhancements, or adaptations per EN 50128 Section 9.2.
  
  **Applicability** (EN 50128 9.2.4.1):
  Section 9.2 applies to ALL changes, even minor ones. This is NOT retrospective for existing software
  unless subjected to major modifications, but highly recommended.
  
  **Key Content** (EN 50128 9.2.4.6 - ALL MANDATORY):
  1. **Error reporting and error logs** (9.2.4.6(a))
  2. **Maintenance records** (9.2.4.6(a))
  3. **Change authorization** (9.2.4.6(a))
  4. **Software/system configuration control** (9.2.4.6(a))
  5. **Table A.10 techniques and measures** (9.2.4.6(a))
  6. **Verification, validation, assessment of modifications** (9.2.4.6(b))
  7. **Definition of approval authority** (9.2.4.6(c))
  8. **Authorization for modification** (9.2.4.6(d))
  
  **Additional Requirements**:
  9. Major/minor maintenance decision process per 9.2.4.2 (submitted to Assessor for SIL 3+)
  10. Safety impact analysis process per 9.2.4.19 (MANDATORY all SILs)
  11. Mitigation actions process per 9.2.4.20 (MANDATORY all SILs)
  12. Regression testing procedures per 9.2.4.10(d)
  13. Follow ISO/IEC 90003 guidelines per 9.2.4.3
  14. Address maintainability per ISO/IEC 9126 series per 9.2.4.4
  
  **Critical Requirement** (EN 50128 9.2.4.17):
  Maintenance SHALL be performed with AT LEAST THE SAME LEVEL as initial development:
  - Expertise (qualified personnel)
  - Tools (same or equivalent quality)
  - Documentation (same standards)
  - Planning and management (same rigor)
  - Configuration management (same control)
  - Change control (same process)
  - Document control (same standards)
  - **Independence of involved parties** (same independence for VER, VAL at SIL 3+)
  
  **Verification Requirements** (EN 50128 9.2.4.12):
  - Readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
  - Traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
  - Requirements per 9.2.4.6 met (MANDATORY all SILs)
  - Internal consistency (MANDATORY SIL 3+)
  - Results recorded in DOC-044 (Maintenance Verification Report)
  
  **PM Agent Responsibility**:
  - Define all maintenance procedures per 9.2.4.6
  - Select and justify Table A.10 techniques per 9.2.4.16
  - Establish major/minor decision process per 9.2.4.2
  - Ensure same level as initial development per 9.2.4.17
  - Coordinate with CM, SAF, TST for procedures
  
  **VER Agent Responsibility**:
  - Verify readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
  - Verify traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
