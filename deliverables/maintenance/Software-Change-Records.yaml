# ===== Verification Criteria =====
verification_criteria:
  completeness:
    - "Change request details per 9.2.4.10(a) (MANDATORY)"
    - "Impact analysis per 9.2.4.10(b) (MANDATORY)"
    - "Modification specification per 9.2.4.10(c) (MANDATORY)"
    - "Revalidation per 9.2.4.10(d) (MANDATORY)"
    - "Regression testing per 9.2.4.10(d) (MANDATORY)"
    - "Re-assessment per 9.2.4.10(d) (MANDATORY SIL 3+)"
    - "Safety impact analysis per 9.2.4.19 (MANDATORY)"
    - "All 9.2.4.10 requirements addressed"
  
  correctness:
    - "Change request accurate"
    - "Impact analysis accurate and thorough"
    - "Modification specification accurate"
    - "Revalidation adequate for change"
    - "Regression testing adequate for change"
    - "Safety impact analysis correct"
  
  consistency:
    - "Internal consistency per 9.2.4.14(b) (MANDATORY SIL 3+)"
    - "Consistent with Software Maintenance Plan"
    - "No conflicting information"
    - "All cross-references valid"
  
  traceability:
    - "Traceability per 6.5.4.14-6.5.4.17 and 9.2.4.14(a) (MANDATORY SIL 3+)"
    - "Traceability to change request"
    - "Traceability to affected components"
    - "Traceability to requirements"
    - "Traceability to tests"
  
  readability:
    - "Readability per 5.3.2.7-5.3.2.10 and 9.2.4.14(a) (MANDATORY SIL 3+)"
    - "Clear and unambiguous language"
    - "Consistent terminology"

# ===== Configuration Management =====
configuration_management:
  baseline_name: "Change Record Baseline"
  baseline_trigger: "After change completion and approval"
  change_control: "Change Records are IMMUTABLE after approval (audit trail)"
  versioning: "Change records are individual snapshots per change (no versioning)"
  storage_location: "config/baselines/change-records/<change-id>/"

