# ===== Notes =====
notes: |
  **Software Change Records (Deliverable #42)**
  
  **Purpose**: Document each maintenance activity with complete traceability from change request
  through impact analysis, modification, and revalidation per EN 50128 Section 9.2.4.9-9.2.4.10.
  
  **Key Content** (EN 50128 9.2.4.10 - ALL MANDATORY):
  1. **Change request details** per 9.2.4.10(a):
     - Modification or change request
     - Version identification
     - Nature of fault (if bug fix)
     - Required change
     - Source for change
  
  2. **Impact analysis** per 9.2.4.10(b):
     - Impact on hardware
     - Impact on software
     - Impact on human interaction
     - Impact on environment
     - Possible interactions
  
  3. **Modification specification** per 9.2.4.10(c):
     - Detailed specification of modification carried out
  
  4. **Revalidation/Regression/Re-assessment** per 9.2.4.10(d):
     - Revalidation per SIL level
     - Regression testing per SIL level
     - Re-assessment per SIL level (SIL 3+)
     - Independence same as validation
  
  **One Change Record Per Maintenance Activity**:
  EN 50128 9.2.4.10 states "A Software Change Record shall be established for each maintenance activity."
  This means one change record per change, not a single cumulative document.
  
  **Verification Requirements** (EN 50128 9.2.4.14):
  - Readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
  - Traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
  - Requirements per 9.2.4.10 met (MANDATORY all SILs)
  - Internal consistency (MANDATORY SIL 3+)
  - Results recorded in DOC-044 (Maintenance Verification Report)
  
  **CM Agent Responsibility**:
  - Create change record for each maintenance activity
  - Record change request details per 9.2.4.10(a)
  - Coordinate impact analysis per 9.2.4.10(b)
  - Record modification specification per 9.2.4.10(c)
  - Record revalidation/regression/re-assessment per 9.2.4.10(d)
  
  **Configuration Management**:
  Change Records are IMMUTABLE after approval - they provide audit trail.
  No changes permitted - any corrections require new change record.
