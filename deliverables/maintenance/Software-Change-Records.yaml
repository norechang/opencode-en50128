# ===== Evidence Requirements =====
evidence_requirements:
  - evidence_id: "change-request-details"
    description: "Modification/change request details per 9.2.4.10(a)"
    mandatory_sil: 0
    source: "CM agent from requestor"
    format: "Structured change record (YAML or Markdown)"
    storage_path: "docs/maintenance/change-records/<change-id>.yaml"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/cm create-change-record"
    verification_criteria:
      - "Change request ID unique"
      - "Version identification (before and after)"
      - "Nature of fault (if bug fix)"
      - "Required change description"
      - "Source for change (requestor, rationale)"
      - "Change priority and severity"

  - evidence_id: "impact-analysis"
    description: "Impact analysis on overall system per 9.2.4.10(b)"
    mandatory_sil: 0
    source: "SAF agent, DES agent, CM agent"
    format: "Impact analysis report (Markdown)"
    storage_path: "docs/maintenance/change-records/<change-id>-impact.md"
    automation_level: "manual"
    collect_on_agent_action: "/saf analyze-change-impact"
    verification_criteria:
      - "Impact on hardware analyzed"
      - "Impact on software components analyzed"
      - "Impact on human interaction analyzed"
      - "Impact on environment analyzed"
      - "Possible interactions analyzed"
      - "Safety impact analyzed per 9.2.4.19"
      - "Affected components identified"

  - evidence_id: "modification-specification"
    description: "Detailed specification of modification carried out per 9.2.4.10(c)"
    mandatory_sil: 0
    source: "DES agent, IMP agent"
    format: "Modification specification (Markdown)"
    storage_path: "docs/maintenance/change-records/<change-id>-spec.md"
    automation_level: "manual"
    collect_on_agent_action: "/des specify-modification"
    verification_criteria:
      - "Design changes specified"
      - "Code changes specified"
      - "Test changes specified"
      - "Documentation changes specified"
      - "Changes traceable to requirements"

  - evidence_id: "revalidation-records"
    description: "Revalidation records per 9.2.4.10(d)"
    mandatory_sil: 0
    source: "VAL agent"
    format: "Revalidation report (Markdown)"
    storage_path: "docs/maintenance/change-records/<change-id>-revalidation.md"
    automation_level: "manual"
    collect_on_agent_action: "/val revalidate-change"
    verification_criteria:
      - "Revalidation scope defined per impact"
      - "Changed components revalidated"
      - "Identified affected components revalidated"
      - "Complete system revalidated (if impact warrants)"
      - "Independence same as validation per 9.2.4.10(d)"

  - evidence_id: "regression-testing-records"
    description: "Regression testing records per 9.2.4.10(d)"
    mandatory_sil: 0
    source: "TST agent"
    format: "Regression test report (Markdown)"
    storage_path: "docs/maintenance/change-records/<change-id>-regression.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/tst run-regression-tests"
    verification_criteria:
      - "Regression test scope defined per impact"
      - "Regression tests selected"
      - "Regression tests executed"
      - "Regression test results documented"
      - "All regression tests passed (or failures justified)"

  - evidence_id: "re-assessment-records"
    description: "Re-assessment records per 9.2.4.10(d)"
    mandatory_sil: 3
    source: "Assessor"
    format: "Re-assessment report (Markdown)"
    storage_path: "docs/maintenance/change-records/<change-id>-reassessment.md"
    automation_level: "manual"
    collect_on_agent_action: "External assessor"
    verification_criteria:
      - "Re-assessment scope defined per SIL"
      - "Independent assessor conducts re-assessment (SIL 3+)"
      - "Safety integrity preserved"
      - "Assessment conclusion documented"

  - evidence_id: "safety-impact-analysis"
    description: "Safety impact analysis per 9.2.4.19"
    mandatory_sil: 0
    source: "SAF agent"
    format: "Safety impact analysis (Markdown)"
    storage_path: "docs/maintenance/change-records/<change-id>-safety-impact.md"
    automation_level: "manual"
    collect_on_agent_action: "/saf analyze-safety-impact"
    verification_criteria:
      - "Safety impact identified (none, low, medium, high, critical)"
      - "Safety hazards analyzed"
      - "Safety requirements affected identified"
      - "Mitigation actions defined (if needed)"
      - "Safety approval obtained (SIL 2+)"

