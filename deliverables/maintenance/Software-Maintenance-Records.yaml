# ===== Notes =====
notes: |
  Software Maintenance Records are MANDATORY for ALL SIL levels per EN 50128 Section 9.2.4.6(a).
  Records include: error reporting, error logs, maintenance activity records, change authorization records.
  Configuration Management is MANDATORY for all SIL levels (Table A.10).
  Impact Analysis is HIGHLY RECOMMENDED for SIL 1-2, MANDATORY for SIL 3-4 (Table A.10).
  Traceability is HIGHLY RECOMMENDED for SIL 2, MANDATORY for SIL 3-4 (Table A.10).
  Regression testing records MANDATORY for SIL 2+ per Section 9.2.4.10(d).
  Safety impact analysis records MANDATORY for SIL 2+ per Section 9.2.4.19.
  Maintenance records are continuous (not baselined), reviewed quarterly by QUA.
  Maintenance records feed into Software Maintenance Verification Report (DOC-044).

