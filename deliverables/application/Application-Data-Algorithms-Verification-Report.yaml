# ===== Notes =====
notes: |
  **Application Data/Algorithms Verification Report (Deliverable #35)**
  
  This deliverable **consolidates ALL verification results** for application data and algorithms in systems
  configured by application data/algorithms (EN 50128 Section 8). It is NOT required for generic
  software-only systems.
  
  **Purpose**: Consolidate verification results from all application development activities and provide
  overall verification conclusion for application data/algorithms.
  
  **Key Content** (EN 50128 Section 8.4 - multiple references):
  This report records verification results for:
  
  1. **Application Preparation Plan** (8.4.1.13):
     - Readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
     - Traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
     - Requirements 8.4.1.2-8.4.1.11 met
     - Internal consistency
  
  2. **Application Requirements Specification** (8.4.2.5):
     - Readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
     - Traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
     - Requirements 8.4.2.2-8.4.2.3 met
     - Internal consistency
  
  3. **Application Test Specification** (8.4.4.8):
     - Readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
     - Traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
     - Requirements 8.4.4.6 met (coherency and completeness tests)
     - Internal consistency
  
  4. **Application Test Specification (integration)** (8.4.5.5):
     - Requirements 8.4.5.3 met (integration and installation tests)
  
  5. **Application Preparation Verification** (from DOC-032):
     - Results from DOC-032 Application Preparation Verification Report
  
  **Consolidation Role**:
  This report is a **meta-verification report** that consolidates individual verification results from:
  - Application Preparation Plan verification (recorded here per 8.4.1.13)
  - Application Requirements Specification verification (recorded here per 8.4.2.5)
  - Application Test Specification verification (recorded here per 8.4.4.8)
  - Application Test Specification (integration) verification (recorded here per 8.4.5.5)
  - Application Preparation Verification Report (DOC-032) results
  
  **Difference from Other Verification Reports**:
  - DOC-008 (Req Ver): Verifies generic software requirements specification
  - DOC-012 (Arch Design Ver): Verifies generic software architecture/design
  - DOC-019 (Source Code Ver): Verifies generic software source code
  - DOC-032 (App Prep Ver): Verifies application data/algorithms preparation activities
  - DOC-035 (App Data Ver): **Consolidates ALL application verification** (meta-report)
  
  **Overall Verification Conclusion**:
  This report must provide an overall verification conclusion for application data/algorithms:
  - **PASS**: All verification activities complete, all findings resolved, application approved
  - **FAIL**: Critical issues outstanding, application not approved
  - **CONDITIONAL**: Minor issues outstanding, conditional approval with mitigation plan
  
  **Independence Requirements** (SIL 3-4):
  - Verification team MUST be independent from application development team
  - VER agent cannot also be REQ, DES, or TST for same application
  - VAL provides final check (second check per Table C.1)
  
  **VER Agent Responsibility**:
  - Verify Application Preparation Plan (per 8.4.1.13)
  - Verify Application Requirements Specification (per 8.4.2.5)
  - Verify Application Test Specification (per 8.4.4.8)
  - Verify Application Test Specification integration (per 8.4.5.5)
  - Review DOC-032 (Application Preparation Verification Report)
  - Consolidate all verification findings
  - Verify end-to-end traceability (SIL 2+, MANDATORY SIL 3+)
  - Provide overall verification conclusion
  - NO first check required (per Table C.1 - written by VER, no first check, VAL second check)
  
  **VAL Agent Responsibility** (second check per Table C.1):
  - Review overall verification conclusion
  - Validate verification activities adequate for safety assurance
  - Validate all critical findings resolved
  - Provide final acceptance
  - Approve for deployment
  
  **Approval Criteria**:
  - All application deliverables verified
  - All readability requirements met (SIL 3+)
  - All traceability requirements met (SIL 2+, 100% for SIL 3+)
  - All internal consistency checks passed
  - All critical/major findings resolved
  - Overall verification conclusion: PASS or CONDITIONAL (with mitigation)
  - VAL approval obtained
