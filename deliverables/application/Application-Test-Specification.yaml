# ===== Notes =====
notes: |
  **Application Test Specification (Deliverable #30)**
  
  This deliverable specifies tests for **application data and algorithms** in systems configured by
  application data/algorithms (EN 50128 Section 8). It is NOT required for generic software-only systems.
  
  **Purpose**: Specify tests to be carried out at intermediate or final stage of data/algorithms preparation
  to ensure coherency and completeness with application principles and architecture.
  
  **Key Content** (EN 50128 8.4.4.6):
  1. Tests at **intermediate stage** of data/algorithms preparation
  2. Tests at **final stage** of data/algorithms preparation
  3. Tests ensuring **coherency** of data/algorithms with **application principles**
  4. Tests ensuring **completeness** of data/algorithms with **application principles**
  5. Tests ensuring **coherency** of data/algorithms with **application architecture**
  6. Tests ensuring **completeness** of data/algorithms with **application architecture**
  
  **Difference from Generic Software Test Specifications**:
  - DOC-007 (Overall Software Test Spec): Tests for generic software requirements
  - DOC-020 (Component Test Spec): Unit tests for generic software components
  - DOC-022 (Integration Test Spec): Integration tests for generic software
  - DOC-030 (App Test Spec): Tests for application data/algorithms coherency and completeness
  
  **Test Stages**:
  - **Intermediate stage**: Tests during data/algorithms preparation (early detection of issues)
  - **Final stage**: Tests on complete application data/algorithms before deployment
  
  **Test Focus**:
  - **Coherency**: Data/algorithms are internally consistent and consistent with:
    - Application principles (e.g., signalling principles for interlocking)
    - Application architecture (e.g., component locations, interfaces)
  - **Completeness**: All required data/algorithms are present and cover all:
    - Application requirements (from DOC-028)
    - Application architecture elements (from DOC-031)
  
  **Verification Requirements** (EN 50128 8.4.4.8):
  - Readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
  - Traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
  - Requirements 8.4.4.6 met (coherency and completeness tests)
  - Internal consistency (MANDATORY SIL 3+)
  - Results recorded in Application Data/Algorithms Verification Report (DOC-035)
  
  **TST Agent Responsibility**:
  - Create test specification for intermediate stage testing
  - Create test specification for final stage testing
  - Define tests for data/algorithms coherency (principles and architecture)
  - Define tests for data/algorithms completeness (principles and architecture)
  - Create traceability to application requirements (SIL 2+, MANDATORY SIL 3+)
  - Ensure all test cases have unique IDs and expected results
  
  **VER Agent Responsibility**:
  - Verify readability (MANDATORY SIL 3+)
  - Verify traceability (MANDATORY SIL 3+)
  - Verify requirements 8.4.4.6 met (coherency and completeness tests specified)
  - Verify internal consistency (MANDATORY SIL 3+)
  - Record results in DOC-035 (Application Data/Algorithms Verification Report)
  
  **VAL Agent Responsibility**:
  - Validate test specification covers all application requirements
  - Validate coherency tests adequate
  - Validate completeness tests adequate
  - Validate test specification realizable with available application tools
