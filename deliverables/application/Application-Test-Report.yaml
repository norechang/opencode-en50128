# ===== Notes =====
notes: |
  **Application Test Report (Deliverable #33)**
  
  This deliverable documents execution of **application tests** for systems configured by application
  data/algorithms (EN 50128 Section 8). It is NOT required for generic software-only systems.
  
  **Purpose**: Document the correct and complete execution of tests defined in Application Test
  Specification (DOC-030).
  
  **Key Content** (EN 50128 8.4.4.3):
  1. **Correct execution** of tests from Application Test Specification
  2. **Complete execution** of tests from Application Test Specification
  
  **"Correct Execution"** means:
  - Tests executed according to test specification procedures
  - Test inputs correct
  - Test execution environment correct
  - Test results accurately recorded
  
  **"Complete Execution"** means:
  - ALL tests from specification executed (100%)
  - No tests skipped (or skips justified)
  - All intermediate and final stage tests executed
  - All coherency and completeness tests executed
  
  **Difference from Other Test Reports**:
  - DOC-021 (Component Test Report): Unit test results for generic software
  - DOC-023 (Integration Test Report): Integration test results for generic software
  - DOC-026 (Overall Test Report): System test results for generic software
  - DOC-033 (App Test Report): Test results for application data/algorithms
  
  **Test Stages**:
  - **Intermediate stage tests**: Tests during data/algorithms preparation
  - **Final stage tests**: Tests on complete application data/algorithms
  
  **Test Focus** (per DOC-030 Application Test Specification):
  - **Coherency tests**: Data/algorithms coherent with application principles and architecture
  - **Completeness tests**: All required data/algorithms present
  
  **Installation Testing** (EN 50128 8.4.5.1):
  After application installed on target system:
  - Factory test (optional)
  - Integration tests on complete installation (MANDATORY)
  - Final acceptance tests (MANDATORY)
  
  **Failure Management**:
  - All test failures MUST be analyzed (root cause identified)
  - All test failures MUST be resolved (fixed) OR justified (deferred with rationale)
  - Critical failures MUST be resolved before approval (SIL 3+)
  
  **Independence Requirements** (SIL 3-4):
  - Test execution may be performed by TST agent
  - Test results verification MUST be independent (VER agent)
  - VER agent verifies completeness and correctness of test execution
  
  **TST Agent Responsibility**:
  - Execute all tests from Application Test Specification
  - Record all test results (pass/fail, inputs, outputs, timestamps)
  - Create test execution logs (machine-readable format)
  - Summarize test results (pass/fail counts, coverage)
  - Analyze all test failures (root cause, resolution)
  - Create traceability to test specification (SIL 2+, MANDATORY SIL 3+)
  - Document correct and complete test execution
  
  **VER Agent Responsibility**:
  - Verify all tests executed (completeness)
  - Verify test execution correct (per specification procedures)
  - Verify all test results recorded
  - Verify all failures analyzed and resolved/justified
  - Verify traceability complete (SIL 2+, MANDATORY SIL 3+)
  - Check in DOC-032 (Application Preparation Verification Report)
  
  **VAL Agent Responsibility**:
  - Validate test results demonstrate application data/algorithms meet requirements
  - Validate coherency tests adequate
  - Validate completeness tests adequate
  - Validate failure resolutions acceptable
  - Provide final acceptance
  
  **Approval Criteria**:
  - All tests executed (100%)
  - All test results recorded
  - All coherency tests passed
  - All completeness tests passed
  - All failures analyzed
  - All critical/major failures resolved (SIL 3+)
  - Traceability complete (SIL 2+, MANDATORY SIL 3+)
