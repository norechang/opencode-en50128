    source: "VER and VAL agents"
    format: "Review meeting minutes (Markdown)"
    storage_path: "docs/application/reviews/app-req-review-records.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver review, /val review"
    verification_criteria:
