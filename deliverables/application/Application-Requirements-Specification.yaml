# ===== Evidence Requirements =====
evidence_requirements:
  - evidence_id: "app-req-traceability-matrix"
    description: "Traceability matrix linking application requirements to generic software requirements and application conditions"
    mandatory_sil: 2
    source: "REQ agent"
    format: "Markdown table or CSV"
    storage_path: "docs/application/requirements/traceability-matrix.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/req create-app-traceability"
    verification_criteria:
      - "Every application requirement traced to generic software requirement or application condition"
      - "No orphaned application requirements"
      - "Traceability bidirectional (forward and backward)"

  - evidence_id: "app-req-specification-document"
    description: "Complete Application Requirements Specification document per EN 50128 8.4.2"
    mandatory_sil: 1
    source: "REQ agent"
    format: "Markdown with YAML frontmatter"
    storage_path: "docs/application/requirements/Application-Requirements-Specification.md"
    automation_level: "manual"
    collect_on_agent_action: "/req create-app-requirements"
    verification_criteria:
      - "Installation-specific requirements present (track layout, signal locations, speed limits)"
      - "Reference to generic software application conditions"
      - "Reference to application tools conditions"
      - "Application data and algorithms requirements specified"
      - "All requirements have unique IDs"
      - "All requirements are testable"

  - evidence_id: "app-req-installation-data"
    description: "Installation-specific data (track layout, signal locations, speed limits, etc.)"
    mandatory_sil: 1
    source: "REQ agent from customer input"
    format: "YAML or CSV"
    storage_path: "docs/application/requirements/installation-data.yaml"
    automation_level: "manual"
    collect_on_agent_action: "/req capture-installation-data"
    verification_criteria:
      - "All installation-specific parameters documented"
      - "Data format validated against generic software application conditions"
      - "Completeness verified against application requirements"

  - evidence_id: "app-req-consistency-check"
    description: "Internal consistency verification of Application Requirements Specification"
    mandatory_sil: 2
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/application/verification/app-req-consistency-check.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/ver verify-app-requirements"
    verification_criteria:
      - "No conflicting requirements"
      - "All references valid"
      - "Terminology consistent with generic software"
      - "Data types compatible with generic software interfaces"

  - evidence_id: "app-req-readability-check"
    description: "Readability verification per EN 50128 5.3.2.7-5.3.2.10"
    mandatory_sil: 3
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/application/verification/app-req-readability-check.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-app-req-readability"
    verification_criteria:
      - "Clear and unambiguous language"
      - "Consistent terminology"
      - "Proper document structure"
      - "Adequate detail level"

