# ===== Notes =====
notes: |
  **Application Requirements Specification (Deliverable #28)**
  
  This deliverable is specific to **systems configured by application data/algorithms** (EN 50128 Section 8).
  It is NOT required for generic software-only systems.
  
  **Purpose**: Define requirements for a specific installation using approved generic software.
  Typical examples: interlocking system configured for specific railway station, signalling system
  customized for specific track layout.
  
  **Key Content** (EN 50128 8.4.2.2-8.4.2.3):
  1. Installation-specific requirements (track layout, signal locations, speed limits)
  2. Reference to application conditions of generic software
  3. Reference to application tools conditions
  4. Standards with which application shall comply (e.g., signalling principles)
  5. Requirements for application data and algorithms processed by generic software
  
  **Difference from Generic Software Requirements (DOC-006-SRS)**:
  - DOC-006 (SRS): Requirements for the **generic software** (reusable across installations)
  - DOC-028 (App Req Spec): Requirements for a **specific installation** using the generic software
  
  **Verification Requirements** (EN 50128 8.4.2.5):
  - Readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
  - Traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
  - Internal consistency (MANDATORY SIL 3+)
  - Results recorded in Application Data/Algorithms Verification Report (DOC-035)
  
  **REQ Agent Responsibility**:
  - Capture installation-specific requirements from customer
  - Reference generic software application conditions (from DOC-009-SAS)
  - Reference application tools conditions
  - Create traceability to generic software requirements
  - Ensure all requirements testable and have unique IDs
  
  **VER Agent Responsibility**:
  - Verify readability (SIL 3+)
  - Verify traceability (SIL 2+, MANDATORY SIL 3+)
  - Verify internal consistency (SIL 2+, MANDATORY SIL 3+)
  - Verify compatibility with generic software capabilities
  - Record results in DOC-032 (Application Preparation Verification Report)
  
  **VAL Agent Responsibility**:
  - Validate application requirements against customer needs
  - Validate installation data accuracy
  - Validate application requirements realizable with generic software
