# ===== Notes =====
notes: |
  **Application Preparation Verification Report (Deliverable #32)**
  
  This deliverable documents verification of **application data and algorithms** preparation for systems
  configured by application data/algorithms (EN 50128 Section 8). It is NOT required for generic
  software-only systems.
  
  **Purpose**: Document all verification activities ensuring correctness, completeness, and coherency of
  application data/algorithms, and evaluate compatibility with generic application.
  
  **Key Content** (EN 50128 8.4.4.4):
  1. **Document every activity** performed to ensure:
     - **Correctness** of data/algorithms
     - **Completeness** of data/algorithms
     - **Coherency** with application principles (e.g., signalling principles for interlocking)
     - **Coherency** with specific application architecture
  2. **Evaluate compatibility** of data/algorithms with generic application
  
  **Additional Content** (EN 50128 8.4.5.1):
  3. **Check completeness and correctness** of tests performed on complete installation
  
  **Difference from Other Verification Reports**:
  - DOC-008 (Req Ver): Verifies generic software requirements specification
  - DOC-012 (Arch Design Ver): Verifies generic software architecture/design
  - DOC-019 (Source Code Ver): Verifies generic software source code
  - DOC-032 (App Prep Ver): Verifies application data/algorithms preparation
  - DOC-035 (App Data Ver): Consolidates all application data/algorithms verification
  
  **Application Principles**: Domain-specific rules that application must follow
  Examples for interlocking: signalling principles, point management principles, route setting principles
  
  **Coherency Verification**:
  - **With application principles**: Data/algorithms follow domain-specific rules
  - **With application architecture**: Data/algorithms placed correctly in architecture
  
  **Compatibility Evaluation** (EN 50128 8.4.4.4b):
  Verify that application data/algorithms are compatible with generic application:
  - Data types match generic software interfaces
  - Data formats compatible
  - Algorithms compatible with generic software execution model
  - Application conditions of generic software met
  
  **Installation Tests Check** (EN 50128 8.4.5.1):
  After application installed on target system, verify:
  - All integration tests executed on complete installation
  - Tests complete (no missing tests)
  - Tests correct (test results valid)
  - All tests passed or failures resolved
  
  **Independence Requirements** (SIL 3-4):
  - Verification team MUST be independent from application preparation team
  - VER agent cannot also be REQ, DES, or TST for same application
  
  **VER Agent Responsibility**:
  - Document all verification activities
  - Verify correctness of application data and algorithms
  - Verify completeness of application data and algorithms
  - Verify coherency with application principles
  - Verify coherency with application architecture
  - Evaluate compatibility with generic application
  - Check completeness and correctness of installation tests
  - Verify traceability (SIL 2+, MANDATORY SIL 3+)
  - Track all findings with resolution status
  - NO external checks required (per Table C.1 - written by VER, no first/second check)
  
  **Verification Techniques** (Table A.5):
  - Reviews and walkthroughs
  - Static analysis (MANDATORY SIL 3+)
  - Traceability analysis (MANDATORY SIL 3+)
  - Compatibility checking
  - Formal proof (highly recommended SIL 4)
  
  **Approval Criteria**:
  - All correctness issues resolved
  - All completeness issues resolved
  - All coherency issues resolved
  - All compatibility issues resolved
  - All critical/major findings resolved
  - Traceability complete (SIL 2+, MANDATORY SIL 3+)
