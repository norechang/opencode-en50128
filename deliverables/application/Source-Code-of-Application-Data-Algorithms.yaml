# ===== Notes =====
notes: |
  **Source Code of Application Data/Algorithms (Deliverable #34)**
  
  This deliverable is the **executable source code** for application data and algorithms in systems
  configured by application data/algorithms (EN 50128 Section 8). It is NOT required for generic
  software-only systems.
  
  **Purpose**: Provide source code for application-specific data and algorithms that configure the
  generic software for a specific installation.
  
  **Key Content** (EN 50128 8.4.4.1):
  1. **Source code** of application data (parameters, configurations, object descriptions)
  2. **Source code** of application algorithms (function blocks, state charts, ladder logic)
  3. **Compilation** of source code to executable form
  
  **Difference from Generic Software Source Code (DOC-018)**:
  - DOC-018 (Source Code): Source code of **generic software** (C code)
  - DOC-034 (App Source Code): Source code of **application data/algorithms** (data files, diagrams)
  
  **Application Data Source Format**:
  Typically structured data formats:
  - XML, JSON, YAML (structured data)
  - CSV (tabular data)
  - Database files
  - Domain-specific configuration formats
  
  Examples for interlocking:
  - Signal identities and locations
  - Point identities and types
  - Track section definitions
  - Speed limits
  - Route definitions
  
  **Application Algorithms Source Format**:
  **Diagrammatic languages RECOMMENDED** (EN 50128 8.4.4.1, Table A.16):
  - Function block diagrams (FBD)
  - State charts / State machines
  - Relay ladder diagrams (RLD)
  - Sequential function charts (SFC)
  
  These are typically:
  - Created using specialized application tools (T2/T3 tools)
  - Converted/compiled to executable code
  - Executed by generic software runtime
  
  Examples for interlocking:
  - Signal management logic (function blocks)
  - Point management logic (state charts)
  - Route setting logic (ladder logic)
  
  **Compilation** (EN 50128 8.4.4.1):
  Application source code must be compiled or translated to executable form:
  - Data files validated and loaded into runtime format
  - Algorithms translated/compiled to executable code or bytecode
  - Compilation must succeed without errors
  
  **Coding Standards** (Table A.12):
  - MANDATORY for SIL 3+ (highly recommended SIL 2)
  - May be specific to application tools and languages
  - Should cover: naming conventions, structure, documentation, error handling
  
  **Traceability** (SIL 2+, MANDATORY SIL 3+):
  - Every application requirement traced to source code element
  - Every architecture component traced to source code file
  - 100% bidirectional traceability for SIL 3+
  
  **DES Agent Responsibility**:
  - Create application data source files (parameters, configurations)
  - Create application algorithms source files (diagrammatic languages recommended)
  - Compile/translate source code to executable form
  - Document source code structure and content (SIL 2+)
  - Create traceability to architecture and requirements (SIL 2+, MANDATORY SIL 3+)
  - Apply coding standards (MANDATORY SIL 3+)
  
  **VER Agent Responsibility**:
  - Verify all application data in source form
  - Verify all application algorithms in source form
  - Verify source code compiles without errors
  - Verify coding standards applied (MANDATORY SIL 3+)
  - Verify traceability complete (SIL 2+, MANDATORY SIL 3+)
  - Verify source code correct and complete (recorded in DOC-032)
  
  **VAL Agent Responsibility**:
  - Validate source code realizes application requirements
  - Validate source code implements application architecture
  - Validate source code correct for installation
  - Provide final acceptance
  
  **Typical Application Tools** (T2/T3 classification):
  - Interlocking configuration tools (ladder logic editors)
  - Signalling data editors
  - Function block diagram editors
  - State chart editors
  - Configuration management tools
  
  These tools are classified per EN 50128 6.7 and require validation (DOC-027).
