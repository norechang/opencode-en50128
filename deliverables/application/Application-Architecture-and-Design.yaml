# ===== Notes =====
notes: |
  **Application Architecture and Design (Deliverable #31)**
  
  This deliverable defines the architecture and design of **application data and algorithms** for systems
  configured by application data/algorithms (EN 50128 Section 8). It is NOT required for generic
  software-only systems.
  
  **Purpose**: Define how generic hardware and software components are used in the specific application,
  and design the application data and algorithms that configure the generic software for the specific
  installation.
  
  **Key Content** (EN 50128 8.4.3):
  1. **Quantity and type** of generic hardware components to be used
  2. **Quantity and type** of generic software components to be used
  3. **Location** of components in specific application architecture
  4. **Location** of application data in specific application architecture
  5. **Location** of application algorithms in specific application architecture
  6. **Design** of application data processed by generic software
  7. **Design** of application algorithms processed by generic software
  
  **Difference from Generic Software Architecture (DOC-009-SAS)**:
  - DOC-009 (SAS): Architecture of the **generic software** (reusable across installations)
  - DOC-031 (App Arch Design): Architecture for a **specific installation** using the generic software
  
  **Application Data**: Typically parameter values, object descriptions (identity, type, location)
  Example for interlocking: signal identities, point identities, track sections, speed limits
  
  **Application Algorithms**: Typically function block diagrams, state charts, relay ladder diagrams
  Example for interlocking: signal management logic, point management logic, route logic
  
  **Design Approach** (EN 50128 8.4.4.1):
  - **Diagrammatic languages RECOMMENDED** for application algorithms (Table A.16)
  - Function block diagrams, state charts, ladder diagrams
  - Convertible to source code via specialized languages
  
  **DES Agent Responsibility**:
  - Specify quantity and type of generic hardware components
  - Specify quantity and type of generic software components
  - Define component locations in architecture
  - Define application data locations in architecture
  - Define application algorithms locations in architecture
  - Design application data (structure, types, values)
  - Design application algorithms (logic, interfaces)
  - Create architecture diagram
  - Specify interfaces (MANDATORY SIL 3+)
  - Create traceability to application requirements (SIL 2+, MANDATORY SIL 3+)
  
  **VER Agent Responsibility**:
  - Verify all content per 8.4.3 present
  - Verify compatibility with generic software
  - Verify traceability to application requirements (SIL 2+, MANDATORY SIL 3+)
  - Verify interfaces fully defined (MANDATORY SIL 3+)
  - Record results in DOC-032 (Application Preparation Verification Report)
  
  **VAL Agent Responsibility**:
  - Validate architecture realizes all application requirements
  - Validate application data design correct for installation
  - Validate application algorithms design correct for installation
  - Validate architecture compatible with generic software capabilities
