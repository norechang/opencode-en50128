# ===== Notes =====
notes: |
  **Application Preparation Plan (Deliverable #29)**
  
  This deliverable defines the **application development process** for systems configured by application
  data/algorithms (EN 50128 Section 8). It is NOT required for generic software-only systems.
  
  **Purpose**: Define and detail the process for developing application-specific data and algorithms that
  configure generic software for a specific installation.
  
  **Key Content** (EN 50128 8.4.1.2-8.4.1.11):
  1. Application development process (activities, deliverables, roles)
  2. Documentation structure for application preparation
  3. Selected techniques from Table A.11 with justification per 4.8 and 4.9
  4. Procedures and application tools (with tool classification per 6.7: T1/T2/T3)
  5. Verification and validation activities for data/algorithms (completeness, correctness, compatibility)
  6. Verification and validation activities for tool/software compatibility
  7. Risk analysis covering application development process, tools, procedures (SIL 2+)
  8. Independence requirements per EN 50128 5.1 (SIL 2+)
  9. Tool class definition for all hardware/software tools
  10. Notation strategy (familiar to application engineers; documentation and training for new notations)
  
  **Scope**: Can be produced either for:
  - Each specific application (e.g., specific railway station interlocking), OR
  - A class of specific applications (e.g., all small station interlockings)
  
  **Tool Classification** (EN 50128 6.7):
  - T1: No influence on executable code (e.g., text editors, version control)
  - T2: Support/facilitate testing or verification (e.g., test harness, coverage tools)
  - T3: Generate/translate executable code (e.g., compilers, code generators, configuration tools)
  
  Application tools (e.g., interlocking configuration tool, signalling data editor) are typically **T2 or T3**
  and require validation per 6.7.
  
  **Verification Requirements** (EN 50128 8.4.1.13):
  - Readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
  - Traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
  - Requirements 8.4.1.2 to 8.4.1.11 met
  - Internal consistency (MANDATORY SIL 3+)
  - Results recorded in Application Data/Algorithms Verification Report (DOC-035)
  
  **Implementation Verification** (EN 50128 8.4.1.14):
  The implementation of the Application Preparation Plan shall be verified and validated for each specific
  application (recorded in DOC-032: Application Preparation Verification Report).
  
  **REQ or DES Agent Responsibility**:
  - Define application development process
  - Select and justify techniques from Table A.11
  - Specify procedures and classify application tools
  - Define V&V activities
  - Coordinate with SAF for risk analysis
  - Specify independence requirements
  
  **VER Agent Responsibility**:
  - Verify readability (SIL 3+)
  - Verify traceability (SIL 3+)
  - Verify all requirements 8.4.1.2-8.4.1.11 met
  - Verify internal consistency (SIL 3+)
  - Record results in DOC-035
  
  **VAL Agent Responsibility**:
  - Validate application development process appropriate for target SIL
  - Validate risk analysis adequacy
  - Validate V&V activities sufficient for safety assurance
