# ===== Evidence Requirements =====
evidence_requirements:
  - evidence_id: "software-identification-procedures"
    description: "Step-by-step procedures to correctly identify software release per 9.1.4.7"
    mandatory_sil: 0
    source: "PM agent"
    format: "Markdown with numbered steps"
    storage_path: "docs/deployment/manual/software-identification-procedures.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm create-identification-procedures"
    verification_criteria:
      - "Procedures reference self-identification mechanisms per 9.1.4.11"
      - "Version information extraction procedures"
      - "Configuration data version extraction procedures"
      - "Product identity verification procedures"
      - "Verification at loading process and after loading"

  - evidence_id: "software-installation-procedures"
    description: "Step-by-step procedures to correctly install software release per 9.1.4.7"
    mandatory_sil: 0
    source: "PM agent"
    format: "Markdown with numbered steps"
    storage_path: "docs/deployment/manual/software-installation-procedures.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm create-installation-procedures"
    verification_criteria:
      - "Pre-installation checks defined"
      - "Installation steps detailed and sequential"
      - "Post-installation verification defined"
      - "Verification at each critical step (SIL 2+)"
      - "Error handling procedures defined"
      - "Installation abort procedures defined"

  - evidence_id: "installation-verification-checklist"
    description: "Checklist to verify correct installation"
    mandatory_sil: 0
    source: "PM agent"
    format: "Markdown checklist"
    storage_path: "docs/deployment/manual/installation-verification-checklist.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm create-installation-checklist"
    verification_criteria:
      - "Software version verification using self-identification"
      - "Configuration data verification"
      - "Hardware compatibility verification"
      - "Functional testing after installation"
      - "Safety function verification"
      - "Diagnostic information verification per 9.1.4.15"

  - evidence_id: "rollback-procedure-reference"
    description: "Reference to rollback procedures from Deployment Plan per 9.1.4.10"
    mandatory_sil: 0
    source: "PM agent"
    format: "Markdown reference"
    storage_path: "docs/deployment/manual/rollback-procedure-reference.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm link-rollback-procedures"
    verification_criteria:
      - "Rollback trigger conditions referenced"
      - "Rollback procedure steps referenced or included"
      - "Rollback verification referenced or included"

  - evidence_id: "incremental-deployment-procedures"
    description: "Procedures for incremental deployment (component-by-component) per 9.1.4.8"
    mandatory_sil: 2
    source: "PM agent"
    format: "Markdown with step-by-step procedures"
    storage_path: "docs/deployment/manual/incremental-deployment-procedures.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm create-incremental-deployment"
    verification_criteria:
      - "Component deployment order defined"
      - "Version compatibility checking procedures per 9.1.4.8"
      - "Incompatible version activation exclusion procedures"
      - "Component integration verification after each increment"

  - evidence_id: "error-detection-procedures"
    description: "Procedures for error detection in storage, transfer, transmission, duplication per 9.1.4.20"
    mandatory_sil: 2
    source: "PM agent"
    format: "Markdown"
    storage_path: "docs/deployment/manual/error-detection-procedures.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm create-error-detection-procedures"
    verification_criteria:
      - "Storage error detection procedures"
      - "Transfer error detection procedures (e.g., checksums, CRCs)"
      - "Transmission error detection procedures"
      - "Duplication error detection procedures"
      - "Error response procedures (abort, retry, alert)"

  - evidence_id: "diagnostic-access-procedures"
    description: "Procedures to access diagnostic information per 9.1.4.15"
    mandatory_sil: 1
    source: "PM agent"
    format: "Markdown"
    storage_path: "docs/deployment/manual/diagnostic-access-procedures.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm create-diagnostic-procedures"
    verification_criteria:
      - "Diagnostic information access methods defined"
      - "Fault monitoring information access defined"
      - "Diagnostic output interpretation guidance"

  - evidence_id: "deployment-manual-readability-check"
    description: "Readability verification per 5.3.2.7-5.3.2.10 and 9.1.4.17(a)"
    mandatory_sil: 3
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/deployment/verification/deployment-manual-readability-check.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-deployment-manual-readability"
    verification_criteria:
      - "Clear and unambiguous language"
      - "Consistent terminology"
      - "Proper document structure"
      - "Adequate detail level"
      - "Procedures understandable by target audience"

  - evidence_id: "deployment-manual-traceability-check"
    description: "Traceability verification per 6.5.4.14-6.5.4.17 and 9.1.4.17(a)"
    mandatory_sil: 3
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/deployment/verification/deployment-manual-traceability-check.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-deployment-manual-traceability"
    verification_criteria:
      - "Traceability to Deployment Plan (DOC-036)"
      - "Traceability to self-identification mechanisms (DOC-010)"
      - "Traceability to configuration management procedures (DOC-003)"
      - "All references valid and complete"

  - evidence_id: "deployment-manual-consistency-check"
    description: "Internal consistency verification per 9.1.4.17(b)"
    mandatory_sil: 3
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/deployment/verification/deployment-manual-consistency-check.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-deployment-manual-consistency"
    verification_criteria:
      - "No conflicting procedures"
      - "All cross-references valid"
      - "Consistent terminology throughout"
      - "Procedures compatible with each other"

  - evidence_id: "deployment-manual-requirements-check"
    description: "Verification against 9.1.4.7 requirements per 9.1.4.17(a)"
    mandatory_sil: 0
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/deployment/verification/deployment-manual-requirements-check.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-deployment-manual-requirements"
    verification_criteria:
      - "Procedures to correctly identify software release present per 9.1.4.7"
      - "Procedures to correctly install software release present per 9.1.4.7"
      - "All 9.1.4.7 requirements addressed"

