# ===== Notes =====
notes: |
  **Software Deployment Manual (Deliverable #37)**
  
  **Purpose**: Define step-by-step procedures to correctly identify and install software releases
  in operational environments per EN 50128 Section 9.1.4.6-9.1.4.7.
  
  **Key Content** (EN 50128 9.1.4.7):
  1. Procedures to correctly identify software release (MANDATORY)
  2. Procedures to correctly install software release (MANDATORY)
  
  **Additional Content**:
  3. Installation verification procedures
  4. Reference to self-identification mechanisms per 9.1.4.11
  5. Reference to rollback procedures per 9.1.4.10
  6. Incremental deployment procedures per 9.1.4.8 (HR SIL 3-4, R SIL 1-2)
  7. Error detection procedures per 9.1.4.20 (SIL 2+)
  8. Diagnostic information access procedures per 9.1.4.15
  
  **Verification Requirements** (EN 50128 9.1.4.17):
  - Readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
  - Traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
  - Requirements per 9.1.4.7 met (MANDATORY all SILs)
  - Internal consistency (MANDATORY SIL 3+)
  - Results recorded in Deployment Verification Report (DOC-040)
  
  **PM Agent Responsibility**:
  - Write detailed step-by-step installation procedures
  - Define software identification procedures using self-identification
  - Define installation verification procedures
  - Reference rollback procedures from Deployment Plan
  - Define incremental deployment procedures (SIL 2+)
  - Define error detection procedures (SIL 2+)
  - Define diagnostic access procedures
  
  **VER Agent Responsibility**:
  - Verify readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
  - Verify traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
  - Verify requirements per 9.1.4.7 met (MANDATORY)
  - Verify internal consistency (MANDATORY SIL 3+)
  - Record verification results in DOC-040 (Deployment Verification Report)
  
  **VAL Agent Responsibility**:
  - Validate procedures usable by deployment personnel
  - Validate procedures adequate for operational environment
  - Validate error detection adequate for safety
  
  **Target Audience**: Deployment personnel (may not be software engineers)
  
  **Key Distinction**:
  - DOC-036 (Deployment Plan): HIGH-LEVEL plan (what, who, when)
  - DOC-037 (Deployment Manual): DETAILED procedures (how, step-by-step)
