# ===== Evidence Requirements =====
evidence_requirements:
  - evidence_id: "deployment-procedures-document"
    description: "Complete deployment procedures defining how to identify and install software releases"
    mandatory_sil: 0
    source: "PM agent"
    format: "Markdown with step-by-step procedures"
    storage_path: "docs/deployment/procedures/deployment-procedures.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm create-deployment-procedures"
    verification_criteria:
      - "Software identification procedures defined per 9.1.4.7"
      - "Software installation procedures defined per 9.1.4.7"
      - "Installation verification procedures defined"
      - "Commissioning procedures defined"
      - "Acceptance procedures defined"

  - evidence_id: "rollback-procedures"
    description: "Rollback procedures to return to previous release per 9.1.4.10"
    mandatory_sil: 0
    source: "PM agent"
    format: "Markdown with step-by-step procedures"
    storage_path: "docs/deployment/procedures/rollback-procedures.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm create-rollback-procedures"
    verification_criteria:
      - "Rollback trigger conditions defined"
      - "Rollback procedures step-by-step"
      - "Rollback verification procedures"
      - "Rollback testing procedures"
      - "Data preservation during rollback addressed"

  - evidence_id: "baseline-recording-procedures"
    description: "Procedures for recording and maintaining software baselines per 9.1.4.2"
    mandatory_sil: 1
    source: "CM agent"
    format: "Markdown"
    storage_path: "docs/deployment/procedures/baseline-recording.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/cm create-baseline-procedures"
    verification_criteria:
      - "Baseline recording procedures defined"
      - "Baseline content defined (all configuration items)"
      - "Baseline storage location defined"
      - "Baseline reproducibility procedures per 9.1.4.3"
      - "Traceability to baseline maintained"

  - evidence_id: "self-identification-specification"
    description: "Specification of embedded self-identification mechanisms per 9.1.4.11"
    mandatory_sil: 1
    source: "DES agent"
    format: "Markdown"
    storage_path: "docs/deployment/self-identification-spec.md"
    automation_level: "manual"
    collect_on_agent_action: "/des specify-self-identification"
    verification_criteria:
      - "Version information embedded"
      - "Configuration data version embedded"
      - "Product identity embedded"
      - "Self-identification accessible at loading"
      - "Self-identification accessible after loading"
      - "Code protection considered per 9.1.4.11 NOTE"

  - evidence_id: "incremental-deployment-facilities"
    description: "Facilities to exclude activation of incompatible versions per 9.1.4.8"
    mandatory_sil: 2
    source: "DES agent"
    format: "Design document (Markdown)"
    storage_path: "docs/deployment/incremental-deployment-design.md"
    automation_level: "manual"
    collect_on_agent_action: "/des design-incremental-deployment"
    verification_criteria:
      - "Version compatibility checking implemented"
      - "Incompatible versions prevented from activating"
      - "Component version dependencies tracked"
      - "Activation control mechanisms defined"

  - evidence_id: "installation-traceability-database"
    description: "Database tracking deployed software to installations per 9.1.4.14"
    mandatory_sil: 1
    source: "CM agent"
    format: "Database or CSV"
    storage_path: "config/deployment/installation-traceability.csv"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/cm track-installation"
    verification_criteria:
      - "Every installation has software version recorded"
      - "Critical fault traceability enabled per 9.1.4.14 NOTE"
      - "Deployment date recorded"
      - "Deployment personnel recorded"

  - evidence_id: "error-detection-mechanisms"
    description: "Error detection for storage, transfer, transmission, duplication per 9.1.4.20"
    mandatory_sil: 2
    source: "DES agent"
    format: "Design document (Markdown)"
    storage_path: "docs/deployment/error-detection-design.md"
    automation_level: "manual"
    collect_on_agent_action: "/des design-error-detection"
    verification_criteria:
      - "Storage error detection mechanisms defined"
      - "Transfer error detection mechanisms defined"
      - "Transmission error detection mechanisms defined"
      - "Duplication error detection mechanisms defined"
      - "Executable code coding recommended per 9.1.4.20"

  - evidence_id: "configuration-management-procedures"
    description: "Procedures to prevent harm from co-present versions per 9.1.4.9"
    mandatory_sil: 1
    source: "CM agent"
    format: "Markdown"
    storage_path: "docs/deployment/version-coexistence-procedures.md"
    automation_level: "manual"
    collect_on_agent_action: "/cm define-version-coexistence"
    verification_criteria:
      - "Version coexistence scenarios identified"
      - "Harm prevention procedures defined"
      - "Version isolation mechanisms defined"
      - "Version conflict detection mechanisms"

  - evidence_id: "diagnostic-information-specification"
    description: "Diagnostic information provided by software per 9.1.4.15"
    mandatory_sil: 1
    source: "DES agent"
    format: "Markdown"
    storage_path: "docs/deployment/diagnostic-info-spec.md"
    automation_level: "manual"
    collect_on_agent_action: "/des specify-diagnostics"
    verification_criteria:
      - "Fault monitoring capabilities defined"
      - "Diagnostic outputs specified"
      - "Diagnostic information accessibility defined"
      - "Diagnostic information format defined"

  - evidence_id: "deployment-schedule"
    description: "Deployment schedule with milestones and responsibilities"
    mandatory_sil: 0
    source: "PM agent"
    format: "Markdown or Gantt chart"
    storage_path: "docs/deployment/deployment-schedule.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm create-deployment-schedule"
    verification_criteria:
      - "Deployment milestones defined"
      - "Deployment responsibilities assigned"
      - "Deployment timeline defined"
      - "Dependencies identified"
      - "Risk mitigation activities scheduled"

