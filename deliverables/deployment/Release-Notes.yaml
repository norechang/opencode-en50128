# ===== Notes =====
notes: |
  **Release Notes (Deliverable #38)**
  
  **Purpose**: Provide essential information about application conditions, compatibility, and restrictions
  for a software release per EN 50128 Section 9.1.4.4-9.1.4.5.
  
  **Key Content** (EN 50128 9.1.4.5 - ALL MANDATORY):
  1. **Application conditions** to be adhered to (9.1.4.5(a))
  2. **Compatibility information** among software components and between software and hardware (9.1.4.5(b))
  3. **All restrictions** in using the software (9.1.4.5(c), reference 7.7.4.12)
  
  **Additional Content** (industry best practices, SIL 1+):
  4. Release identification (version, date, baseline)
  5. Changes from previous release (new features, bug fixes, improvements)
  6. Known issues and workarounds
  
  **Verification Requirements** (EN 50128 9.1.4.19):
  - Readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
  - Traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
  - Requirements per 9.1.4.5 met (MANDATORY all SILs)
  - Internal consistency (MANDATORY SIL 3+)
  - Results recorded in Deployment Verification Report (DOC-040)
  
  **DES Agent Responsibility**:
  - Define application conditions per 9.1.4.5(a) (operating environment, operational, training, maintenance)
  - Provide software-to-software compatibility per 9.1.4.5(b)
  - Provide software-to-hardware compatibility per 9.1.4.5(b)
  - Define all usage restrictions per 9.1.4.5(c)
  - Reference validation restrictions from 7.7.4.12
  - Identify release (version, date, baseline)
  - Document changes from previous release
  - Document known issues and workarounds
  - Ensure traceability to SRS/SAS for application conditions (SIL 2+)
  
  **VER Agent Responsibility**:
  - Verify readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
  - Verify traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
  - Verify requirements per 9.1.4.5 met (MANDATORY)
  - Verify internal consistency (MANDATORY SIL 3+)
  - Record verification results in DOC-040 (Deployment Verification Report)
  
  **VAL Agent Responsibility**:
  - Validate application conditions realistic and adequate
  - Validate compatibility information accurate
  - Validate restrictions adequate for safety
  - Validate known issues do not violate safety requirements (SIL 3+)
  
  **Target Audience**: Users, operators, system integrators, maintainers
  
  **Key Safety Aspect**:
  Release Notes are CRITICAL for safety because they define the BOUNDARIES within which
  the software has been validated. Using software outside these boundaries (violating
  application conditions or restrictions) VOIDS validation and may compromise safety.
