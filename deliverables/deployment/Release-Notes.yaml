# ===== Evidence Requirements =====
evidence_requirements:
  - evidence_id: "application-conditions"
    description: "Application conditions to be adhered to per 9.1.4.5(a)"
    mandatory_sil: 0
    source: "DES agent"
    format: "Markdown list"
    storage_path: "docs/deployment/release-notes/application-conditions.md"
    automation_level: "manual"
    collect_on_agent_action: "/des define-application-conditions"
    verification_criteria:
      - "Operating environment conditions (temperature, humidity, vibration)"
      - "Operational conditions (load limits, usage constraints)"
      - "Environmental conditions for safety operation"
      - "Training requirements for operators"
      - "Maintenance requirements"
      - "Traceability to SRS/SAS (SIL 2+)"

  - evidence_id: "compatibility-information-software"
    description: "Software-to-software compatibility information per 9.1.4.5(b)"
    mandatory_sil: 0
    source: "DES agent"
    format: "Markdown table or list"
    storage_path: "docs/deployment/release-notes/software-compatibility.md"
    automation_level: "manual"
    collect_on_agent_action: "/des define-software-compatibility"
    verification_criteria:
      - "Compatible software component versions listed"
      - "Incompatible software component versions listed"
      - "Version dependencies documented"
      - "Interface compatibility documented"
      - "Protocol compatibility documented"

  - evidence_id: "compatibility-information-hardware"
    description: "Software-to-hardware compatibility information per 9.1.4.5(b)"
    mandatory_sil: 0
    source: "DES agent"
    format: "Markdown table or list"
    storage_path: "docs/deployment/release-notes/hardware-compatibility.md"
    automation_level: "manual"
    collect_on_agent_action: "/des define-hardware-compatibility"
    verification_criteria:
      - "Compatible hardware platforms listed"
      - "Incompatible hardware platforms listed"
      - "Hardware requirements documented (CPU, memory, storage)"
      - "Hardware interface requirements documented"
      - "Peripheral requirements documented"

  - evidence_id: "usage-restrictions"
    description: "All restrictions in using the software per 9.1.4.5(c) and 7.7.4.12"
    mandatory_sil: 0
    source: "DES agent"
    format: "Markdown list"
    storage_path: "docs/deployment/release-notes/usage-restrictions.md"
    automation_level: "manual"
    collect_on_agent_action: "/des define-usage-restrictions"
    verification_criteria:
      - "Operational restrictions documented"
      - "Configuration restrictions documented"
      - "Performance restrictions documented"
      - "Safety-related restrictions clearly marked"
      - "Reference to validation restrictions from 7.7.4.12"
      - "Consequences of violating restrictions explained"

  - evidence_id: "release-identification"
    description: "Software version identification information"
    mandatory_sil: 1
    source: "DES agent"
    format: "Markdown"
    storage_path: "docs/deployment/release-notes/release-identification.md"
    automation_level: "manual"
    collect_on_agent_action: "/des identify-release"
    verification_criteria:
      - "Software version number"
      - "Release date"
      - "Product name and identity"
      - "Configuration data version (if applicable)"
      - "Baseline identifier"
      - "Correspondence to self-identification per 9.1.4.11"

  - evidence_id: "release-changes"
    description: "Changes from previous release (new features, bug fixes, improvements)"
    mandatory_sil: 1
    source: "DES agent"
    format: "Markdown with categorization"
    storage_path: "docs/deployment/release-notes/release-changes.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/des document-changes"
    verification_criteria:
      - "New features documented"
      - "Bug fixes documented with issue references"
      - "Improvements documented"
      - "Safety-related changes clearly identified (SIL 3+)"
      - "Impact on existing functionality documented"
      - "Traceability to change requests (SIL 2+)"

  - evidence_id: "known-issues"
    description: "Known issues and workarounds"
    mandatory_sil: 1
    source: "DES agent"
    format: "Markdown list with severity classification"
    storage_path: "docs/deployment/release-notes/known-issues.md"
    automation_level: "manual"
    collect_on_agent_action: "/des document-known-issues"
    verification_criteria:
      - "Known issues listed with severity"
      - "Workarounds provided where available"
      - "Safety impact assessed for each issue"
      - "Issue tracking references included"
      - "No safety-critical issues unresolved (SIL 3+)"

  - evidence_id: "release-notes-readability-check"
    description: "Readability verification per 5.3.2.7-5.3.2.10 and 9.1.4.19(a)"
    mandatory_sil: 3
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/deployment/verification/release-notes-readability-check.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-release-notes-readability"
    verification_criteria:
      - "Clear and unambiguous language"
      - "Consistent terminology"
      - "Proper document structure"
      - "Adequate detail level"
      - "Target audience appropriateness (users, operators, maintainers)"

  - evidence_id: "release-notes-traceability-check"
    description: "Traceability verification per 6.5.4.14-6.5.4.17 and 9.1.4.19(a)"
    mandatory_sil: 3
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/deployment/verification/release-notes-traceability-check.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-release-notes-traceability"
    verification_criteria:
      - "Application conditions traced to SRS/SAS"
      - "Compatibility information traced to design documents"
      - "Restrictions traced to validation report (7.7.4.12)"
      - "Changes traced to change requests"
      - "All references valid and complete"

  - evidence_id: "release-notes-consistency-check"
    description: "Internal consistency verification per 9.1.4.19(b)"
    mandatory_sil: 3
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/deployment/verification/release-notes-consistency-check.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-release-notes-consistency"
    verification_criteria:
      - "No conflicting information"
      - "All cross-references valid"
      - "Consistent terminology throughout"
      - "Version information consistent with baseline"

  - evidence_id: "release-notes-requirements-check"
    description: "Verification against 9.1.4.5 requirements per 9.1.4.19(a)"
    mandatory_sil: 0
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/deployment/verification/release-notes-requirements-check.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-release-notes-requirements"
    verification_criteria:
      - "Application conditions defined per 9.1.4.5(a) (MANDATORY)"
      - "Compatibility information provided per 9.1.4.5(b) (MANDATORY)"
      - "Restrictions defined per 9.1.4.5(c) (MANDATORY)"
      - "All 9.1.4.5 requirements addressed"

