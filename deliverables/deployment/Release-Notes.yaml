verification_criteria:
  completeness:
    - "Application conditions defined per 9.1.4.5(a) (MANDATORY)"
    - "Software-to-software compatibility information per 9.1.4.5(b) (MANDATORY)"
    - "Software-to-hardware compatibility information per 9.1.4.5(b) (MANDATORY)"
    - "All usage restrictions per 9.1.4.5(c) (MANDATORY)"
    - "Reference to validation restrictions from 7.7.4.12 (MANDATORY)"
    - "Release identification complete (version, date, baseline)"
    - "Changes from previous release documented (SIL 1+)"
    - "Known issues documented (SIL 1+)"
    - "All SIL-appropriate techniques applied per Table A.9"
  
  correctness:
    - "Application conditions accurate and realistic"
    - "Compatibility information accurate and tested"
    - "Restrictions accurate and justified"
    - "Release identification matches baseline and self-identification"
    - "Changes accurately reflect modifications"
    - "Known issues accurately describe problems"
  
  consistency:
    - "Internal consistency per 9.1.4.19(b) (MANDATORY SIL 3+)"
    - "Consistent with SRS (application conditions)"
    - "Consistent with SAS (application conditions)"
    - "Consistent with Validation Report (restrictions per 7.7.4.12)"
    - "Consistent with SCMP (version identification)"
    - "No conflicting information"
    - "All cross-references valid"
  
  traceability:
    - "Traceability per 6.5.4.14-6.5.4.17 and 9.1.4.19(a) (MANDATORY SIL 3+)"
    - "Application conditions traced to SRS/SAS (SIL 2+, MANDATORY SIL 3+)"
    - "Compatibility information traced to design documents (SIL 2+)"
    - "Restrictions traced to validation report (SIL 2+, MANDATORY SIL 3+)"
    - "Changes traced to change requests (SIL 2+)"
  
  readability:
    - "Readability per 5.3.2.7-5.3.2.10 and 9.1.4.19(a) (MANDATORY SIL 3+)"
    - "Clear and unambiguous language"
    - "Consistent terminology"
    - "Target audience appropriateness"

