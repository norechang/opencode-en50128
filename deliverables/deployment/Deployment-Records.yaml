# ===== Notes =====
notes: |
  **Deployment Records (Deliverable #39)**
  
  **Purpose**: Provide evidence that the intended software has been correctly loaded at a specific
  installation, via inspection of embedded self-identification mechanisms per EN 50128 Section 9.1.4.12-9.1.4.13.
  
  **Key Content** (EN 50128 9.1.4.13 - MANDATORY):
  1. **Evidence that intended software loaded** (MANDATORY all SILs)
  2. **Inspection of self-identification mechanisms** per 9.1.4.11 (MANDATORY all SILs)
  3. **Stored with delivered system documents** (MANDATORY all SILs)
  4. **Part of commissioning and acceptance** (MANDATORY all SILs)
  
  **Additional Content** (industry best practices, SIL 1+):
  5. Installation identification (location, system ID)
  6. Deployment date and personnel
  7. Hardware configuration
  8. Installation verification results
  9. Deployment procedure compliance
  10. Sign-offs by deployment personnel and commissioning authority
  
  **Critical Safety Function**:
  Deployment Records provide **LEGAL and SAFETY EVIDENCE** that the CORRECT software
  has been loaded at a specific installation. This is critical for:
  - Safety certification and regulatory compliance
  - Critical fault traceability per 9.1.4.14 NOTE (identify all affected installations)
  - Commissioning and acceptance (legal handover)
  - Audit trail for safety investigations
  
  **Verification Requirements** (EN 50128 9.1.4.18):
  - Readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
  - Traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
  - Requirements per 9.1.4.13 met (MANDATORY all SILs)
  - Internal consistency (MANDATORY SIL 3+)
  - Results recorded in Deployment Verification Report (DOC-040)
  
  **PM Agent Responsibility**:
  - Coordinate deployment record collection
  - Record software identification from self-identification mechanisms
  - Record installation identification (location, system ID)
  - Record deployment metadata (date, personnel, procedures)
  - Record hardware configuration
  - Record installation verification results
  - Collect sign-offs from deployment personnel and commissioning authority
  - Store records with delivered system documents
  - Ensure traceability to installation per 9.1.4.14
  
  **VER Agent Responsibility**:
  - Verify readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
  - Verify traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
  - Verify requirements per 9.1.4.13 met (MANDATORY)
  - Verify internal consistency (MANDATORY SIL 3+)
  - Verify self-identification inspection documented
  - Record verification results in DOC-040 (Deployment Verification Report)
  
  **VAL Agent Responsibility**:
  - Validate deployment records complete and accurate
  - Validate self-identification inspection adequate
  - Validate commissioning and acceptance legitimate
  
  **Configuration Management**:
  Deployment Records are **IMMUTABLE** after commissioning/acceptance sign-off.
  They are part of the legal and safety documentation for the installation.
  No changes permitted - any corrections require new deployment with new records.
  
  **Traceability to Installations** (EN 50128 9.1.4.14):
  Deployment Records enable traceability from software baseline to all installations.
  This is CRITICAL when critical faults are discovered - records allow identification
  of all affected installations for corrective action.
