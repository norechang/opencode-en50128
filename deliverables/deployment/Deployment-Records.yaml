# ===== Evidence Requirements =====
evidence_requirements:
  - evidence_id: "software-identification-evidence"
    description: "Evidence that intended software loaded via self-identification inspection per 9.1.4.13"
    mandatory_sil: 0
    source: "Deployment personnel, PM agent records"
    format: "Markdown or CSV with self-identification data"
    storage_path: "docs/deployment/records/software-identification-evidence.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/pm record-software-identification"
    verification_criteria:
      - "Software version from self-identification recorded"
      - "Configuration data version from self-identification recorded"
      - "Product identity from self-identification recorded"
      - "Self-identification extracted at loading process"
      - "Self-identification extracted after loading"
      - "Recorded identification matches intended release"

  - evidence_id: "installation-identification"
    description: "Installation identification (location, system ID, site details)"
    mandatory_sil: 0
    source: "Deployment personnel, PM agent records"
    format: "Markdown or structured data"
    storage_path: "docs/deployment/records/installation-identification.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm record-installation-id"
    verification_criteria:
      - "Installation location recorded (geographic, facility)"
      - "System identifier recorded"
      - "Site contact information recorded"
      - "Installation environment recorded"
      - "Traceability to installation per 9.1.4.14 (SIL 1+)"

  - evidence_id: "deployment-metadata"
    description: "Deployment date, personnel, and process information"
    mandatory_sil: 0
    source: "Deployment personnel, PM agent records"
    format: "Markdown"
    storage_path: "docs/deployment/records/deployment-metadata.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm record-deployment-metadata"
    verification_criteria:
      - "Deployment date and time recorded"
      - "Deployment personnel names and roles recorded"
      - "Deployment procedure version followed recorded"
      - "Deployment Manual version used recorded (DOC-037)"
      - "Deployment duration recorded"

  - evidence_id: "hardware-configuration-record"
    description: "Hardware configuration at installation per 9.1.4.5(b)"
    mandatory_sil: 1
    source: "Deployment personnel, PM agent records"
    format: "Markdown or CSV"
    storage_path: "docs/deployment/records/hardware-configuration.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm record-hardware-config"
    verification_criteria:
      - "Hardware platform identified (model, version)"
      - "CPU, memory, storage specifications recorded"
      - "Peripheral devices recorded"
      - "Hardware serial numbers recorded (SIL 2+)"
      - "Hardware compatibility verified against Release Notes (DOC-038)"

  - evidence_id: "installation-verification-results"
    description: "Results of installation verification per Deployment Manual"
    mandatory_sil: 0
    source: "Deployment personnel, PM agent records"
    format: "Markdown checklist with results"
    storage_path: "docs/deployment/records/installation-verification-results.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/pm record-installation-verification"
    verification_criteria:
      - "All installation verification checks performed per DOC-037"
      - "All checks passed (or deviations documented)"
      - "Functional tests results recorded"
      - "Safety function tests results recorded (SIL 1+)"
      - "Performance tests results recorded (SIL 2+)"

  - evidence_id: "commissioning-acceptance-evidence"
    description: "Evidence that record is part of commissioning and acceptance per 9.1.4.13"
    mandatory_sil: 0
    source: "Commissioning authority, PM agent records"
    format: "Markdown with sign-offs"
    storage_path: "docs/deployment/records/commissioning-acceptance.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm record-commissioning-acceptance"
    verification_criteria:
      - "Commissioning checklist completed"
      - "Acceptance criteria met"
      - "Sign-off by commissioning authority (SIL 3+)"
      - "Sign-off by customer representative (if applicable)"
      - "Date of commissioning and acceptance"

  - evidence_id: "deployment-procedure-compliance"
    description: "Evidence of compliance with Deployment Manual procedures"
    mandatory_sil: 1
    source: "Deployment personnel, PM agent records"
    format: "Markdown checklist"
    storage_path: "docs/deployment/records/procedure-compliance.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/pm record-procedure-compliance"
    verification_criteria:
      - "All Deployment Manual steps followed (DOC-037)"
      - "Deviations documented with justification"
      - "Deviation approvals obtained (SIL 2+)"
      - "Procedure compliance verified by deployment personnel"

  - evidence_id: "deployment-personnel-signoffs"
    description: "Sign-offs by deployment personnel and authorities"
    mandatory_sil: 1
    source: "Deployment personnel, commissioning authority"
    format: "Markdown with signatures/approvals"
    storage_path: "docs/deployment/records/personnel-signoffs.md"
    automation_level: "manual"
    collect_on_agent_action: "/pm collect-signoffs"
    verification_criteria:
      - "Deployment personnel sign-off (SIL 1+, MANDATORY SIL 3+)"
      - "Commissioning authority sign-off (SIL 1+, MANDATORY SIL 3+)"
      - "Independent verifier sign-off (MANDATORY SIL 4)"
      - "Customer representative sign-off (if applicable)"
      - "Date and role recorded for each sign-off"

  - evidence_id: "deployment-records-readability-check"
    description: "Readability verification per 5.3.2.7-5.3.2.10 and 9.1.4.18(a)"
    mandatory_sil: 3
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/deployment/verification/deployment-records-readability-check.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-deployment-records-readability"
    verification_criteria:
      - "Clear and unambiguous language"
      - "Consistent terminology"
      - "Proper document structure"
      - "Adequate detail level"

  - evidence_id: "deployment-records-traceability-check"
    description: "Traceability verification per 6.5.4.14-6.5.4.17 and 9.1.4.18(a)"
    mandatory_sil: 3
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/deployment/verification/deployment-records-traceability-check.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-deployment-records-traceability"
    verification_criteria:
      - "Traceability to Deployment Plan (DOC-036)"
      - "Traceability to Deployment Manual (DOC-037)"
      - "Traceability to Release Notes (DOC-038)"
      - "Traceability to installation per 9.1.4.14 (MANDATORY SIL 1+)"
      - "All references valid and complete"

  - evidence_id: "deployment-records-consistency-check"
    description: "Internal consistency verification per 9.1.4.18(b)"
    mandatory_sil: 3
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/deployment/verification/deployment-records-consistency-check.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-deployment-records-consistency"
    verification_criteria:
      - "No conflicting information"
      - "All cross-references valid"
      - "Consistent terminology throughout"
      - "Software identification consistent across all records"

  - evidence_id: "deployment-records-requirements-check"
    description: "Verification against 9.1.4.13 requirements per 9.1.4.18(a)"
    mandatory_sil: 0
    source: "VER agent"
    format: "Verification report (Markdown)"
    storage_path: "docs/deployment/verification/deployment-records-requirements-check.md"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-deployment-records-requirements"
    verification_criteria:
      - "Evidence that intended software loaded present per 9.1.4.13 (MANDATORY)"
      - "Self-identification inspection documented per 9.1.4.11 (MANDATORY)"
      - "All 9.1.4.13 requirements addressed"

