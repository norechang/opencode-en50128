# =============================================================================
# NOTES
# =============================================================================

notes: |
  CRITICAL INFORMATION:
  
  1. **Overall Test Specification vs. Component Test Specification**:
     - Overall Test Specification: System-level validation tests against SRS (this deliverable)
     - Component Test Specification: Unit-level tests against SDS (separate deliverable DOC-020)
     - Overall tests are black-box (no internal knowledge)
     - Component tests are white-box (internal structure knowledge)
  
  2. **SIL Requirements**:
     - SIL 0: Overall Test Specification recommended (R)
     - SIL 1-2: Overall Test Specification HIGHLY RECOMMENDED (HR)
     - SIL 3-4: Overall Test Specification HIGHLY RECOMMENDED (HR)
     - Functional and black-box testing MANDATORY for SIL 3-4
     - Performance testing MANDATORY for SIL 3-4
     - 100% requirements coverage MANDATORY for SIL 3-4
  
  3. **EN 50128 Table A.7 Validation Techniques** (for test design):
     - Functional and Black-Box Testing (Table A.14): SIL 3-4 MANDATORY
     - Performance Testing (Table A.18): SIL 3-4 MANDATORY
     - Modelling (Table A.17): SIL 1-4 RECOMMENDED
  
  4. **Black-Box Testing Techniques** (Table A.14):
     - Boundary Value Analysis: MANDATORY SIL 3-4
     - Equivalence Classes and Input Partition Testing: MANDATORY SIL 3-4
     - Process Simulation: HR SIL 3-4
     - Error Guessing: MANDATORY SIL 4
     - Test cases focus on inputs/outputs, not internal implementation
  
  5. **Performance Testing** (Table A.18):
     - Timing analysis (execution time, response time)
     - Throughput analysis (data rate, message rate)
     - Resource usage (memory, CPU, I/O)
     - Load testing (peak load, sustained load)
     - Stress testing (overload, failure conditions)
  
  6. **Test Case Structure** (per 7.2.4.19):
     - Test Case ID (TC-XXX)
     - Purpose (what is being tested)
     - Traced SRS requirement(s) (REQ-XXX)
     - Preconditions (initial state)
     - Test steps (inputs, actions)
     - Expected results (outputs, behavior)
     - Acceptance criteria (pass/fail thresholds)
  
  7. **Traceability Requirements** (per 7.2.4.19):
     - Each SRS requirement SHALL have at least one test case
     - Safety requirements SHOULD have multiple test cases (redundancy)
     - 100% requirements coverage MANDATORY for SIL 3-4
     - Traceability matrix format: SRS-REQ-XXX → TC-YYY (one-to-many)
  
  8. **Requirements Coverage**:
     - SIL 0: No mandatory coverage
     - SIL 1: 90% coverage (HR)
     - SIL 2: 95% coverage (HR)
     - SIL 3-4: 100% coverage (MANDATORY)
     - Coverage measured as: (tested requirements / total requirements) * 100%
  
  9. **Relationship to Other Deliverables**:
     - SRS: Defines requirements, Overall Test Specification tests those requirements
     - SVaP: Defines validation approach, Overall Test Specification implements test cases
     - Overall Test Report: Executes tests from Overall Test Specification, records results
     - Validation Report: Uses Overall Test Report results as validation evidence
     - Component Test Specification: Unit-level tests (different scope)
  
  10. **Agent Workflow**:
      - TST agent creates Overall Test Specification using /tst create-overall-test-spec command
      - TST agent reads SRS requirements and creates test cases
      - TST agent applies black-box techniques (boundary value, equivalence class)
      - TST agent creates traceability matrix (requirements → test cases)
      - VER agent reviews Overall Test Specification (first check)
      - VAL agent reviews Overall Test Specification (second check)
      - QA agent verifies template compliance
      - CM agent baselines Overall Test Specification after approvals
  
  11. **Critical Success Factors**:
      - Created during Requirements phase (after SRS complete)
      - 100% requirements coverage for SIL 3-4
      - Black-box approach (no implementation details)
      - Traceability complete (every requirement tested)
      - Performance tests quantifiable
      - Independent review by VER and VAL (SIL 3-4)
      - Baselined before Validation phase begins
  
  12. **Common Pitfalls**:
      - Creating test cases before SRS is complete (dependency violation)
      - Using white-box knowledge in system-level tests (wrong test level)
      - Missing performance tests (MANDATORY SIL 3-4)
      - Incomplete traceability matrix (missing requirements)
      - Ambiguous acceptance criteria (not quantifiable)
      - Not baselining before test execution begins
