# =============================================================================
# NOTES
# =============================================================================

notes: |
  CRITICAL INFORMATION:
  
  1. **Purpose of Requirements Verification Report**:
     - Verify SRS completeness against system requirements
     - Verify SRS requirements quality (unambiguous, testable, traceable)
     - Verify traceability (system requirements → software requirements)
     - Verify EN 50128 requirements techniques applied (Table A.2)
     - Provide independent verification evidence (SIL 3-4)
  
  2. **SIL Requirements**:
     - SIL 0: Requirements verification recommended (R)
     - SIL 1-2: Requirements Verification Report HIGHLY RECOMMENDED (HR)
     - SIL 3-4: Requirements Verification Report HIGHLY RECOMMENDED (HR)
     - Independent verification MANDATORY for SIL 3-4
     - Traceability verification MANDATORY for SIL 3-4
  
  3. **Verification Activities** (per 7.2.4.22):
     a) Completeness: All system requirements addressed in SRS
     b) Quality: Requirements unambiguous, testable, traceable
     c) Traceability: System requirements → software requirements
     d) Techniques: EN 50128 Table A.2 techniques applied
     e) Overall Test Specification adequacy (covered in separate verification)
  
  4. **Requirements Quality Criteria**:
     - Unambiguous: Single interpretation only
     - Testable: Measurable acceptance criteria
     - Traceable: Unique ID, traced to system requirement
     - Atomic: Single concern per requirement
     - Consistent: Uses SHALL/SHOULD/MAY correctly
     - SIL-assigned: Each requirement has SIL level
  
  5. **Independence Requirements** (SIL 3-4):
     - Verifier SHALL NOT be Requirements Engineer (Section 5.3.5.10)
     - Organizational independence required (separate reporting line)
     - Personnel independence required (different individuals)
     - V&V Manager approval required (platform extension role)
  
  6. **Verification Result**:
     - PASS: All criteria met, no critical findings
     - FAIL: Critical findings prevent architecture phase
     - CONDITIONAL: Minor findings, can proceed with action plan
  
  7. **Findings Classification**:
     - Critical: Blocks phase transition (missing requirements, ambiguous safety requirements)
     - Major: Should be fixed before transition (quality issues, traceability gaps)
     - Minor: Should be fixed eventually (style issues, documentation issues)
  
  8. **Traceability Verification**:
     - Forward: System requirements → software requirements (all system requirements covered)
     - Backward: Software requirements → system requirements (no orphans)
     - Traceability matrix reviewed line by line
     - 100% traceability MANDATORY for SIL 3-4
  
  9. **Relationship to Other Deliverables**:
     - SRS: Subject of verification
     - SVP: Defines verification approach
     - Overall Test Specification: Verified in same report (adequacy against SRS)
     - Validation Report: Uses Requirements Verification Report as evidence
     - Architecture Specification: Cannot begin until requirements verification passes
  
  10. **Agent Workflow**:
      - REQ agent creates SRS
      - REQ agent submits SRS to VER for verification
      - VER agent reads SVP to understand verification criteria
      - VER agent performs verification activities per 7.2.4.22
      - VER agent creates Requirements Verification Report
      - VER agent submits report to QA for template compliance check
      - QA agent reviews report (one pass only)
      - VER agent submits report to VAL for second check (SIL 3-4)
      - VAL/VMGR approves or rejects report
      - If PASS: COD authorizes transition to Phase 3 (Architecture)
      - If FAIL: REQ agent fixes SRS, VER re-verifies
  
  11. **Critical Success Factors**:
      - Independence preserved (SIL 3-4)
      - All SRS requirements reviewed individually
      - Traceability 100% complete (SIL 3-4)
      - Verification decision clear (PASS/FAIL/CONDITIONAL)
      - Findings actionable with clear remediation
      - Report approved before architecture begins
  
  12. **Common Pitfalls**:
      - Not checking traceability completeness (missing requirements)
      - Not verifying testability (requirements without acceptance criteria)
      - Incomplete independence (same person as Requirements Engineer for SIL 3-4)
      - Ambiguous verification decision (unclear PASS/FAIL)
      - Not documenting findings (issues not captured)
      - Allowing architecture to begin before requirements verification passes
