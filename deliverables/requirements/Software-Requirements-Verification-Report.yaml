# Software Requirements Verification Report - Deliverable Metadata
# EN 50128:2011 Section 7.2.4.20-22, Section 6.2.4.12-13, Table C.1
# This file defines the metadata, requirements, evidence, and verification criteria
# for the Software Requirements Verification Report deliverable.

