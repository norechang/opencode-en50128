# =============================================================================
# EVIDENCE REQUIREMENTS
# =============================================================================
# Evidence required to demonstrate Requirements Verification Report completeness

evidence_requirements:
  - evidence_id: "req-ver-completeness-check"
    description: "Requirements completeness verification per 7.2.4.22"
    mandatory_sil: 1  # HR for SIL 1+
    source: "VER"
    format: "Section in Requirements Verification Report"
    storage_path: "docs/reports/Requirements-Verification-Report.md"
    automation_level: "manual"
    collect_on_agent_action: "ver-verify-requirements"
    verification_criteria:
      - "All functional requirements from system requirements addressed"
      - "All performance requirements from system requirements addressed"
      - "All safety requirements from system requirements addressed"
      - "All interface requirements from system requirements addressed"
      - "All constraints from system requirements addressed"
      - "Missing requirements identified and justified"

  - evidence_id: "req-ver-quality-check"
    description: "Requirements quality verification per 7.2.4.22 (unambiguous, testable, traceable)"
    mandatory_sil: 1  # HR for SIL 1+
    source: "VER"
    format: "Section in Requirements Verification Report with quality assessment table"
    storage_path: "docs/reports/Requirements-Verification-Report.md"
    automation_level: "manual"
    collect_on_agent_action: "ver-verify-requirements"
    verification_criteria:
      - "Each requirement unambiguous (single interpretation)"
      - "Each requirement testable (measurable acceptance criteria)"
      - "Each requirement traceable (unique ID, traced to system requirement)"
      - "Each requirement atomic (single concern)"
      - "Each requirement uses SHALL/SHOULD/MAY keywords correctly"
      - "Each requirement has SIL level assigned"
      - "Requirements use consistent terminology"

  - evidence_id: "req-ver-traceability-check"
    description: "Traceability verification per 7.2.4.22 (MANDATORY SIL 3-4)"
    mandatory_sil: 3  # MANDATORY for SIL 3-4, HR for SIL 1-2
    source: "VER"
    format: "Section in Requirements Verification Report with traceability analysis"
    storage_path: "docs/reports/Requirements-Verification-Report.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "ver-verify-requirements"
    verification_criteria:
      - "Forward traceability complete (system requirements → software requirements)"
      - "Backward traceability complete (software requirements → system requirements)"
      - "All software requirements trace to at least one system requirement"
      - "All system requirements trace to at least one software requirement"
      - "Orphan requirements identified (no parent system requirement)"
      - "Traceability matrix reviewed and approved"

  - evidence_id: "req-ver-techniques-check"
    description: "EN 50128 requirements techniques verification per Table A.2"
    mandatory_sil: 1  # HR for SIL 1+
    source: "VER"
    format: "Section in Requirements Verification Report"
    storage_path: "docs/reports/Requirements-Verification-Report.md"
    automation_level: "manual"
    collect_on_agent_action: "ver-verify-requirements"
    verification_criteria:
      - "All mandatory techniques applied for target SIL level"
      - "Structured methodology applied (MANDATORY SIL 3-4)"
      - "Formal methods considered (HR SIL 3-4)"
      - "Modelling applied if used (R/HR SIL 1-4)"
      - "Decision tables used where appropriate (R/HR SIL 1-4)"
      - "Techniques documented in SRS"

  - evidence_id: "req-ver-report-approval"
    description: "Requirements Verification Report approved by VAL and VMGR (SIL 3-4)"
    mandatory_sil: 1  # HR for SIL 1+
    source: "VER"
    format: "Approvals section in Requirements Verification Report"
    storage_path: "docs/reports/Requirements-Verification-Report.md"
    automation_level: "manual"
    collect_on_agent_action: "ver-verify-requirements"
    verification_criteria:
      - "Document has version 1.0 or higher"
      - "Approvals section complete (VER author, QA, VAL second check, PM)"
      - "Independent Verifier approval present (SIL 3-4)"
      - "V&V Manager approval present (SIL 3-4)"
      - "Verification result clearly stated (PASS/FAIL/CONDITIONAL)"
      - "All findings documented and addressed"

