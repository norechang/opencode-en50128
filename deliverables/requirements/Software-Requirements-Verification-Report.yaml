    dependency_type: "blocking"

  - deliverable_id: "DOC-004-SVP"
    reason: "SVP defines verification approach; Requirements Verification Report implements it"
    dependency_type: "blocking"

  - deliverable_id: "EXTERNAL-SYSTEM-REQUIREMENTS"
    reason: "System requirements are parent; Requirements Verification Report verifies traceability"
    dependency_type: "informational"

feeds_into:
  - deliverable_id: "DOC-009-SAS"
    reason: "Requirements verification must pass before architecture design begins"

  - deliverable_id: "DOC-025-VALIDATION-REPORT"
    reason: "Requirements Verification Report provides requirements verification evidence"

# =============================================================================
# VERIFICATION CRITERIA
# =============================================================================

verification_criteria:
  completeness:
    - "All sections of Requirements Verification Report template completed per 7.2.4.21"
    - "All SRS requirements reviewed for completeness per 7.2.4.22"
    - "All SRS requirements reviewed for quality per 7.2.4.22"
    - "Traceability verification complete (system requirements → SRS)"
    - "All EN 50128 Table A.2 techniques verified"
    - "All findings documented with severity and status"
    - "Verification decision stated (PASS/FAIL/CONDITIONAL)"

  correctness:
    - "Verification activities correct per SVP verification plan"
    - "Requirements quality criteria correct (unambiguous, testable, traceable)"
    - "Traceability analysis correct (all requirements traced)"
    - "EN 50128 Table A.2 technique assessment correct"
    - "Independent verification performed (SIL 3-4)"
    - "Findings accurately reflect SRS issues"

  consistency:
    - "Verification approach consistent with SVP"
    - "Quality criteria consistent across all requirements"
    - "Traceability format consistent with SCMP"
    - "Findings classification consistent (critical/major/minor)"
    - "Verification result consistent with findings"

  traceability:
    - "Forward traceability: SVP verification criteria → Verification Report activities"
    - "Forward traceability: Verification Report findings → SRS updates"
    - "Backward traceability: Verification Report → SVP verification plan"
    - "References to SRS sections in findings"
    - "References to EN 50128 Table A.2 techniques present"

