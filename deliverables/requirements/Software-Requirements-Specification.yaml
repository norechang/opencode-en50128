# Software Requirements Specification (SRS)
# EN 50128 Deliverable #6 - Section 7.2

# ===== Basic Identification =====
deliverable_id: "DOC-006-SRS"
number: 6
name: "Software Requirements Specification"
abbreviation: "SRS"

# ===== Lifecycle Context =====
phase: "requirements"
standard_section: "7.2"

# ===== Ownership (EN 50128 Table C.1) =====
written_by: "REQ"
first_check: "VER"
second_check: "VAL"

# ===== Template =====
template_path: ".opencode/skills/en50128-requirements/templates/Software-Requirements-Specification-template.md"
template_exists: true

# ===== SIL Requirements =====
sil_requirements:
  sil_0:
    mandatory: false
    techniques: []
    additional_requirements: []
  
  sil_1:
    mandatory: true
    techniques:
      - technique_name: "Structured Methodology"
        table_reference: "A.2"
        technique_id: "D.52"
        recommendation: "R"
      - technique_name: "Decision Tables"
        table_reference: "A.2"
        technique_id: "D.13"
        recommendation: "R"
    additional_requirements:
      - "Requirements must be testable"
      - "Each requirement has unique ID"
  
  sil_2:
    mandatory: true
    techniques:
      - technique_name: "Structured Methodology"
        table_reference: "A.2"
        technique_id: "D.52"
        recommendation: "R"
      - technique_name: "Modelling"
        table_reference: "A.2"
        technique_id: "A.17"
        recommendation: "R"
      - technique_name: "Decision Tables"
        table_reference: "A.2"
        technique_id: "D.13"
        recommendation: "R"
    additional_requirements:
      - "Requirements must be testable"
      - "Each requirement has unique ID"
      - "Traceability to system requirements"
    evidence_thresholds:
      cyclomatic_complexity_max: 15
  
  sil_3:
    mandatory: true
    techniques:
      - technique_name: "Formal Methods"
        table_reference: "A.2"
        technique_id: "D.28"
        recommendation: "HR"
      - technique_name: "Structured Methodology"
        table_reference: "A.2"
        technique_id: "D.52"
        recommendation: "HR"
      - technique_name: "Modelling"
        table_reference: "A.2"
        technique_id: "A.17"
        recommendation: "HR"
      - technique_name: "Decision Tables"
        table_reference: "A.2"
        technique_id: "D.13"
        recommendation: "HR"
    additional_requirements:
      - "Requirements must be testable"
      - "Each requirement has unique ID"
      - "100% traceability to system requirements MANDATORY"
      - "100% traceability from requirements to tests MANDATORY"
    evidence_thresholds:
      test_coverage_statement: 100
      test_coverage_branch: 100
      test_coverage_condition: 100
      cyclomatic_complexity_max: 10
  
  sil_4:
    mandatory: true
    techniques:
      - technique_name: "Formal Methods"
        table_reference: "A.2"
        technique_id: "D.28"
        recommendation: "HR"
      - technique_name: "Structured Methodology"
        table_reference: "A.2"
        technique_id: "D.52"
        recommendation: "HR"
      - technique_name: "Modelling"
        table_reference: "A.2"
        technique_id: "A.17"
        recommendation: "HR"
      - technique_name: "Decision Tables"
        table_reference: "A.2"
        technique_id: "D.13"
        recommendation: "HR"
    additional_requirements:
