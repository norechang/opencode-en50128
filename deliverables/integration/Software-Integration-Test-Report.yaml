notes: |
  **Purpose**: The Software Integration Test Report documents the execution and results of all integration
  tests defined in the Integration Test Specification. It provides evidence that software components have
  been successfully integrated and all interfaces function correctly.

  **Key Characteristics**:
  1. **Integration Evidence**: Documents actual integration execution with phases, components, steps
  2. **Interface Testing**: Provides interface test results (100% coverage for SIL 2+)
  3. **Progressive Integration**: Documents each integration phase separately
  4. **Performance Evidence**: Performance test results for integrated components (SIL 2+)
  5. **Regression Testing**: Verifies previously integrated components still work
  6. **Defect Tracking**: Complete log of integration defects found, fixed, and re-tested

  **SIL-Specific Requirements**:
  - **SIL 0**: Basic integration test execution documentation
  - **SIL 1**: Interface coverage ≥90% + regression testing
  - **SIL 2**: 100% interface coverage + performance testing
  - **SIL 3-4**: 100% interface coverage + performance testing + independent verification

  **Workflow**:
  1. INT executes integration according to phases in Integration Test Specification
  2. INT/TST execute all interface test cases
  3. INT/TST execute functional, performance, error handling, regression tests
  4. INT logs all defects with severity classification
  5. IMP fixes defects in components
  6. INT re-tests fixed defects
  7. CM verifies interface coverage (100% for SIL 2+)
  8. INT creates Integration Test Report
  9. QUA reviews report for template compliance (1 pass, SIL 3-4)
  10. VER performs independent verification (SIL 3-4)
  11. QUA approves final report

  **Pass Criteria** (SIL 3-4):
  - All integration test cases executed: 100%
  - Test pass rate: ≥95%
  - Interface coverage: 100%
  - Open defects: 0 critical, 0 high
  - Performance targets: Met (or justified)
  - Regression tests: All passed
  - Independent verification: Complete

  **Critical Dependencies**:
  - Integration Test Specification defines WHAT to test
  - Integration Test Report documents RESULTS of testing
  - Component Test Report confirms components ready for integration
  - If integration results FAIL, must rework before validation
  - Report feeds into Validation Report as evidence

  **Template Compliance**:
  - Document ID format: DOC-023-INT-TEST-REPORT-YYYY-NNN
  - Approvals section MUST include VER signature (SIL 3-4)
  - All sections from template MUST be present
  - Interface coverage tables MUST be populated with actual values
  - Defect log MUST show resolution status

  **Evidence Automation**:
  - Test execution results: AUTOMATIC (test framework XML output)
  - Interface coverage: AUTOMATIC (CM tool, parsing test IDs)
  - Performance metrics: AUTOMATIC (profiler tools, logs)
  - Defect tracking: SEMI-AUTOMATIC (INT logs, tool tracks)
  - Phase documentation: SEMI-AUTOMATIC (INT documents, tool captures logs)
  - Pass/fail assessment: SEMI-AUTOMATIC (automated checks + INT judgment)
