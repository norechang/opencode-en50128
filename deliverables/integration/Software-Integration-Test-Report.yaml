    source: "INT agent, test framework"
    format: "Structured tables in markdown with test category, phase, executed, passed, failed, blocked counts"
    storage_path: "deliverables/integration/Software-Integration-Test-Report.md Section 3"
    automation_level: "automatic"
    collect_on_agent_action: "/int execute-integration-tests"
    verification_criteria:
      - "All test cases from Integration Test Specification executed"
      - "Pass/fail status recorded for each test case"
      - "Execution date recorded"
      - "Test environment documented"

  - evidence_id: "integration-phase-results"
    description: "Results for each integration phase with components integrated and tests executed"
    mandatory_sil: 0
    source: "INT agent"
    format: "Structured sections per phase with scope, components, steps, test results, phase summary"
