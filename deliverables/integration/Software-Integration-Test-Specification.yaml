notes: |
  **Purpose**: The Software Integration Test Specification defines the strategy, test cases, and procedures
  for integrating software components into larger assemblies and testing the interfaces between components.

  **Key Characteristics**:
  1. **Integration Strategy**: Documents approach (bottom-up, top-down, sandwich, big-bang)
  2. **Interface Testing**: Test cases for all component interfaces (100% coverage for SIL 2+)
  3. **Progressive Integration**: Phased integration with testing at each phase
  4. **Regression Testing**: Test previously integrated components after each phase
  5. **Performance Testing**: Timing and resource usage of integrated components (SIL 2+)
  6. **Traceability**: Complete traceability to architecture and design specifications

  **SIL-Specific Requirements**:
  - **SIL 0-1**: Basic integration strategy and interface testing
  - **SIL 2**: 100% interface coverage + performance testing
  - **SIL 3-4**: 100% interface coverage + performance testing + independent review

  **Integration Strategies**:
  - **Bottom-Up**: Start with low-level modules, integrate upward (requires drivers)
  - **Top-Down**: Start with high-level modules, integrate downward (requires stubs)
  - **Sandwich**: Combination of bottom-up and top-down
  - **Big-Bang**: Integrate all at once (NOT RECOMMENDED for SIL 3-4)

  **Workflow**:
  1. INT reviews architecture and design specifications
  2. INT selects integration strategy based on project characteristics
  3. INT defines integration phases and order
  4. INT identifies required stubs and drivers
  5. INT creates interface test cases for all component interfaces
  6. INT creates functional, performance, error handling, regression test cases
  7. INT creates traceability matrices
  8. QUA reviews for template compliance (1 pass, SIL 3-4)
  9. VER performs independent review (SIL 3-4)
  10. QUA approves final specification

  **Test Case Categories**:
  1. **Interface Tests** (TC-INT-IF-XXX): Test data flow, error propagation, timing across interfaces
  2. **Functional Tests** (TC-INT-FUNC-XXX): Test integrated functionality against requirements
  3. **Performance Tests** (TC-INT-PERF-XXX): Test execution time, memory usage, resource contention
  4. **Error Handling Tests** (TC-INT-ERR-XXX): Test error detection, propagation, recovery
  5. **Regression Tests** (TC-INT-REG-XXX): Re-test previously integrated components

  **Critical Dependencies**:
  - Architecture Specification defines component structure and interfaces
  - Design Specification defines interface details (parameters, return values, protocols)
  - Interface Specifications define interface contracts
  - Component Test Report confirms components ready for integration

  **Template Compliance**:
  - Document ID format: DOC-022-INT-TEST-SPEC-YYYY-NNN
  - Approvals section MUST include VER signature (SIL 3-4)
  - All sections from template MUST be present
  - Traceability matrices MUST show 100% coverage (SIL 2+)
  - Integration phases MUST have entry/exit criteria

  **Evidence Automation**:
  - Integration strategy: MANUAL (INT designs strategy)
  - Test cases: SEMI-AUTOMATIC (INT creates, tool manages IDs)
  - Traceability: AUTOMATIC (CM tool parses IDs from specifications)
  - Test environment: MANUAL (INT documents configuration)
