notes: |
  **Purpose**: The Software Integration Verification Report provides independent verification that software
  integration was performed correctly, all component interfaces are tested, and the integrated software
  meets integration requirements per EN 50128.

  **Key Characteristics**:
  1. **Independent Verification**: Performed by independent Verifier (MANDATORY SIL 3-4)
  2. **Document Review**: Reviews integration test specification and report for completeness
  3. **Traceability Verification**: Verifies 100% traceability from architecture/design to integration tests
  4. **Interface Coverage Verification**: Verifies 100% interface coverage (MANDATORY all SILs)
  5. **Static Analysis**: Analyzes integration code (stubs, drivers, test harness) (SIL 2+)
  6. **EN 50128 Compliance**: Verifies integration techniques per Table A.6 applied

  **SIL-Specific Requirements**:
  - **SIL 0-1**: Basic document review and traceability verification
  - **SIL 2**: Traceability 100% + static analysis of integration code
  - **SIL 3-4**: Independent verification + traceability 100% + static analysis + EN 50128 compliance

  **Verification Activities**:
  1. **Integration Test Specification Review**: Verify completeness, correctness, traceability
  2. **Integration Test Report Review**: Verify test execution, results, defects, pass/fail
  3. **Traceability Verification**: Verify architecture/design → integration tests (100% coverage)
  4. **Interface Coverage Verification**: Verify all interfaces tested (100% coverage)
  5. **Static Analysis**: Analyze integration code (stubs, drivers, test harness) (SIL 2+)
  6. **EN 50128 Compliance**: Verify Table A.6 techniques applied
  7. **Independence Verification**: Verify Verifier independence (SIL 3-4)

  **Workflow**:
  1. VER reviews Integration Test Specification (completeness, correctness)
  2. VER reviews Integration Test Report (test execution, results, defects)
  3. CM/VER verify traceability (architecture/design → integration tests)
  4. VER verifies interface coverage (100% MANDATORY)
  5. VER performs static analysis of integration code (SIL 2+)
  6. VER verifies EN 50128 technique compliance (Table A.6)
  7. VER verifies independence requirements met (SIL 3-4)
  8. VER logs all issues found
  9. VER calculates verification metrics
  10. VER assesses EN 50128 compliance (Sections 6.2, 7.6)
  11. VER makes verification decision (APPROVE / DO NOT APPROVE / CONDITIONAL)
  12. QUA reviews for template compliance
  13. V&V Manager approves (SIL 3-4)

  **Verification Decision Criteria** (SIL 3-4):
  - **APPROVE**: All verification activities passed, zero open critical/high issues, 100% traceability/coverage
  - **CONDITIONAL PASS**: Minor issues with documented conditions and timeline
  - **DO NOT APPROVE**: Critical/high issues open, or traceability/coverage incomplete

  **Independence Requirements** (SIL 3-4):
  - Verifier SHALL be independent from Integrator, Implementer, Designer, Tester
  - Verifier SHALL NOT be Requirements Manager, Designer, Implementer, Integrator, Tester, or Validator
  - V&V Manager approval REQUIRED (independent from PM)

  **Critical Dependencies**:
  - Integration Test Specification defines WHAT was planned
  - Integration Test Report documents WHAT was executed
  - Integration Verification Report verifies CORRECTNESS and COMPLETENESS

  **Template Compliance**:
  - Document ID format: DOC-024-INT-VER-REPORT-YYYY-NNN
  - Approvals section MUST include V&V Manager signature (SIL 3-4)
  - All verification checklists MUST be complete
  - Verification decision MUST be clear (APPROVE / DO NOT APPROVE / CONDITIONAL)

  **Evidence Automation**:
  - Document reviews: SEMI-AUTOMATIC (VER reviews, tool checks structure)
  - Traceability verification: AUTOMATIC (CM tool parses IDs)
  - Interface coverage: AUTOMATIC (CM tool calculates coverage)
  - Static analysis: AUTOMATIC (cppcheck, PC-lint, Clang)
  - EN 50128 compliance: MANUAL (VER assesses technique application)
  - Verification decision: MANUAL (VER judgment based on all evidence)
