      - "Verifier independent from Implementer"
      - "Verifier independent from Designer"
      - "Verifier independent from Tester"

  - evidence_id: "verification-decision"
    description: "Final verification decision (APPROVE / DO NOT APPROVE / CONDITIONAL)"
    mandatory_sil: 0
    source: "VER agent"
    format: "Structured section with decision, rationale, conditions (if any)"
    storage_path: "deliverables/integration/Software-Integration-Verification-Report.md Section 6"
    automation_level: "manual"
    collect_on_agent_action: "/ver make-verification-decision"
    verification_criteria:
