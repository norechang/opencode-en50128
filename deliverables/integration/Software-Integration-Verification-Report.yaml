evidence_requirements:
  - evidence_id: "integration-test-spec-review"
    description: "Review of Integration Test Specification for completeness and correctness"
    mandatory_sil: 0
    source: "VER agent"
    format: "Structured checklist in markdown with status, notes for each item"
    storage_path: "deliverables/integration/Software-Integration-Verification-Report.md Section 3.1"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/ver review-integration-test-spec"
    verification_criteria:
      - "Document completeness checked"
      - "Integration strategy reviewed"
      - "Test cases reviewed"
      - "Traceability matrix reviewed"
      - "Entry/exit criteria reviewed"

  - evidence_id: "integration-test-report-review"
    description: "Review of Integration Test Report for completeness and correctness"
    mandatory_sil: 0
    source: "VER agent"
    format: "Structured checklist in markdown with status, notes for each item"
    storage_path: "deliverables/integration/Software-Integration-Verification-Report.md Section 3.2"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/ver review-integration-test-report"
    verification_criteria:
      - "Document completeness checked"
      - "Test execution completeness verified"
      - "Test results reviewed"
      - "Defects reviewed"
      - "Entry/exit criteria verified"

  - evidence_id: "traceability-verification"
    description: "Verification of traceability from architecture/design to integration tests"
    mandatory_sil: 1
    source: "VER agent, CM agent"
    format: "Structured tables with forward and reverse traceability analysis"
    storage_path: "deliverables/integration/Software-Integration-Verification-Report.md Section 3.3"
    automation_level: "automatic"
    collect_on_agent_action: "/cm verify-integration-traceability"
    verification_criteria:
      - "Architecture → integration tests traced"
      - "Design → integration tests traced"
      - "Reverse traceability checked (no orphan test cases)"
      - "Coverage = 100% (SIL 2+)"

  - evidence_id: "interface-coverage-verification"
    description: "Verification that all component interfaces are tested"
    mandatory_sil: 1
    source: "VER agent, CM agent"
    format: "Structured table with interface type, total, tested, coverage percentage"
    storage_path: "deliverables/integration/Software-Integration-Verification-Report.md Section 3.4"
    automation_level: "automatic"
    collect_on_agent_action: "/ver verify-interface-coverage"
    verification_criteria:
      - "All software-software interfaces tested"
      - "All hardware-software interfaces tested"
      - "All external interfaces tested"
      - "Coverage = 100% (MANDATORY all SILs)"

  - evidence_id: "static-analysis-integration-code"
    description: "Static analysis of integration code (stubs, drivers, test harness) (SIL 2+)"
    mandatory_sil: 2
    source: "VER agent, cppcheck, PC-lint"
    format: "Structured table with issue type, count, severity, resolution status"
    storage_path: "deliverables/integration/Software-Integration-Verification-Report.md Section 3.5"
    automation_level: "automatic"
    collect_on_agent_action: "/ver analyze-integration-code"
    verification_criteria:
      - "Static analysis tool used (cppcheck, PC-lint, Clang)"
      - "MISRA C violations checked"
      - "Coding standard violations checked"
      - "Critical issues resolved"

  - evidence_id: "en50128-technique-compliance"
    description: "Verification that EN 50128 integration techniques were applied"
    mandatory_sil: 0
    source: "VER agent"
    format: "Structured table with technique, recommendation level, applied status, evidence"
    storage_path: "deliverables/integration/Software-Integration-Verification-Report.md Section 3.6"
    automation_level: "manual"
    collect_on_agent_action: "/ver verify-en50128-compliance"
    verification_criteria:
      - "Table A.6 techniques checked (Functional Testing, Performance Testing)"
      - "Mandatory techniques applied (SIL-dependent)"
      - "Highly recommended techniques applied or justified"
      - "Evidence documented"

  - evidence_id: "verification-issues-log"
    description: "Log of all issues found during verification with resolution status"
    mandatory_sil: 0
    source: "VER agent"
    format: "Structured table with issue ID, severity, description, activity, status, resolution"
    storage_path: "deliverables/integration/Software-Integration-Verification-Report.md Section 4.2"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/ver log-verification-issue"
    verification_criteria:
      - "All issues logged with unique ID"
      - "Severity classification appropriate"
      - "Resolution documented"
      - "Zero open critical/high issues (SIL 3-4)"

  - evidence_id: "verification-metrics"
