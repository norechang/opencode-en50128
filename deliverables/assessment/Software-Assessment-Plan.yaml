    - "Assessment Activities (activities and sequential link to engineering per 6.4.4.5(b))"
    - "Documents to be Considered (list per 6.4.4.5(c))"
    - "Pass/Fail Criteria (criteria and non-conformance handling per 6.4.4.5(d))"
    - "Assessment Report Requirements (content and form per 6.4.4.5(e))"
    - "Access to Documentation (procedures per 6.4.4.3)"
    - "SVaP Agreement (scope and contents per 6.4.4.14)"
    - "Audit and Inspection Plan (optional per 6.4.4.15)"
    - "Assessment Schedule and Milestones"
