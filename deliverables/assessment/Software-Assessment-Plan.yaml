    mandatory: true
    techniques: []
    additional_requirements:
      - "Independent Assessor MANDATORY per 6.4.4.1"
      - "Independence per 5.1.2.6 and 5.1.2.7 (MANDATORY)"
      - "Software Assessment Plan SHALL be written per 6.4.4.4 (MANDATORY)"
