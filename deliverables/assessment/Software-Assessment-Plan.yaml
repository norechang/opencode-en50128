  sil_4:
    - "Document Control (ID, version, approval, change history)"
    - "Assessor Information (name, qualifications, independence evidence per 5.1.2.6-5.1.2.7)"
    - "Assessment Scope (aspects covered per 6.4.4.5(a))"
    - "Assessment Activities (activities and sequential link to engineering per 6.4.4.5(b))"
