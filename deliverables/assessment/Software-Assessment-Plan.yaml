    - "Assessment Schedule and Milestones"
    - "Assessment Resources and Tools"
    - "SIL 4 specific assessment criteria (enhanced rigor)"

# ===== Evidence Requirements =====
evidence_requirements:
  - evidence_id: "assessor-independence-evidence"
    description: "Evidence of Assessor independence per 5.1.2.6 and 5.1.2.7"
    mandatory_sil: 3
    source: "ASR agent"
    format: "Markdown"
    storage_path: "docs/assessment/assessor-independence.md"
    automation_level: "manual"
    collect_on_agent_action: "/asr provide-independence-evidence"
    verification_criteria:
      - "Assessor not part of development team"
      - "Assessor not reporting to project management"
      - "Assessor has no financial interest in project outcome"
      - "Assessor qualifications documented per Annex B Table B.8"
      - "Independence maintained throughout lifecycle"

  - evidence_id: "assessment-scope-definition"
    description: "Assessment scope per 6.4.4.5(a)"
    mandatory_sil: 3
    source: "ASR agent"
    format: "Markdown"
    storage_path: "docs/assessment/assessment-scope.md"
    automation_level: "manual"
    collect_on_agent_action: "/asr define-assessment-scope"
    verification_criteria:
      - "Aspects of assessment clearly defined"
      - "Lifecycle phases to be assessed identified"
      - "Deliverables to be assessed identified"
      - "Processes to be assessed identified"
      - "Techniques to be assessed identified"
      - "SIL-specific requirements addressed"

  - evidence_id: "assessment-activities-plan"
    description: "Assessment activities and sequential link per 6.4.4.5(b)"
    mandatory_sil: 3
    source: "ASR agent"
    format: "Markdown"
    storage_path: "docs/assessment/assessment-activities.md"
    automation_level: "manual"
    collect_on_agent_action: "/asr plan-assessment-activities"
    verification_criteria:
      - "Assessment activities defined"
      - "Sequential link to engineering activities"
      - "Timing of assessment activities"
      - "Assessment milestones identified"
      - "Review and audit points defined"
      - "Test witnessing plan (if applicable)"

  - evidence_id: "documents-list"
    description: "Documents to be considered per 6.4.4.5(c)"
    mandatory_sil: 3
    source: "ASR agent"
    format: "Markdown table"
    storage_path: "docs/assessment/documents-list.md"
    automation_level: "semi-automated"
    collect_on_agent_action: "/asr list-documents"
    verification_criteria:
      - "All deliverables per Table C.1 listed"
      - "System Safety Requirements Specification included per 6.4.2"
      - "Software Requirements Specification included per 6.4.2"
      - "All lifecycle deliverables included per 6.4.2"
      - "Supporting documents identified"
      - "Document versions specified"

  - evidence_id: "pass-fail-criteria"
    description: "Pass/fail criteria and non-conformance handling per 6.4.4.5(d)"
    mandatory_sil: 3
    source: "ASR agent"
    format: "Markdown"
    storage_path: "docs/assessment/pass-fail-criteria.md"
    automation_level: "manual"
    collect_on_agent_action: "/asr define-pass-fail-criteria"
    verification_criteria:
      - "Pass criteria defined for each assessment aspect"
      - "Fail criteria defined for each assessment aspect"
      - "Non-conformance classification (major/minor)"
      - "Non-conformance handling procedures"
      - "Resolution process for non-conformances"
      - "Escalation path defined"

  - evidence_id: "assessment-report-requirements"
    description: "Assessment Report content and form requirements per 6.4.4.5(e)"
    mandatory_sil: 3
    source: "ASR agent"
    format: "Markdown"
    storage_path: "docs/assessment/report-requirements.md"
    automation_level: "manual"
    collect_on_agent_action: "/asr define-report-requirements"
    verification_criteria:
      - "Report structure defined"
      - "Report content requirements defined per 6.4.4.17-6.4.4.19"
      - "Report format specified"
      - "Conclusion and recommendations requirements per 6.4.4.17"
      - "Non-conformity listing requirements per 6.4.4.19"
      - "Activities summary requirements per 6.4.4.18"

  - evidence_id: "svap-agreement"
    description: "Assessor agreement on SVaP scope and contents per 6.4.4.14"
    mandatory_sil: 3
    source: "ASR agent"
    format: "Markdown (agreement document)"
    storage_path: "docs/assessment/svap-agreement.md"
    automation_level: "manual"
    collect_on_agent_action: "/asr agree-svap"
    verification_criteria:
      - "SVaP scope reviewed by Assessor"
      - "SVaP contents agreed by Assessor"
      - "Assessor presence during testing specified"
      - "Validation criteria agreed"
      - "Acceptance criteria agreed"
      - "Agreement documented and signed"

