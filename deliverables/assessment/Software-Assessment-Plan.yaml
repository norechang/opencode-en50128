# ===== Notes =====
notes: |
  **Software Assessment Plan (Deliverable #45)**
  
  **Applicability**: MANDATORY for SIL 3-4 ONLY per EN 50128 6.4.1.1
  - SIL 0: No assessment required if ISO 9001 certificate available per 6.4.1.2
  - SIL 1-2: Assessment recommended but not mandatory
  - SIL 3-4: Independent assessment MANDATORY per 6.4.4.1
  
  **Purpose**: Define the plan for independent assessment to evaluate that lifecycle processes
  and outputs are such that the software is of the defined SIL and fit for its intended application
  per EN 50128 Section 6.4.
  
  **Key Requirements** (EN 50128 6.4.4.5 - ALL MANDATORY for SIL 3-4):
  1. **Aspects with which assessment deals** (6.4.4.5(a))
  2. **Activities throughout assessment and sequential link to engineering** (6.4.4.5(b))
  3. **Documents to be considered** (6.4.4.5(c))
  4. **Pass/fail criteria and non-conformance handling** (6.4.4.5(d))
  5. **Requirements for Assessment Report content and form** (6.4.4.5(e))
  
  **Critical Requirements**:
  - **Independent Assessor** per 5.1.2.6 and 5.1.2.7 (MANDATORY SIL 3-4)
  - **Access to all project documentation** throughout development per 6.4.4.3 (MANDATORY)
  - **Assessor agrees SVaP scope and contents** per 6.4.4.14 (MANDATORY SIL 3-4)
  - **Early Assessor involvement** recommended per NOTE 6.4.4.15
  
  **Assessment Scope** (EN 50128 6.4.4.8-6.4.4.15):
  - Software fit for intended purpose per 6.4.4.8
  - Appropriate techniques from Annex A selected and applied per 6.4.4.9
  - Configuration and change management system per 6.4.4.10
  - Competency of project staff per Annex B per 6.4.4.11
  - Safety-related application conditions per 6.4.4.12
  - Verification and validation activities per 6.4.4.13
  - Agreement on SVaP scope and contents per 6.4.4.14
  - Audits and inspections (optional) per 6.4.4.15
  
  **Verification Requirements** (EN 50128 6.4.4.7 - MANDATORY SIL 3-4):
  - Readability per 5.3.2.7-5.3.2.10 (MANDATORY)
  - Traceability per 6.5.4.14-6.5.4.17 (MANDATORY)
  - Requirements per 6.4.4.5 met (MANDATORY)
  - Internal consistency (MANDATORY)
  - Results recorded in Software Assessment Verification Report
  
  **ASR Agent Responsibility**:
  - Establish independence per 5.1.2.6 and 5.1.2.7
  - Define assessment scope per 6.4.4.5(a)
  - Plan assessment activities and sequential link per 6.4.4.5(b)
  - List all documents to be considered per 6.4.4.5(c)
  - Define pass/fail criteria and non-conformance handling per 6.4.4.5(d)
  - Define Assessment Report requirements per 6.4.4.5(e)
  - Agree SVaP scope and contents with VAL per 6.4.4.14
  - Plan audits and inspections (optional) per 6.4.4.15
  - Early involvement in project per NOTE 6.4.4.15
  
  **VER Agent Responsibility**:
  - Verify readability per 5.3.2.7-5.3.2.10 (MANDATORY SIL 3+)
  - Verify traceability per 6.5.4.14-6.5.4.17 (MANDATORY SIL 3+)
  - Verify requirements per 6.4.4.5 met (MANDATORY)
  - Verify internal consistency (MANDATORY SIL 3+)
  - Record results in Software Assessment Verification Report per 6.4.4.7
  
  **Independence Requirements** (5.1.2.6 and 5.1.2.7):
  - Assessor not part of development team
  - Assessor not reporting to project management
  - Assessor has no financial interest in project outcome
  - Assessor maintains independence throughout lifecycle
  - Independence evidence documented
  
  **Relation to Other Deliverables**:
  - Input: System Safety Requirements Specification, Software Requirements Specification per 6.4.2
  - Informs: Software Assessment Report (DOC-046) per 6.4.4.17
  - Verified by: Software Assessment Verification Report per 6.4.4.7
  - Agreement with: Software Validation Plan (DOC-005) per 6.4.4.14
