  - deliverable_id: "DOC-001-SQAP"
    reason: "Quality assurance plan informs assessment scope"
    dependency_type: "informational"
  
  - deliverable_id: "DOC-004-SVP"
    reason: "Verification plan informs assessment activities"
    dependency_type: "informational"
  
  - deliverable_id: "DOC-005-SVAP"
    reason: "Validation plan requires Assessor agreement per 6.4.4.14"
    dependency_type: "informational"

feeds_into:
  - deliverable_id: "DOC-046-SAR"
    reason: "Assessment Report must meet Assessment Plan requirements per 6.4.4.17"

# ===== Verification Criteria =====
verification_criteria:
  completeness:
    - "Aspects with which assessment deals per 6.4.4.5(a) (MANDATORY)"
    - "Activities throughout assessment and sequential link per 6.4.4.5(b) (MANDATORY)"
    - "Documents to be considered per 6.4.4.5(c) (MANDATORY)"
    - "Pass/fail criteria and non-conformance handling per 6.4.4.5(d) (MANDATORY)"
    - "Requirements for Assessment Report content and form per 6.4.4.5(e) (MANDATORY)"
    - "All requirements per 6.4.4.5 addressed (MANDATORY)"
  
  correctness:
    - "Assessment scope appropriate for SIL level"
    - "Assessment activities technically feasible"
    - "Pass/fail criteria appropriate and measurable"
    - "Document list complete per Table C.1"
    - "Report requirements meet standard per 6.4.4.17-6.4.4.19"
    - "Assessor independence requirements met per 5.1.2.6-5.1.2.7"
  
  consistency:
    - "Internal consistency per 6.4.4.7(b) (MANDATORY SIL 3+)"
    - "Consistent with SQAP (DOC-001)"
    - "Consistent with SVP (DOC-004)"
    - "Consistent with SVaP (DOC-005)"
    - "No conflicting assessment criteria"
  
  traceability:
    - "Traceability per 5.3.2.7-5.3.2.10 and 6.5.4.14-6.5.4.17 per 6.4.4.7(a) (MANDATORY SIL 3+)"
    - "Traceability to System Safety Requirements Specification"
    - "Traceability to Software Requirements Specification"
    - "Traceability to EN 50128 requirements"
    - "Traceability to all deliverables in Table C.1"
  
  readability:
    - "Readability per 5.3.2.7-5.3.2.10 per 6.4.4.7(a) (MANDATORY SIL 3+)"
    - "Clear and unambiguous language"
    - "Consistent terminology"
    - "Target audience appropriateness (Assessor, VER, project team)"

# ===== Configuration Management =====
configuration_management:
  baseline_name: "Software Assessment Plan Baseline"
  baseline_trigger: "After VER approval and before assessment activities begin"
  change_control: "All changes via ASR, impact assessment on assessment schedule and activities"
  versioning: "Semantic versioning (MAJOR.MINOR.PATCH)"
