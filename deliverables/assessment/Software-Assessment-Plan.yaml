      - "Software Assessment Plan SHALL be written per 6.4.4.4 (MANDATORY)"
      - "Aspects with which assessment deals per 6.4.4.5(a) (MANDATORY)"
      - "Activities throughout assessment and sequential link per 6.4.4.5(b) (MANDATORY)"
      - "Documents to be considered per 6.4.4.5(c) (MANDATORY)"
      - "Pass/fail criteria and non-conformance handling per 6.4.4.5(d) (MANDATORY)"
      - "Requirements for Assessment Report content and form per 6.4.4.5(e) (MANDATORY)"
      - "Access to all project documentation per 6.4.4.3 (MANDATORY)"
      - "Assessor agrees scope/contents of SVaP per 6.4.4.14 (MANDATORY)"
