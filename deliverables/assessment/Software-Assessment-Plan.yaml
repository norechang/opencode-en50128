    evidence_thresholds: {}
  
  sil_1:
    mandatory: false
    techniques: []
    additional_requirements:
      - "Assessment RECOMMENDED for SIL 1 but not MANDATORY"
      - "If assessment performed, follow SIL 1 requirements"
    evidence_thresholds: {}
  
  sil_2:
    mandatory: false
    techniques: []
    additional_requirements:
      - "Assessment RECOMMENDED for SIL 2 but not MANDATORY"
      - "If assessment performed, follow SIL 2 requirements"
    evidence_thresholds: {}
  
  sil_3:
    mandatory: true
    techniques: []
    additional_requirements:
      - "Independent Assessor MANDATORY per 6.4.4.1"
