# Software Assessment Plan
# EN 50128 Deliverable #45 - Section 6.4.4.4-6.4.4.7
# SIL 3-4 ONLY

# ===== Basic Identification =====
deliverable_id: "DOC-045-SAP"
number: 45
name: "Software Assessment Plan"
abbreviation: "SAP"

# ===== Lifecycle Context =====
phase: "assessment"
standard_section: "6.4.4.4"

# ===== Ownership (EN 50128 Table C.1) =====
written_by: "ASR"
first_check: "VER"
second_check: "NONE"

# ===== Template =====
template_path: "deliverables/assessment/Software-Assessment-Plan-template.md"
template_exists: true

# ===== SIL Requirements =====
