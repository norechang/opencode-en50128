    source: "ASR agent"
    format: "Markdown (activity log)"
    storage_path: "docs/assessment/activity-records.md"
    automation_level: "manual"
    collect_on_agent_action: "/asr record-activity"
    verification_criteria:
      - "All assessment activities recorded"
      - "Activity dates and participants"
      - "Activity findings documented"
      - "Activity evidence collected"
      - "Activity traceability to Assessment Plan"
      - "Activities summarized in Assessment Report per 6.4.4.18"

  - evidence_id: "fitness-for-purpose-assessment"
