# ===== Notes =====
notes: |
  **Software Assessment Report (Deliverable #46)**
  
  **Applicability**: MANDATORY for SIL 3-4 ONLY per EN 50128 6.4.1.1
  - SIL 0: No assessment required if ISO 9001 certificate available per 6.4.1.2
  - SIL 1-2: Assessment recommended but not mandatory
  - SIL 3-4: Independent assessment MANDATORY per 6.4.4.1
  
  **Purpose**: Document the results of independent assessment to evaluate that lifecycle processes
  and outputs are such that the software is of the defined SIL and fit for its intended application
  per EN 50128 Section 6.4.
  
  **Key Requirements** (EN 50128 6.4.4.16-6.4.4.19 - ALL MANDATORY for SIL 3-4):
  1. **Meet Software Assessment Plan requirements** (6.4.4.17)
  2. **Provide conclusion** (6.4.4.17)
  3. **Provide recommendations** (6.4.4.17)
  4. **Record Assessor activities as consistent base** (6.4.4.18)
  5. **Summarize activities in report** (6.4.4.18)
  6. **Identify and evaluate non-conformities** (6.4.4.19)
  7. **Judge impact on final result** (6.4.4.19)
  8. **List non-conformities and judgments** (6.4.4.19)
  
  **Assessment Scope** (EN 50128 6.4.4.8-6.4.4.15 - ALL MANDATORY):
  1. **Software fit for intended purpose** per 6.4.4.8
  2. **Appropriate techniques from Annex A** selected and applied per 6.4.4.9
  3. **Configuration and change management system** per 6.4.4.10
  4. **Competency of project staff** per Annex B per 6.4.4.11
  5. **Safety-related application conditions** per 6.4.4.12
  6. **Verification and validation activities** per 6.4.4.13
  7. **Agreement on SVaP scope and contents** per 6.4.4.14
  8. **Audits and inspections** (if performed) per 6.4.4.15
  
  **Critical Requirements**:
  - **Independent Assessor** per 5.1.2.6 and 5.1.2.7 (MANDATORY SIL 3-4)
  - **Consistent activity records** per 6.4.4.18 (MANDATORY)
  - **Non-conformity evaluation** per 6.4.4.19 (MANDATORY)
  - **Conclusion and recommendations** per 6.4.4.17 (MANDATORY)
  - **Compliance with Assessment Plan** per 6.4.4.17 (MANDATORY)
  
  **Non-Conformity Handling** (EN 50128 6.4.4.19):
  - Identify non-conformities with EN 50128 requirements
  - Evaluate each non-conformity
  - Judge impact on final result (SIL achievement, fitness for application)
  - List non-conformities and judgments in report
  - Provide recommendations for resolution
  
  **Reuse of Assessment Reports** (EN 50128 6.4.4.2):
  - Software with Assessment Report from another Assessor does not require new assessment
  - Current Assessor SHALL check software is fit for intended use in intended environment
  - Former assessment SHALL state software achieved SIL at least equal to required level
  
  **ASR Agent Responsibility**:
  - Record all assessment activities per 6.4.4.18
  - Assess software fitness for purpose per 6.4.4.8
  - Assess Annex A techniques per 6.4.4.9
  - Assess configuration and change management per 6.4.4.10
  - Assess staff competency per Annex B per 6.4.4.11
  - Assess safety-related application conditions per 6.4.4.12
  - Assess verification and validation activities per 6.4.4.13
  - Identify and evaluate non-conformities per 6.4.4.19
  - Judge impact on final result per 6.4.4.19
  - Provide conclusion and recommendations per 6.4.4.17
  - Meet Software Assessment Plan requirements per 6.4.4.17
  - Summarize activities in report per 6.4.4.18
  - List non-conformities and judgments per 6.4.4.19
  
  **VER Agent Responsibility**:
  - First check of Software Assessment Report
  - Verify report meets Assessment Plan requirements
  - Verify completeness per 6.4.4.17-6.4.4.19
  - Verify traceability to Assessment Plan
  - Verify consistency of findings and conclusion
  
  **Independence Requirements** (5.1.2.6 and 5.1.2.7):
  - Assessor not part of development team
  - Assessor not reporting to project management
  - Assessor has no financial interest in project outcome
  - Assessor maintains independence throughout lifecycle
  - Independence evidence documented
  
  **Assessment Report is FINAL**:
  - Once issued, Assessment Report is final document
  - Changes only via errata (corrections of factual errors)
  - No substantive changes after issuance
  - New assessment required for substantive changes
  
  **Relation to Other Deliverables**:
  - Input: Software Assessment Plan (DOC-045) per 6.4.4.17
  - Input: All deliverables per Table C.1
  - Input: System Safety Requirements Specification per 6.4.2
  - Input: Software Requirements Specification per 6.4.2
  - Verified by: VER agent (first check)
  - Approval: Final authority for software release per Section 6.4
