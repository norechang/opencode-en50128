# ===== Required Content Sections =====
required_content:
  - section: "src/"
    description: "C source files (.c) implementing design components"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "include/"
    description: "C header files (.h) with interfaces, data structures, constants"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "tests/"
    description: "Unit test code (component tests) using Unity or similar framework"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "Supporting Documentation"
    description: "Makefile, build instructions, code comments, Doxygen config"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]

# ===== Evidence Requirements =====
evidence_requirements:
  - evidence_id: "source-code-files"
    description: "Complete C source code files (.c, .h) under version control"
    mandatory_sil: 0
    source: "IMP agent code implementation"
    format: "C source files"
    storage_path: "src/, include/"
    automation_level: "manual"
    collect_on_agent_action: "implementation-complete"
    verification_criteria:
      - "All design components implemented"
      - "Code readable, understandable, testable (Section 7.5.4.3)"
      - "Code under configuration control (Section 7.5.4.4)"
      - "Code matches design specification"
  
  - evidence_id: "misra-c-compliance"
    description: "MISRA C:2012 compliance report (PC-lint, Cppcheck, or similar)"
    mandatory_sil: 2
    source: "PC-lint Plus, Cppcheck static analysis"
    format: "XML"
    storage_path: "evidence/static-analysis/misra-report.xml"
    automation_level: "automatic"
    collect_on_agent_action: "implementation-complete"
    verification_criteria:
      - "Zero mandatory violations (SIL 2+)"
      - "Zero required violations (SIL 3+)"
      - "Advisory violations documented and justified"
  
  - evidence_id: "complexity-metrics"
    description: "Cyclomatic complexity report showing all functions within limits"
    mandatory_sil: 1
    source: "Lizard complexity tool"
    format: "JSON"
    storage_path: "evidence/metrics/complexity.json"
    automation_level: "automatic"
    collect_on_agent_action: "implementation-complete"
    verification_criteria:
      - "All functions ≤ 10 (SIL 3-4)"
      - "All functions ≤ 15 (SIL 2)"
      - "All functions ≤ 20 (SIL 0-1)"
      - "Size and complexity balanced (Section 7.5.4.2)"
  
  - evidence_id: "static-analysis-report"
    description: "Static analysis report (Cppcheck, Clang Static Analyzer) showing no critical issues"
    mandatory_sil: 2
    source: "Cppcheck, Clang Static Analyzer"
    format: "XML"
    storage_path: "evidence/static-analysis/cppcheck-report.xml, evidence/static-analysis/clang-report.xml"
    automation_level: "automatic"
    collect_on_agent_action: "implementation-complete"
    verification_criteria:
      - "No critical or high severity issues"
      - "Medium/low issues documented and justified"
      - "Buffer overflow checks passed"
      - "NULL pointer checks passed"
  
  - evidence_id: "unit-test-code"
    description: "Unit test code (component tests) using Unity framework"
    mandatory_sil: 0
    source: "TST agent test implementation"
    format: "C source files"
    storage_path: "tests/unit/"
    automation_level: "semi-automatic"
    collect_on_agent_action: "testing-complete"
    verification_criteria:
      - "Test code for all components"
      - "Tests executable and passing"
      - "Test code also MISRA C compliant (SIL 3+)"
  
  - evidence_id: "test-coverage-report"
    description: "Code coverage report from gcov/lcov showing SIL-appropriate coverage"
    mandatory_sil: 1
    source: "gcov, lcov coverage tools"
    format: "HTML + JSON"
    storage_path: "evidence/coverage/lcov-report/"
    automation_level: "automatic"
    collect_on_agent_action: "testing-complete"
    verification_criteria:
      - "Statement coverage: 100% (SIL 3+), 90% (SIL 2), 80% (SIL 1)"
      - "Branch coverage: 100% (SIL 2+), 80% (SIL 1)"
      - "Condition coverage: 100% (SIL 3+)"
      - "MC/DC coverage: 100% (SIL 4) for safety-critical functions"
  
  - evidence_id: "build-artifacts"
    description: "Compiled binaries, object files, linker map files"
    mandatory_sil: 0
    source: "GCC compiler and linker"
    format: "Binary + map files"
    storage_path: "build/"
    automation_level: "automatic"
    collect_on_agent_action: "build-complete"
    verification_criteria:
      - "Clean build (no warnings with -Wall -Wextra)"
      - "Linker map shows memory layout"
      - "Binary reproducible from source"

# ===== Dependencies =====
depends_on:
  - deliverable_id: "DOC-010-SDS"
    reason: "Source code implements Software Design Specification per Section 7.5.4.1"
    dependency_type: "blocking"
  
  - deliverable_id: "DOC-020-COMPONENT-TEST-SPEC"
    reason: "Component Test Specification guides unit test implementation"
    dependency_type: "blocking"

feeds_into:
  - deliverable_id: "DOC-019-SOURCE-CODE-VER"
    reason: "Software Source Code Verification Report verifies source code (Section 7.5.4.8)"
  
  - deliverable_id: "DOC-021-COMPONENT-TEST-REPORT"
    reason: "Software Component Test Report documents testing of source code (Section 7.5.4.5)"
  
  - deliverable_id: "DOC-022-INTEGRATION-TEST-SPEC"
    reason: "Integration tests verify source code integration"

# ===== Verification Criteria =====
verification_criteria:
  completeness:
    - "All design components implemented"
    - "All component interfaces implemented"
    - "All unit tests implemented"
    - "Build system complete (Makefile, scripts)"
  
  correctness:
    - "Code implements design specification (Section 7.5.4.10a)"
    - "Coding standards correctly applied (Section 7.5.4.10c)"
    - "MISRA C compliance (zero violations SIL 3+)"
    - "Complexity within limits"
    - "Static analysis clean"
  
  consistency:
    - "Code consistent with design"
    - "Interfaces consistent with Software Interface Specification"
    - "Data structures consistent with design"
    - "Error handling consistent with design"
  
  traceability:
    - "All code traceable to design components"
    - "All code traceable to requirements"
    - "All unit tests traceable to design components"
    - "Traceability meets requirements (Section 7.5.4.10d)"

# ===== Configuration Management =====
configuration_management:
  baseline_required: true
  baseline_timing: "Before commencement of documented testing (Section 7.5.4.4)"
  change_control: "CCB approval required for all changes after baseline"
  version_control: "Git repository (src/, include/, tests/)"
  review_frequency: "At component completion or weekly during implementation"
  
  update_triggers:
    - "Design change impacting implementation"
    - "Requirements change impacting code"
    - "Defect fix"
    - "Code review finding"
    - "Static analysis issue"

