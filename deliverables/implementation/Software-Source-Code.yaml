# ===== Notes =====
notes: |
  Source code is MANDATORY for all SIL levels (EN 50128 Section 7.5).
  MISRA C:2012 MANDATORY for SIL 2+ (zero mandatory violations).
  Static allocation MANDATORY for SIL 2+ (no malloc/calloc/realloc/free).
  Cyclomatic complexity: ≤10 (SIL 3-4), ≤15 (SIL 2), ≤20 (SIL 0-1).
  Test coverage: Statement 100% (SIL 3+), Branch 100% (SIL 2+), Condition 100% (SIL 3+), MC/DC 100% (SIL 4).
  Code must be under configuration control BEFORE testing begins (Section 7.5.4.4).
  Source code verification addresses adequacy, technique use, coding standards, and traceability (Section 7.5.4.10).
