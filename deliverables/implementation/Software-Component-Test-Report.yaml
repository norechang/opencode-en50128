    mandatory_sil: 1
    source: "gcov/lcov, Bullseye Coverage"
    format: "HTML report + structured table in markdown"
    storage_path: "tests/coverage/index.html, deliverables/implementation/Software-Component-Test-Report.md Section 5"
    automation_level: "automatic"
    collect_on_agent_action: "/tst measure-coverage"
    verification_criteria:
