notes: |
  **Purpose**: The Component Test Report documents the execution and results of all component (unit) tests
  defined in the Component Test Specification. It provides evidence that all software modules have been
  thoroughly tested and meet quality criteria before integration.

  **Key Characteristics**:
  1. **Test Execution Evidence**: Documents actual test execution with pass/fail results
  2. **Coverage Evidence**: Provides coverage metrics (statement, branch, condition per SIL)
  3. **Defect Tracking**: Complete log of defects found, fixed, and re-tested
  4. **Quality Metrics**: Code quality metrics (complexity, MISRA C, static analysis)
  5. **Traceability**: Traces requirements → test cases → results
  6. **Pass/Fail Assessment**: Clear recommendation for integration

  **SIL-Specific Requirements**:
  - **SIL 0**: Basic test execution documentation
  - **SIL 1-2**: Coverage metrics (statement ≥60%, branch 100% for SIL 2)
  - **SIL 3-4**: 100% statement, branch, condition coverage + independent verification

  **Workflow**:
  1. TST executes all test cases from Component Test Specification
  2. TST measures coverage using gcov/lcov
  3. TST logs all defects with severity classification
  4. IMP fixes defects
  5. TST re-tests fixed defects
  6. VER analyzes uncovered code and justifies (SIL 2+)
  7. TST creates Component Test Report
  8. QUA reviews report for template compliance (1 pass, SIL 3-4)
  9. VER performs independent verification (SIL 3-4)
  10. QUA approves final report

  **Pass Criteria** (SIL 3-4):
  - All test cases executed: 100%
  - Test pass rate: ≥95%
  - Coverage: Statement 100%, Branch 100%, Condition 100%
  - Open defects: 0 critical, 0 high
  - MISRA C violations: 0 mandatory, 0 required
  - Cyclomatic complexity: ≤10 all functions
  - Independent verification: Complete

  **Critical Dependencies**:
  - Component Test Specification defines WHAT to test
  - Component Test Report documents RESULTS of testing
  - If test results FAIL, components must be reworked before integration
  - Report feeds into Source Code Verification Report as evidence

  **Template Compliance**:
  - Document ID format: DOC-021-COMP-TEST-REPORT-YYYY-NNN
  - Approvals section MUST include VER signature (SIL 3-4)
  - All sections from template MUST be present
  - Coverage tables MUST be populated with actual values
  - Defect log MUST show resolution status

  **Evidence Automation**:
  - Test execution results: AUTOMATIC (Unity/CUnit XML output)
  - Coverage metrics: AUTOMATIC (gcov/lcov HTML + XML)
  - Defect tracking: SEMI-AUTOMATIC (TST logs, tool tracks)
  - Quality metrics: AUTOMATIC (cppcheck, lizard, valgrind)
  - Traceability: AUTOMATIC (CM tool, parsing test IDs)
  - Pass/fail assessment: SEMI-AUTOMATIC (automated checks + TST judgment)
