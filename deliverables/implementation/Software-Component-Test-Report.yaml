evidence_requirements:
  - evidence_id: "test-execution-summary"
    description: "Summary of all test cases executed with pass/fail results"
    mandatory_sil: 0
    source: "TST agent, Unity/CUnit test framework"
    format: "Structured table in markdown with module, test suite, executed, passed, failed, blocked counts"
    storage_path: "deliverables/implementation/Software-Component-Test-Report.md"
    automation_level: "automatic"
    collect_on_agent_action: "/tst execute-component-tests"
    verification_criteria:
      - "All test cases from Component Test Specification executed"
      - "Pass/fail status recorded for each test case"
      - "Execution date recorded"
      - "Test environment documented"

  - evidence_id: "test-case-results-detailed"
    description: "Detailed results for each test case including inputs, expected results, actual results"
    mandatory_sil: 0
    source: "TST agent, test execution logs"
    format: "Structured section per test case with code blocks for inputs/outputs"
    storage_path: "deliverables/implementation/Software-Component-Test-Report.md Section 4"
    automation_level: "semi-automatic"
    collect_on_agent_action: "/tst execute-component-tests"
    verification_criteria:
      - "Test case ID matches Component Test Specification"
      - "Requirement ID traced"
      - "Expected result matches test specification"
      - "Actual result documented"
      - "Pass/fail status clear"

  - evidence_id: "coverage-report"
