# ===== Required Content Sections =====
required_content:
  - section: "1. Verification Summary"
    description: "Overall verification status, pass/fail, major findings"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "2. Identity and Configuration"
    description: "Items verified, verifier names, tool versions per Section 6.2.4.13a"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "3. Adequacy Verification"
    description: "Source code adequacy as implementation of design (Section 7.5.4.10a)"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "4. Technique Verification"
    description: "Correct use of techniques from Table A.4 (Section 7.5.4.10b)"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "5. Coding Standards Verification"
    description: "Correct application of coding standards (Section 7.5.4.10c)"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "6. Readability and Traceability Verification"
    description: "Code meets general requirements (Section 7.5.4.10d)"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "7. Component Test Report Verification"
    description: "Adequacy of test report as record of tests (Section 7.5.4.10e)"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "8. Static Analysis Results"
    description: "MISRA C, Cppcheck, Clang analysis results"
    mandatory_for: ["SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "9. Complexity Verification"
    description: "Cyclomatic complexity analysis results"
    mandatory_for: ["SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "10. Coverage Verification"
    description: "Test coverage results vs. SIL requirements"
    mandatory_for: ["SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "11. Non-Conformances"
    description: "Items not conforming to specifications (Section 6.2.4.13b)"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "12. Detected Errors and Deficiencies"
    description: "Errors or deficiencies found (Section 6.2.4.13d)"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]

# ===== Evidence Requirements =====
evidence_requirements:
  - evidence_id: "source-code-ver-report"
    description: "Complete verification report conforming to EN 50128 Section 7.5.4.8-7.5.4.10 and 6.2.4.13"
    mandatory_sil: 0
    source: "VER agent source code verification"
    format: "Markdown"
    storage_path: "docs/verification/Software-Source-Code-Verification-Report.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "verify-source-code"
    verification_criteria:
      - "All required sections present (Section 7.5.4.10, 6.2.4.13)"
      - "Adequacy of implementation verified"
      - "Coding standards application verified"
      - "Traceability verified"
      - "Component test report verified"
  
  - evidence_id: "static-analysis-evidence"
    description: "Static analysis tool reports (MISRA C, Cppcheck, Clang) referenced in verification report"
    mandatory_sil: 2
    source: "Static analysis tools execution by VER agent"
    format: "XML reports"
    storage_path: "evidence/static-analysis/"
    automation_level: "automatic"
    collect_on_agent_action: "verify-source-code"
    verification_criteria:
      - "MISRA C report shows zero mandatory violations (SIL 2+)"
      - "MISRA C report shows zero required violations (SIL 3+)"
      - "Cppcheck shows no critical issues"
      - "Clang shows no warnings"
  
  - evidence_id: "complexity-verification-evidence"
    description: "Complexity analysis results showing all functions within SIL limits"
    mandatory_sil: 1
    source: "Lizard tool execution by VER agent"
    format: "JSON"
    storage_path: "evidence/metrics/complexity-verified.json"
    automation_level: "automatic"
    collect_on_agent_action: "verify-source-code"
    verification_criteria:
      - "All functions within complexity limits"
      - "Complexity balanced (Section 7.5.4.2)"
  
  - evidence_id: "coverage-verification-evidence"
    description: "Coverage analysis results vs. SIL requirements"
    mandatory_sil: 1
    source: "gcov/lcov execution by TST/VER agent"
    format: "HTML + JSON"
    storage_path: "evidence/coverage/"
    automation_level: "automatic"
    collect_on_agent_action: "verify-source-code"
    verification_criteria:
      - "Coverage meets SIL requirements"
      - "Statement: 100% (SIL 3+), 90% (SIL 2), 80% (SIL 1)"
      - "Branch: 100% (SIL 2+), 80% (SIL 1)"
      - "Condition: 100% (SIL 3+)"
      - "MC/DC: 100% (SIL 4)"
  
  - evidence_id: "code-review-records"
    description: "Code review checklists and records per component"
    mandatory_sil: 1
    source: "QUA agent code review"
    format: "Markdown"
    storage_path: "evidence/reviews/code-reviews/"
    automation_level: "manual"
    collect_on_agent_action: "verify-source-code"
    verification_criteria:
      - "100% code review coverage"
      - "Independent reviewer (SIL 3+)"
      - "All review findings addressed"

