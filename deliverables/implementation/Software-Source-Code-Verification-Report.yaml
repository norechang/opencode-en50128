# ===== Verification Criteria =====
verification_criteria:
  completeness:
    - "All sections required by EN 50128 Section 7.5.4.10 and 6.2.4.13 present"
    - "All verification activities documented"
    - "All static analysis results included"
    - "All review records referenced"
  
  correctness:
    - "Verification addresses all Section 7.5.4.10 requirements (a-e)"
    - "Independent verifier (SIL 3+)"
    - "Static analysis MANDATORY applied (SIL 3+)"
    - "Coverage requirements verified"
  
  consistency:
    - "Findings consistent across analysis methods"
    - "Non-conformances properly documented"
    - "Deficiencies linked to corrective actions"
  
  traceability:
    - "All source code files verified"
    - "All verification activities traceable to requirements"
    - "All findings traceable to resolution"

