# ===== Notes =====
notes: |
  Source Code Verification Report is MANDATORY for all SIL levels (EN 50128 Section 7.5.4.8).
  Verification must address adequacy, techniques, coding standards, traceability, and test report (Section 7.5.4.10).
  Static Analysis is MANDATORY for SIL 3+ (Table A.19).
  Independent verifier MANDATORY for SIL 3-4.
  MISRA C compliance must be verified (zero mandatory violations SIL 2+, zero required violations SIL 3+).
  Coverage requirements must be verified: Statement 100% (SIL 3+), Branch 100% (SIL 2+), Condition 100% (SIL 3+), MC/DC 100% (SIL 4).
  Complexity limits must be verified: ≤10 (SIL 3-4), ≤15 (SIL 2), ≤20 (SIL 0-1).
  Report follows generic verification report format (Section 6.2.4.13).
