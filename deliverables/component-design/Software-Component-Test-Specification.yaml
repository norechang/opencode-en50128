# =============================================================================
# NOTES
# =============================================================================

notes: |
  CRITICAL INFORMATION:
  
  1. **Component Test Specification vs. Overall Test Specification**:
     - Component Test Specification: Unit-level tests (white-box, per SDS)
     - Overall Test Specification: System-level tests (black-box, per SRS)
     - Component tests use internal knowledge, Overall tests do not
  
  2. **SIL Requirements**:
     - SIL 0: Component Test Specification recommended (R)
     - SIL 1-2: Component Test Specification HIGHLY RECOMMENDED (HR)
     - SIL 3-4: Component Test Specification HIGHLY RECOMMENDED (HR)
     - Unit testing MANDATORY for SIL 3-4
     - Coverage: 100% statement, branch, condition (SIL 3-4)
  
  3. **Coverage Requirements** (Table A.21):
     - SIL 0: No mandatory coverage
     - SIL 1: Statement (HR), Branch (HR)
     - SIL 2: Statement (HR), Branch (MANDATORY)
     - SIL 3: Statement (M), Branch (M), Condition (M)
     - SIL 4: Statement (M), Branch (M), Condition (M), MC/DC (HR - treat as M)
  
  4. **White-Box Testing**:
     - Test cases use knowledge of internal implementation
     - Test specific code paths, branches, conditions
     - Test error handling (NULL checks, bounds checks)
     - Test all return values
     - Measure code coverage with gcov/lcov
  
  5. **Unit Test Structure**:
     - Test Case ID (UTC-XXX)
     - Traced SDS module/function (MOD-XXX / FUNC-YYY)
     - Purpose (what is being tested)
     - Inputs (parameters, globals, state)
     - Expected outputs (return value, side effects)
     - Pass criteria (success/failure conditions)
  
  6. **Boundary Value Analysis** (MANDATORY SIL 3-4):
     - Test minimum value
     - Test maximum value
     - Test just below minimum (error case)
     - Test just above maximum (error case)
     - Test typical value (middle of range)
  
  7. **Fault Injection Testing** (HR SIL 3-4):
     - Inject NULL pointers, verify error handling
     - Inject invalid parameters, verify rejection
     - Inject boundary overflows, verify detection
     - Inject error conditions, verify recovery
  
  8. **Test Frameworks for C**:
     - Unity (lightweight, embedded-friendly)
     - CUnit (full-featured)
     - Google Test (C++ but supports C)
     - Custom test harness
  
  9. **Coverage Tools**:
     - gcov: GNU coverage tool (generates .gcda files)
     - lcov: HTML report generator for gcov
     - Bullseye: Commercial coverage tool
     - mcdc_analyzer.py: Custom MC/DC analyzer (platform tool)
  
  10. **Relationship to Other Deliverables**:
      - SDS: Defines modules/functions, Component Test Specification tests them
      - Component Test Report: Executes tests from Component Test Specification
      - Source Code Verification Report: Uses Component Test Report as evidence
      - Overall Test Specification: System-level tests (different scope)
  
  11. **Agent Workflow**:
      - TST agent reads SDS (module/function designs)
      - TST agent creates Component Test Specification per 7.4.4.7-10
      - TST agent defines test cases for all functions
      - TST agent defines coverage targets per SIL level
      - TST agent defines fault injection tests (SIL 3-4)
      - VER agent reviews Component Test Specification (first check)
      - VAL agent reviews Component Test Specification (second check)
      - QA agent verifies template compliance
      - CM agent baselines Component Test Specification
  
  12. **Critical Success Factors**:
      - Created during Component Design phase (after SDS complete)
      - 100% module/function coverage for SIL 3-4
      - White-box approach (internal knowledge)
      - Coverage targets aligned with SIL level
      - Fault injection tests defined (SIL 3-4)
      - Baselined before implementation begins
  
  13. **Common Pitfalls**:
      - Using black-box approach (wrong test level)
      - Missing boundary value tests (MANDATORY SIL 3-4)
      - Missing fault injection tests (HR SIL 3-4)
      - Incomplete coverage targets (must specify statement, branch, condition)
      - Not baselining before implementation begins
      - Confusing with Overall Test Specification (different scope)
