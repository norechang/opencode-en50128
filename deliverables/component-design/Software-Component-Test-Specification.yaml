    description: "Unit test cases for all functions per 7.4.4.9"
    mandatory_sil: 1  # HR for SIL 1+
    source: "TST"
    format: "Section in Component Test Specification with test case table"
    storage_path: "docs/test/Component-Test-Specification.md"
    automation_level: "manual"
    collect_on_agent_action: "tst-create-component-test-spec"
    verification_criteria:
      - "Test cases for ALL functions defined"
      - "Each test case has unique ID (UTC-XXX)"
