notes: |
  **Purpose**: Verifies that Software Component Design (SDS) is complete, correct,
  traceable, and meets quality criteria.

  **Key Verifications**:
  - Design completeness (all architecture modules have detailed design)
  - Design quality (modularity, complexity, defensive programming)
  - Traceability (architecture → design, requirements → design)
  - Cyclomatic complexity within limits (≤10 SIL 3-4, ≤15 SIL 2)
  - Static allocation only (SIL 2+)
  - No recursion (SIL 3-4)

  **SIL-Specific Requirements**:
  - **SIL 0**: Optional
  - **SIL 1-2**: HIGHLY RECOMMENDED, traceability verification
  - **SIL 3-4**: MANDATORY, independent verification, complexity ≤10

  **Workflow**:
  1. DES creates Software Design Specification (SDS)
  2. VER reviews SDS for completeness
  3. VER verifies design quality (complexity, patterns)
  4. VER verifies traceability (architecture → design, requirements → design)
  5. VER identifies non-conformities
  6. DES resolves critical non-conformities
  7. VER creates Component Design Verification Report
  8. VAL approves verification report
