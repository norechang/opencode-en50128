# ===== Verification Criteria =====
verification_criteria:
  completeness:
    - "Author, configuration history and short description present (§7.4.4.2)"
    - "All lowest software units identified and traced to upper level (§7.4.4.3a)"
    - "Detailed interfaces with environment and other components specified (§7.4.4.3b)"
    - "SIL level stated with no further apportionment (§7.4.4.3c)"
    - "Detailed algorithms and data structures present (§7.4.4.3d)"
    - "Size and complexity balance addressed (§7.4.4.5)"
    - "Table A.4 technique selection and justification present (§7.4.4.6)"

  correctness:
    - "SCDS is self-consistent and sufficient to transform into code (§7.4.4.3 last paragraph)"
    - "Document is readable, understandable and testable (§7.4.4.4)"
    - "SIL level consistent with parent Software Design Specification entry"
    - "Complexity limits achievable at stated SIL"

  consistency:
    - "Component consistent with Software Design Specification (§7.4.4.13a)"
    - "Interfaces consistent with Software Interface Specifications"
    - "Data structures consistent with SRS data requirements"

  traceability:
    - "Component traced to Software Design Specification entry (§7.4.4.3a)"
    - "Software units within component traced to component (§7.4.4.3a)"
    - "Traceability to SRS requirements present (SIL 1+)"

# ===== Configuration Management =====
configuration_management:
  baseline_required: true
  baseline_timing: "After Component Design Verification (Phase 4 exit, Baseline 3)"
  change_control: "CCB approval required for all changes (impacts implementation)"
  version_control: "Git repository under docs/component-design/"
  review_frequency: "At implementation phase transitions or significant design changes"

  update_triggers:
    - "Software Design Specification change impacting component"
    - "Interface change affecting the component"
    - "SIL level change for the component"
    - "Coding standards change"
    - "Algorithm or data structure correction during implementation"

