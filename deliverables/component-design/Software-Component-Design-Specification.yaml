# ===== Required Content Sections =====
# Per EN 50128 §7.4.4.2–7.4.4.6: one SCDS document per component.
required_content:
  - section: "1. Document Header"
    description: |
      Author, configuration history (version, date, author, description of changes from previous
      version), and short description of the component. Required by §7.4.4.2.
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
    standard_clause: "7.4.4.2"

  - section: "2. Component Identification"
    description: |
      Unique identifier and name of the component. Traceability to the parent entry in the
      Software Design Specification (§7.4.4.3a). SIL level of the component with no further
      apportionment within the component (§7.4.4.3c).
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
    standard_clause: "7.4.4.3a, 7.4.4.3c"

  - section: "3. Software Units"
    description: |
      Identification of all lowest software units (subroutines, functions, procedures) that make up
      the component, each traced back to the component and to upper-level design (§7.4.4.3a).
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
    standard_clause: "7.4.4.3a"

  - section: "4. Interfaces"
    description: |
      Detailed interfaces of each software unit with its environment and with other components:
      all inputs and outputs with types, ranges, units and direction (§7.4.4.3b).
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
    standard_clause: "7.4.4.3b"

  - section: "5. Data Structures"
    description: |
      Detailed data structures used within the component: type definitions, memory layout,
      fixed-width types (MISRA C SIL 2+), absence of dynamic allocation (SIL 2+) (§7.4.4.3d).
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
    standard_clause: "7.4.4.3d"

  - section: "6. Algorithms"
    description: |
      Detailed algorithms for each software unit: control flow, sequencing, timing constraints,
      boundary conditions. Design shall be self-consistent and allow transforming into code
      (§7.4.4.3d, §7.4.4.3 last paragraph).
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
    standard_clause: "7.4.4.3d"

  - section: "7. Size and Complexity"
    description: |
      Statement that size and complexity of the component are balanced (§7.4.4.5). Include
      target cyclomatic complexity limits per SIL: ≤10 (SIL 3-4), ≤15 (SIL 2), ≤20 (SIL 0-1).
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
    standard_clause: "7.4.4.5"

  - section: "8. Techniques and Measures"
    description: |
      Selection of techniques and measures from Table A.4. The selected combination shall be
      justified as a set satisfying §4.8 and §4.9 (§7.4.4.6).
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
    standard_clause: "7.4.4.6"

  - section: "9. Traceability Matrix"
    description: |
      Traceability from this component to: (a) Software Design Specification entry,
      (b) Software Requirements Specification requirements, (c) software units within.
      Supports readability and traceability per §5.3.2.7–5.3.2.10 and §6.5.4.14–6.5.4.17.
    mandatory_for: ["SIL_1", "SIL_2", "SIL_3", "SIL_4"]
    standard_clause: "5.3.2.7, 6.5.4.14, 7.4.4.13b"

# ===== Evidence Requirements =====
evidence_requirements:
  - evidence_id: "scds-document"
    description: "Complete SCDS document per EN 50128 §7.4.4.1–7.4.4.6; one instance per component"
    mandatory_sil: 0
    source: "DES agent component design"
    format: "Markdown"
    storage_path: "docs/component-design/<component-name>/SCDS-<component-name>.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "component-design-complete"
    verification_criteria:
      - "All sections required by §7.4.4.2–7.4.4.6 present"
      - "Document is readable, understandable and testable (§7.4.4.4)"
      - "Technique combination justified per §4.8 and §4.9"

  - evidence_id: "component-traceability"
    description: "Traceability from component to Software Design Specification and to SRS"
    mandatory_sil: 1
    source: "DES agent traceability analysis"
    format: "CSV"
    storage_path: "evidence/traceability/design_to_component.csv"
    automation_level: "automatic"
    collect_on_agent_action: "component-design-complete"
    verification_criteria:
      - "Each component traces to at least one SDS entry"
      - "Each component traces to at least one SRS requirement"
      - "SIL level consistent with parent SDS entry"

  - evidence_id: "complexity-targets"
    description: "Statement of cyclomatic complexity targets per SIL level for the component"
    mandatory_sil: 0
    source: "DES agent design"
    format: "Embedded in SCDS Section 7"
    storage_path: "docs/component-design/<component-name>/SCDS-<component-name>.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "component-design-complete"
    verification_criteria:
      - "Complexity target ≤ 10 for SIL 3-4, ≤ 15 for SIL 2, ≤ 20 for SIL 0-1"

