# ===== Notes =====
notes: |
  SCDS is MANDATORY for all SIL levels (§7.4.4.1): one document per component.
  Written by the Designer on the basis of the Software Design Specification (§7.4.4.1).
  Content requirements §7.4.4.3(a–d) apply at all SIL levels.
  Document must be self-consistent and sufficient to transform into code (§7.4.4.3 last para).
  Must be readable, understandable and testable (§7.4.4.4).
  Size and complexity must be balanced (§7.4.4.5).
  Technique combination from Table A.4 must be justified per §4.8 and §4.9 (§7.4.4.6).
  Modular Approach is MANDATORY for SIL 1+ (Table A.4).
  Design and Coding Standards MANDATORY for SIL 3+ (Table A.4).
  MISRA C:2012 MANDATORY for SIL 2+ (project-specific, Table A.20).
  Cyclomatic complexity limits: ≤10 (SIL 3-4), ≤15 (SIL 2), ≤20 (SIL 0-1).
  Static allocation MANDATORY for SIL 2+ (no malloc/calloc/realloc/free).
  No recursion for SIL 3-4 (highly recommended per Table A.4).
