# ===== Notes =====
notes: |
  SDS is MANDATORY for all SIL levels (EN 50128 Section 7.3).
  Each component MUST have Component Design Specification and Component Test Specification (Section 7.3.4.22).
  Modular Approach is MANDATORY for SIL 2+ (Table A.4).
  Design and Coding Standards MANDATORY for SIL 3+ (Table A.4).
  MISRA C:2012 MANDATORY for SIL 2+ (project-specific requirement based on Table A.12).
  Cyclomatic complexity limits: ≤10 (SIL 3-4), ≤15 (SIL 2), ≤20 (SIL 0-1).
  Static allocation MANDATORY for SIL 2+ (no malloc/calloc/realloc/free).
  No recursion for SIL 3-4 (highly recommended).
  Techniques from Table A.4 must be justified per Section 4.8, 4.9 (Section 7.3.4.24).
  Coding standards must be referenced in SQAP (Section 7.3.4.27).
