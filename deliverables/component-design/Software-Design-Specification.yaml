# ===== Verification Criteria =====
verification_criteria:
  completeness:
    - "All sections required by EN 50128 Section 7.3.4.23 present"
    - "Component Design Specification for each component"
    - "Component Test Specification for each component"
    - "All techniques from Table A.4 justified"
    - "Coding standards defined and justified"
  
  correctness:
    - "Design supports required SIL level"
    - "Modular approach applied (MANDATORY SIL 2+)"
    - "Complexity limits achievable (design phase check)"
    - "Static allocation feasible (no dynamic memory SIL 2+)"
    - "Defensive programming patterns specified"
  
  consistency:
    - "Components consistent with architecture"
    - "SIL levels consistent across SRS/SAS/SDS"
    - "Interfaces consistent with Software Interface Specification"
    - "Data structures consistent with requirements"
    - "Algorithms consistent with functional requirements"
  
  traceability:
    - "All architectural components traceable to design components"
    - "All design components traceable to requirements"
    - "All design components have test specifications"

# ===== Configuration Management =====
configuration_management:
  baseline_required: true
  baseline_timing: "After Architecture and Design Verification (Phase 4 exit)"
  change_control: "CCB approval required for all changes (impacts implementation)"
  version_control: "Git repository under docs/design/"
  review_frequency: "At implementation phase transitions or significant design changes"
  
  update_triggers:
    - "Architecture change impacting component design"
    - "Requirements change impacting algorithms or data structures"
    - "SIL level change for component"
    - "Coding standards change"
    - "Interface change"

