# ===== Required Content Sections =====
required_content:
  - section: "1. Design Overview"
    description: "Component decomposition, design philosophy, coding standards reference"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "2. Component Design Specifications"
    description: "Per-component design: purpose, SIL level, interfaces, data structures, algorithms"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "3. Traceability to Architecture"
    description: "Traceability matrix: architectural components → design components → requirements"
    mandatory_for: ["SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "4. Component Interfaces"
    description: "External interfaces, inter-component interfaces, data flow"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "5. Data Structures"
    description: "Global data structures, component-local data, memory layout"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "6. Algorithms and Sequencing"
    description: "Main algorithms, control flow, sequencing, timing constraints"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "7. Error Reporting Mechanisms"
    description: "Error detection, error reporting, error handling strategy"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "8. Component Test Specifications"
    description: "Test specification for each component (unit test plan)"
    mandatory_for: ["SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "9. Coding Standards"
    description: "Reference to MISRA C:2012, project-specific rules, justifications"
    mandatory_for: ["SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "10. Technique Justification"
    description: "Justification of selected techniques from Table A.4 per Section 4.8, 4.9"
    mandatory_for: ["SIL_1", "SIL_2", "SIL_3", "SIL_4"]

# ===== Evidence Requirements =====
evidence_requirements:
  - evidence_id: "sds-document"
    description: "Complete SDS document conforming to EN 50128 Section 7.3.4.20-7.3.4.24"
    mandatory_sil: 0
    source: "DES agent component design"
    format: "Markdown"
    storage_path: "docs/design/SDS.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "design-complete"
    verification_criteria:
      - "All required sections present (Section 7.3.4.23)"
      - "Component Design Specification per component"
      - "Component Test Specification per component"
      - "Techniques justified from Table A.4 (Section 7.3.4.24)"
  
  - evidence_id: "component-traceability"
    description: "Traceability matrix from architecture components to design components to requirements"
    mandatory_sil: 1
    source: "DES agent traceability analysis"
    format: "CSV"
    storage_path: "evidence/traceability/architecture_to_design.csv"
    automation_level: "automatic"
    collect_on_agent_action: "design-complete"
    verification_criteria:
      - "All architectural components traced to design components"
      - "All design components traced to requirements"
      - "SIL level consistent across architecture/design/requirements"
  
  - evidence_id: "coding-standards-document"
    description: "Coding standards document (MISRA C:2012 + project rules) per Section 7.3.4.25-7.3.4.27"
    mandatory_sil: 1
    source: "DES agent + QUA agent coding standards definition"
    format: "Markdown"
    storage_path: "docs/standards/Coding-Standards.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "design-complete"
    verification_criteria:
      - "MISRA C:2012 referenced (MANDATORY SIL 2+)"
      - "Good programming practices defined (Table A.12)"
      - "Error detection measures specified"
      - "Source code documentation procedures defined"
      - "Selection justified per Section 7.3.4.26"
  
  - evidence_id: "complexity-analysis"
    description: "Cyclomatic complexity analysis showing all functions within SIL-appropriate thresholds"
    mandatory_sil: 2
    source: "Lizard complexity tool"
    format: "JSON"
    storage_path: "evidence/metrics/complexity-design.json"
    automation_level: "automatic"
    collect_on_agent_action: "design-complete"
    verification_criteria:
      - "All functions ≤ 10 (SIL 3-4), ≤ 15 (SIL 2), ≤ 20 (SIL 0-1)"
      - "Design supports complexity limits"
  
  - evidence_id: "component-test-specifications"
    description: "Component Test Specification for each component per Section 7.3.4.22"
    mandatory_sil: 1
    source: "TST agent test specification"
    format: "Markdown"
    storage_path: "docs/design/SDS.md (Section 8), tests/component-tests/"
    automation_level: "semi-automatic"
    collect_on_agent_action: "design-complete"
    verification_criteria:
      - "Test specification exists for each component"
      - "Test cases traceable to component requirements"
      - "Coverage targets specified per SIL level"

