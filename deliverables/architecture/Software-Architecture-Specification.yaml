# ===== Notes =====
notes: |
  SAS is MANDATORY for all SIL levels (EN 50128 Section 7.3).
  Modular Approach is MANDATORY for SIL 2+ (Table A.3).
  Pre-existing software (PESS) failure analysis MANDATORY for SIL 3-4 (Section 7.3.4.7c).
  Independence evidence MANDATORY for mixed-SIL components OR treat all as highest SIL (Section 7.3.4.9).
  SAS must be traceable back to SRS (Section 7.3.4.10b).
  Techniques from Table A.3 must be justified per Section 4.8, 4.9 (Section 7.3.4.14).
  Size and complexity of architecture shall be balanced (Section 7.3.4.15).
