notes: |
  **Purpose**: Specifies test cases for integrating software with target hardware platform,
  including device drivers, BSP, and hardware interfaces.

  **Key Focus**:
  - Hardware interface testing (GPIO, UART, SPI, I2C, CAN, etc.)
  - Device driver testing
  - Board Support Package (BSP) testing
  - Performance on target hardware (timing, resource usage)
  - Hardware fault injection (power glitches, signal errors)

  **SIL-Specific Requirements**:
  - **SIL 0-1**: Hardware interface testing, basic performance
  - **SIL 2**: 100% hardware interface coverage, performance testing, fault injection
  - **SIL 3-4**: All SIL 2 + independent review, rigorous fault injection, WCET testing

  **Workflow**:
  1. INT reviews architecture specification (hardware platform)
  2. INT identifies all hardware interfaces
  3. INT defines integration strategy (incremental recommended)
  4. INT creates test cases for each hardware interface
  5. INT defines driver/BSP test cases
  6. INT defines performance test cases on target hardware
  7. INT defines hardware fault injection test cases
  8. VER reviews test specification for completeness
  9. VAL approves test specification
