# =============================================================================
# EVIDENCE REQUIREMENTS
# =============================================================================
# Evidence required to demonstrate Architecture/Design Verification Report completeness

evidence_requirements:
  - evidence_id: "arch-design-ver-completeness-check"
    description: "Architecture and design completeness verification per 7.3.4.21"
    mandatory_sil: 1  # HR for SIL 1+
    source: "VER"
    format: "Section in Architecture/Design Verification Report"
    storage_path: "docs/reports/Architecture-Design-Verification-Report.md"
    automation_level: "manual"
    collect_on_agent_action: "ver-verify-architecture-design"
    verification_criteria:
      - "All SRS requirements addressed in architecture (SAS)"
      - "All architecture components detailed in design (SDS)"
      - "All interfaces specified (Interface Specifications)"
      - "All safety requirements addressed in architecture"
      - "All performance requirements addressed in architecture"
      - "Missing architecture/design elements identified"

  - evidence_id: "arch-design-ver-modularity-check"
    description: "Modularity verification (MANDATORY SIL 2+)"
    mandatory_sil: 2  # MANDATORY for SIL 2+
    source: "VER"
    format: "Section in Architecture/Design Verification Report with modularity assessment"
    storage_path: "docs/reports/Architecture-Design-Verification-Report.md"
    automation_level: "manual"
    collect_on_agent_action: "ver-verify-architecture-design"
    verification_criteria:
      - "Modular Approach applied (MANDATORY SIL 2+)"
      - "Software divided into modules with clear boundaries"
      - "Module cohesion high (single responsibility)"
      - "Module coupling low (minimal dependencies)"
      - "Information encapsulation applied (HR SIL 2+)"
      - "Module interfaces fully defined"

  - evidence_id: "arch-design-ver-complexity-check"
    description: "Complexity verification (MANDATORY SIL 3-4)"
    mandatory_sil: 3  # MANDATORY for SIL 3-4
    source: "VER"
    format: "Section in Architecture/Design Verification Report with complexity metrics"
    storage_path: "docs/reports/Architecture-Design-Verification-Report.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "ver-verify-architecture-design"
    verification_criteria:
      - "Cyclomatic complexity assessed for all modules"
      - "Complexity threshold: ≤10 (SIL 3-4), ≤15 (SIL 2)"
      - "No recursion (HR SIL 3-4)"
      - "All functions single-purpose (low complexity)"
      - "Control flow simple and analyzable"

  - evidence_id: "arch-design-ver-traceability-check"
    description: "Traceability verification (MANDATORY SIL 3-4)"
    mandatory_sil: 3  # MANDATORY for SIL 3-4, HR for SIL 1-2
    source: "VER"
    format: "Section in Architecture/Design Verification Report with traceability analysis"
    storage_path: "docs/reports/Architecture-Design-Verification-Report.md"
    automation_level: "semi-automatic"
    collect_on_agent_action: "ver-verify-architecture-design"
    verification_criteria:
      - "Forward traceability complete (SRS → SAS → SDS)"
      - "Backward traceability complete (SDS → SAS → SRS)"
      - "All SRS requirements trace to architecture components"
      - "All architecture components trace to design modules"
      - "All design modules trace to SRS requirements"
      - "Orphan design elements identified (no parent requirement)"
      - "Traceability matrix reviewed and approved"

  - evidence_id: "arch-design-ver-techniques-check"
    description: "EN 50128 architecture/design techniques verification per Table A.3"
    mandatory_sil: 1  # HR for SIL 1+
    source: "VER"
    format: "Section in Architecture/Design Verification Report"
    storage_path: "docs/reports/Architecture-Design-Verification-Report.md"
    automation_level: "manual"
    collect_on_agent_action: "ver-verify-architecture-design"
    verification_criteria:
      - "All mandatory techniques applied for target SIL level"
      - "Structured methodology applied (MANDATORY SIL 3-4)"
      - "Modular Approach applied (MANDATORY SIL 2+)"
      - "Defensive programming considered (HR SIL 2+)"
      - "Fully Defined Interface applied (HR all SIL)"
      - "Information encapsulation applied (HR SIL 2+)"
      - "Techniques documented in SAS and SDS"

  - evidence_id: "arch-design-ver-report-approval"
    description: "Architecture/Design Verification Report approved by VAL and VMGR (SIL 3-4)"
    mandatory_sil: 1  # HR for SIL 1+
    source: "VER"
    format: "Approvals section in Architecture/Design Verification Report"
    storage_path: "docs/reports/Architecture-Design-Verification-Report.md"
    automation_level: "manual"
    collect_on_agent_action: "ver-verify-architecture-design"
    verification_criteria:
      - "Document has version 1.0 or higher"
      - "Approvals section complete (VER author, QA, VAL second check, PM)"
      - "Independent Verifier approval present (SIL 3-4)"
      - "V&V Manager approval present (SIL 3-4)"
      - "Verification result clearly stated (PASS/FAIL/CONDITIONAL)"
      - "All findings documented and addressed"

# =============================================================================
# DEPENDENCIES
# =============================================================================

depends_on:
  - deliverable_id: "DOC-009-SAS"
    reason: "SAS is subject of verification"
    dependency_type: "blocking"

  - deliverable_id: "DOC-010-SDS"
    reason: "SDS is subject of verification"
    dependency_type: "blocking"

  - deliverable_id: "DOC-011-SOFTWARE-INTERFACE-SPEC"
    reason: "Interface Specifications are subject of verification"
    dependency_type: "blocking"

  - deliverable_id: "DOC-004-SVP"
    reason: "SVP defines verification approach"
    dependency_type: "blocking"

  - deliverable_id: "DOC-006-SRS"
    reason: "SRS provides requirements for traceability verification"
    dependency_type: "informational"

feeds_into:
  - deliverable_id: "DOC-018-SOURCE-CODE"
    reason: "Architecture/design verification must pass before implementation begins"

  - deliverable_id: "DOC-025-VALIDATION-REPORT"
    reason: "Provides architecture/design verification evidence"

# =============================================================================
# VERIFICATION CRITERIA
# =============================================================================

verification_criteria:
  completeness:
    - "All sections of Architecture/Design Verification Report template completed per 7.3.4.21"
    - "All SAS components reviewed for completeness"
    - "All SDS modules reviewed for completeness"
    - "All Interface Specifications reviewed"
    - "Traceability verification complete (SRS → SAS → SDS)"
    - "Modularity assessment complete (MANDATORY SIL 2+)"
    - "Complexity assessment complete (MANDATORY SIL 3-4)"
    - "All EN 50128 Table A.3 techniques verified"
    - "All findings documented with severity and status"
    - "Verification decision stated (PASS/FAIL/CONDITIONAL)"

  correctness:
    - "Verification activities correct per SVP verification plan"
    - "Modularity criteria correct (high cohesion, low coupling)"
    - "Complexity criteria correct (≤10 SIL 3-4, ≤15 SIL 2)"
    - "Traceability analysis correct (all requirements traced)"
    - "EN 50128 Table A.3 technique assessment correct"
    - "Independent verification performed (SIL 3-4)"
    - "Findings accurately reflect architecture/design issues"

  consistency:
    - "Verification approach consistent with SVP"
    - "Modularity criteria consistent across all modules"
    - "Complexity thresholds consistent with SIL requirements"
    - "Traceability format consistent with SCMP"
    - "Findings classification consistent (critical/major/minor)"
    - "Verification result consistent with findings"

  traceability:
    - "Forward traceability: SVP verification criteria → Verification Report activities"
    - "Forward traceability: Verification Report findings → SAS/SDS updates"
    - "Backward traceability: Verification Report → SVP verification plan"
    - "References to SAS/SDS sections in findings"
    - "References to EN 50128 Table A.3 techniques present"

