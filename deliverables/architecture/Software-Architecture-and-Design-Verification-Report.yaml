# =============================================================================
# NOTES
# =============================================================================

notes: |
  CRITICAL INFORMATION:
  
  1. **Purpose of Architecture and Design Verification Report**:
     - Verify SAS completeness and correctness
     - Verify SDS completeness and correctness
     - Verify Interface Specifications completeness
     - Verify traceability (SRS → SAS → SDS)
     - Verify modularity (MANDATORY SIL 2+)
     - Verify complexity (MANDATORY SIL 3-4)
     - Provide independent verification evidence (SIL 3-4)
  
  2. **SIL Requirements**:
     - SIL 0: Architecture/design verification recommended (R)
     - SIL 1-2: Architecture/Design Verification Report HIGHLY RECOMMENDED (HR)
     - SIL 3-4: Architecture/Design Verification Report HIGHLY RECOMMENDED (HR)
     - Independent verification MANDATORY for SIL 3-4
     - Traceability verification MANDATORY for SIL 3-4
     - Modularity verification MANDATORY for SIL 2+
     - Complexity verification MANDATORY for SIL 3-4
  
  3. **Verification Activities** (per 7.3.4.21):
     a) Completeness: All SRS requirements addressed in architecture/design
     b) Consistency: Architecture and design consistent with each other
     c) Techniques: EN 50128 Table A.3 techniques applied
     d) Traceability: SRS → SAS → SDS
     e) Interfaces: Interface Specifications adequacy
  
  4. **Modularity Verification** (MANDATORY SIL 2+):
     - Modular Approach applied (Table A.3)
     - Software divided into modules with clear boundaries
     - High cohesion (module does one thing well)
     - Low coupling (minimal dependencies between modules)
     - Information encapsulation (module internals hidden)
     - Module interfaces fully defined
  
  5. **Complexity Verification** (MANDATORY SIL 3-4):
     - Cyclomatic complexity ≤10 (SIL 3-4), ≤15 (SIL 2)
     - No recursion (HR SIL 3-4)
     - Single-purpose functions
     - Simple control flow
     - Tool: Lizard complexity analyzer
  
  6. **Independence Requirements** (SIL 3-4):
     - Verifier SHALL NOT be Designer (Section 5.3.5.10)
     - Organizational independence required (separate reporting line)
     - Personnel independence required (different individuals)
     - V&V Manager approval required (platform extension role)
  
  7. **Verification Result**:
     - PASS: All criteria met, no critical findings
     - FAIL: Critical findings prevent implementation phase
     - CONDITIONAL: Minor findings, can proceed with action plan
  
  8. **Findings Classification**:
     - Critical: Blocks phase transition (missing modules, modularity violations, complexity violations)
     - Major: Should be fixed before transition (traceability gaps, design issues)
     - Minor: Should be fixed eventually (documentation issues)
  
  9. **Traceability Verification**:
     - Forward: SRS → SAS → SDS (all requirements covered)
     - Backward: SDS → SAS → SRS (no orphans)
     - Traceability matrix reviewed line by line
     - 100% traceability MANDATORY for SIL 3-4
  
  10. **Relationship to Other Deliverables**:
      - SAS: Subject of verification
      - SDS: Subject of verification
      - Interface Specifications: Subject of verification
      - SVP: Defines verification approach
      - SRS: Provides requirements for traceability
      - Source Code: Cannot begin until architecture/design verification passes
      - Validation Report: Uses Architecture/Design Verification Report as evidence
  
  11. **Agent Workflow**:
      - DES agent creates SAS, SDS, Interface Specifications
      - DES agent submits to VER for verification
      - VER agent reads SVP to understand verification criteria
      - VER agent performs verification activities per 7.3.4.21
      - VER agent assesses modularity (MANDATORY SIL 2+)
      - VER agent assesses complexity (MANDATORY SIL 3-4)
      - VER agent creates Architecture/Design Verification Report
      - VER agent submits report to QA for template compliance check
      - QA agent reviews report (one pass only)
      - VER agent submits report to VAL for second check (SIL 3-4)
      - VAL/VMGR approves or rejects report
      - If PASS: COD authorizes transition to Phase 5 (Implementation)
      - If FAIL: DES agent fixes SAS/SDS, VER re-verifies
  
  12. **Critical Success Factors**:
      - Independence preserved (SIL 3-4)
      - All SAS components and SDS modules reviewed individually
      - Modularity verified (MANDATORY SIL 2+)
      - Complexity verified ≤10 (MANDATORY SIL 3-4)
      - Traceability 100% complete (SIL 3-4)
      - Verification decision clear (PASS/FAIL/CONDITIONAL)
      - Findings actionable with clear remediation
      - Report approved before implementation begins
  
  13. **Common Pitfalls**:
      - Not checking modularity (MANDATORY SIL 2+)
      - Not checking complexity (MANDATORY SIL 3-4)
      - Not verifying traceability completeness (missing requirements)
      - Incomplete independence (same person as Designer for SIL 3-4)
      - Ambiguous verification decision (unclear PASS/FAIL)
      - Not documenting findings (issues not captured)
      - Allowing implementation to begin before architecture/design verification passes
