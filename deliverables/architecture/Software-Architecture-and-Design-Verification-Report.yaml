# Software Architecture and Design Verification Report - Deliverable Metadata
# EN 50128:2011 Section 7.3.4.20-21, Section 7.4.4.12-13, Section 6.2.4.12-13, Table C.1
# This file defines the metadata, requirements, evidence, and verification criteria
# for the Software Architecture and Design Verification Report deliverable.

deliverable_id: "DOC-012-ARCHITECTURE-DESIGN-VER"
number: 12
name: "Software Architecture and Design Verification Report"
abbreviation: "Arch/Des Ver Rpt"
phase: "architecture"
standard_section: "7.3.4.20"
written_by: "VER"
first_check: "NONE"
