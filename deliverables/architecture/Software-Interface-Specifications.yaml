# =============================================================================
# NOTES
# =============================================================================

notes: |
  CRITICAL INFORMATION:
  
  1. **Purpose of Software Interface Specifications**:
     - Define all internal interfaces (module-to-module)
     - Define all external interfaces (system boundaries)
     - Define all hardware-software interfaces (HAL)
     - Specify data structures, protocols, and timing
     - Provide complete interface contracts for implementation
  
  2. **SIL Requirements**:
     - SIL 0: Interface specifications recommended (R)
     - SIL 1-2: Interface Specifications HIGHLY RECOMMENDED (HR)
     - SIL 3-4: Interface Specifications HIGHLY RECOMMENDED (HR)
     - Fully Defined Interface HIGHLY RECOMMENDED for ALL SIL levels
     - Modular Approach MANDATORY for SIL 2+
     - 100% interface coverage MANDATORY for SIL 3-4
  
  3. **Interface Description Requirements** (per 7.3.4.19):
     a) Data to be exchanged (type, format, range, units)
     b) Data exchange mechanisms (parameters, global data, messages)
     c) Protocols and sequences (order, handshaking)
     d) Timing considerations (delays, timeouts, response times)
     e) Data flow (direction, source, destination)
  
  4. **C Language Interface Patterns**:
     - Use fixed-width types: uint8_t, uint16_t, uint32_t (not int, long)
     - Use struct for complex data structures
     - Use enum for state machines and error codes
     - Use const for read-only parameters
     - Use static for module-local functions (encapsulation)
     - Define function prototypes in .h header files
     - Document all parameters and return values
  
  5. **Fully Defined Interface** (Table A.3, D.23):
     - Every interface completely specified (no ambiguity)
     - All parameters documented (type, range, units)
     - All return values documented (success, error codes)
     - All preconditions documented (input validation)
     - All postconditions documented (outputs, side effects)
     - All error handling documented (error codes, failure modes)
  
  6. **Information Encapsulation** (Table A.3, D.33):
     - Module internals hidden from other modules
     - Public interface clearly separated from private implementation
     - Use static keyword for internal functions and data
     - Minimize global data (use getters/setters)
     - Opaque pointers for data structures (hide implementation)
  
  7. **Modular Approach** (MANDATORY SIL 2+):
     - Software divided into modules with clear boundaries
     - Each module has defined responsibilities
     - Inter-module dependencies minimized
     - Modules testable independently
     - Interfaces documented in Interface Specifications
  
  8. **Interface Types**:
     - Internal interfaces: Module A ↔ Module B (function calls, shared data)
     - External interfaces: Software ↔ External System (protocols, messages)
     - Hardware interfaces: Software ↔ Hardware (registers, interrupts, I/O)
  
  9. **Static Allocation Constraint** (SIL 2+):
     - No dynamic memory allocation (malloc/free)
     - All data structures statically allocated
     - Array sizes known at compile time
     - No variable-length arrays
     - Interface Specifications must reflect static allocation
  
  10. **Relationship to Other Deliverables**:
      - SAS: Defines architecture, Interface Specifications define interfaces between components
      - SRS: Defines interface requirements, Interface Specifications implement requirements
      - SDS: Uses Interface Specifications as contracts for component implementation
      - Source Code: Implements function prototypes from Interface Specifications
      - Integration Test Specification: Tests interfaces per Interface Specifications
  
  11. **Agent Workflow**:
      - DES agent reads SAS (architecture) and SRS (requirements)
      - DES agent identifies all interfaces (internal, external, hardware)
      - DES agent creates Interface Specifications per 7.3.4.18-19
      - DES agent defines data structures with C fixed-width types
      - DES agent defines function prototypes
      - VER agent reviews Interface Specifications (first check)
      - VAL agent reviews Interface Specifications (second check)
      - QA agent verifies template compliance
      - CM agent baselines Interface Specifications after approvals
  
  12. **Critical Success Factors**:
      - Created during Architecture phase (after SAS complete)
      - 100% interface coverage for SIL 3-4
      - Fully defined interfaces (no ambiguity)
      - C language compliance (fixed-width types, static allocation)
      - Information encapsulation (modular boundaries)
      - Traceability to SAS and SRS
      - Baselined before Component Design begins
  
  13. **Common Pitfalls**:
      - Using non-standard C types (int, long instead of uint8_t, uint32_t)
      - Ambiguous parameter descriptions (missing range, units)
      - Missing error handling (no error codes defined)
      - Missing timing constraints (delays, timeouts not specified)
      - Dynamic allocation in interfaces (violates SIL 2+ constraint)
      - Incomplete encapsulation (exposing internal implementation)
      - Not baselining before implementation begins
