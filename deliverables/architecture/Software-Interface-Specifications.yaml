    description: "Internal software interfaces documented per 7.3.4.18"
    mandatory_sil: 1  # HR for SIL 1+
    source: "DES"
    format: "Section in Interface Specifications with interface table"
    storage_path: "docs/design/Software-Interface-Specifications.md"
    automation_level: "manual"
    collect_on_agent_action: "des-create-interface-specs"
    verification_criteria:
      - "All internal module-to-module interfaces documented"
      - "Each interface has unique ID (IF-XXX)"
      - "Each interface specifies: source module, target module, data exchanged, protocol"
      - "Data structures defined with C types (uint8_t, uint16_t, struct, enum)"
      - "Function prototypes defined with return types and parameters"
      - "Error handling defined for each interface"

  - evidence_id: "interface-spec-external-interfaces"
    description: "External system interfaces documented per 7.3.4.18"
    mandatory_sil: 1  # HR for SIL 1+
    source: "DES"
    format: "Section in Interface Specifications with external interface table"
    storage_path: "docs/design/Software-Interface-Specifications.md"
    automation_level: "manual"
    collect_on_agent_action: "des-create-interface-specs"
    verification_criteria:
      - "All external system interfaces documented"
