    verification_criteria:
      - "All hardware-software interfaces documented"
      - "Hardware Abstraction Layer (HAL) defined"
      - "Register access functions defined"
      - "Interrupt handling defined"
      - "Memory-mapped I/O defined"
      - "Hardware initialization sequence defined"

  - evidence_id: "interface-spec-data-structures"
