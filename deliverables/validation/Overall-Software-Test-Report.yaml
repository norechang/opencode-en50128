# ===== Required Content Sections =====
required_content:
  - section: "1. Introduction"
    description: "Purpose, scope, definitions"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "2. Test Configuration"
    description: "Software under test, test environment, test team"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "3. Test Execution Summary"
    description: "Overall test statistics by category and priority"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "4. Detailed Test Results"
    description: "Functional, performance, operational scenario, boundary, regression, acceptance test results"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "5. Coverage Analysis"
    description: "Code coverage and requirements coverage"
    mandatory_for: ["SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "6. Defect Summary"
    description: "Defects found, detailed defect list, open defects, defect metrics"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "7. Test Entry and Exit Criteria"
    description: "Entry criteria verification and exit criteria verification"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "8. Test Environment Issues"
    description: "Issues encountered during testing"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "9. Lessons Learned"
    description: "What went well, what could be improved, recommendations"
    mandatory_for: ["SIL_1", "SIL_2", "SIL_3", "SIL_4"]
  
  - section: "10. Conclusion and Recommendation"
    description: "Test summary, validation decision, project manager recommendation"
    mandatory_for: ["SIL_0", "SIL_1", "SIL_2", "SIL_3", "SIL_4"]

