# ===== Notes =====
notes: |
  **Purpose**: The Overall Software Test Report documents the execution and results of system-level
  validation testing as defined in the Overall Software Test Specification. It provides evidence that
  the complete integrated software meets all requirements and is fit for its intended application.

  **Key Characteristics**:
  1. **System-Level Focus**: Tests complete software system (not individual components)
  2. **Black-Box Testing**: Validates requirements without internal structure knowledge (MANDATORY SIL 3+)
  3. **Performance Validation**: Timing, resource usage, throughput (MANDATORY SIL 3+)
  4. **Operational Scenarios**: Real-world usage scenarios in target or simulated environment
  5. **Acceptance Testing**: Customer/validator acceptance criteria validation
  6. **Release Decision**: Provides evidence for software release approval

  **SIL-Specific Requirements**:
  - **SIL 0-1**: Functional testing, operational scenarios, ≥80-85% test pass rate
  - **SIL 2**: Functional + performance testing, boundary testing, 100% branch coverage, ≥90% pass rate
  - **SIL 3-4**: Functional (M), Performance (M), Independent Validator (M), 100% requirements coverage,
    100% statement/branch/condition coverage, ≥95% pass rate, zero open defects

  **Workflow**:
  1. TST executes all test cases from Overall Software Test Specification
  2. TST measures system-level coverage
  3. TST performs performance testing (timing, memory, throughput)
  4. TST tests operational scenarios in target environment
  5. TST logs all defects with severity classification
  6. IMP fixes defects, TST re-tests
  7. TST creates Overall Software Test Report
  8. QUA reviews report for template compliance (1 pass, SIL 3-4)
  9. VER performs independent verification (SIL 3-4)
  10. VAL reviews test results and makes release decision (SIL 3-4: independent)
  11. VAL signs validation approval (or rejection)

  **Pass Criteria** (SIL 3-4):
  - All test cases executed: 100%
  - Test pass rate: ≥95%
  - Coverage: Statement 100%, Branch 100%, Condition 100%
  - Requirements coverage: 100%
  - Open defects: 0 critical, 0 high
  - Performance requirements: All met
  - Independent validation: Complete with approval

  **Critical Dependencies**:
  - Overall Software Test Specification defines WHAT to test at system level
  - Overall Software Test Report documents RESULTS of system-level testing
  - Integration Test Report must show PASS before overall testing begins
  - If overall test results FAIL, software SHALL NOT be released
  - Report feeds into Software Validation Report as primary validation evidence

  **Validation Decision**:
  - Validator (independent for SIL 3-4) reviews test report
  - Validator makes APPROVE / DO NOT APPROVE / CONDITIONAL APPROVAL decision
  - Decision based on objective evidence (test results, coverage, defects, performance)
  - Software only released after validator authorization (EN 50128 Section 6.3.4.16)

  **Template Compliance**:
  - Document ID format: DOC-026-OVERALL-TEST-REPORT-YYYY-NNN
  - Approvals section MUST include VAL signature (all SILs), independent for SIL 3-4
  - All sections from template MUST be present
  - Coverage tables MUST be populated with actual system-level values
  - Performance data MUST be included (SIL 2+)
  - Validation decision MUST be documented

  **Evidence Automation**:
  - Test execution results: SEMI-AUTOMATIC (system tests often manual or semi-automated)
  - Coverage metrics: AUTOMATIC (gcov/lcov at system level)
  - Performance measurements: SEMI-AUTOMATIC (profiling tools + manual analysis)
  - Defect tracking: SEMI-AUTOMATIC (TST logs, tool tracks)
  - Requirements traceability: AUTOMATIC (CM tool parsing)
  - Validation decision: MANUAL (Validator judgment based on evidence)

  **Key Difference from Component Test Report**:
  - Component Test Report: Unit-level testing (white-box, individual modules)
  - Overall Software Test Report: System-level validation (black-box, complete software)
  - Component testing focuses on CODE correctness
  - Overall testing focuses on REQUIREMENTS validation and system fitness
