# ===== Notes =====
notes: |
  Software Validation Report is MANDATORY for all SIL levels (EN 50128 Section 6.3.4.2).
  Independent validator MANDATORY for SIL 3-4 (Section 6.3.4.1).
  Functional and Black-box Testing MANDATORY for SIL 3+ (Table A.7).
  Performance Testing MANDATORY for SIL 3+ (Table A.7).
  Validator must check verification process completeness (Section 6.3.4.9).
  Software baseline must be fully stated (Section 6.3.4.10).
  Known deficiencies and impact must be identified (Section 6.3.4.11).
  Software only released after validator authorization (Section 6.3.4.16).
  Validator empowered to require additional reviews, analyses, tests (Section 6.3.4.15).
  Validation demonstrates software is of defined SIL and fit for application (Section 6.3.1.1).
