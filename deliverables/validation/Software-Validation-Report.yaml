  baseline_timing: "After validation complete and release authorized"
  change_control: "CCB approval required for validation report changes"
  version_control: "Git repository under docs/validation/"
  review_frequency: "At software release or major change"
  
  update_triggers:
    - "Software re-validation after significant change"
    - "New deficiency discovered post-release"
    - "Validation plan change"
    - "Additional validation activities performed"

