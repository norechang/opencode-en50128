# Clang Static Analyzer
# EN 50128 Tool Catalog Entry

id: clang
name: Clang Static Analyzer
origin: third_party
category: static_analysis
tcl: T2
version: "18.x"
location: "system (/usr/bin/clang, /usr/bin/scan-build)"
en50128_ref: "Table A.19 (Static Analysis — mandatory SIL 3-4), Section 6.7.4.3"
mandatory_by_sil:
  sil_0: recommended
  sil_1: recommended
  sil_2: highly_recommended
  sil_3: mandatory
  sil_4: mandatory
agents: [VER, IMP, QUA]
key_flags:
  sil_3: "scan-build -o analysis_results make | clang --analyze -Xanalyzer -analyzer-output=text"
  sil_2: "scan-build make"
qualification_status:
  status: to_be_provided
  notes: >
    T2 tool: static analysis output reviewed by VER agent. Used as second independent
    static analyzer alongside Cppcheck (both mandatory for SIL 3-4 — multiple
    analyzers required per Table A.19 interpretation). Validation test suite
    required covering: dead code, use-after-free, null dereference, memory leaks,
    API misuse. Normative T2 minimum: §6.7.4.3 (obtain spec/manual) +
    §6.7.4.10/§6.7.4.11 (CM/version control). A Tool Validation Report in
    §6.7.4.5 format is produced as a project policy extension per §6.7.4.4 Note 2
    (not a §6.7.4.5 normative obligation for T2 tools). Project policy mandates
    TVR at SIL 3-4. Required before ISA evaluation.
  evidence_path: "deliverables/tools/Clang-Tool-Validation-Report.md"
  template_path: "deliverables/tools/Tool-Validation-Report-template.md"
  supplier_evidence: null
  validation_suite_path: "tools/tool-validation/clang/"
