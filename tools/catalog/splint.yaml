# Splint — Static Checker
# EN 50128 Tool Catalog Entry

id: splint
name: Splint Static Checker
origin: third_party
category: static_analysis
tcl: T1
version: "3.1.x"
location: "system (/usr/bin/splint) — optional"
en50128_ref: "Table A.19 (Static Analysis), Section 6.7.4.2"
mandatory_by_sil:
  sil_0: recommended
  sil_1: recommended
  sil_2: recommended
  sil_3: recommended
  sil_4: recommended
agents: [VER, IMP]
key_flags:
  standard: "splint +posixlib src/*.c"
  strict:   "splint +checks src/*.c"
installation: "sudo apt-get install splint"
qualification_status:
  status: not_required
  notes: >
    T1 tool: Splint output is reviewed by VER/IMP agents as supplementary static
    analysis. Used in addition to mandatory tools (Cppcheck, Clang) — its output
    is never the sole basis for a compliance decision. No formal qualification
    required per EN 50128 Section 6.7.4.2. Classification rationale: supplementary
    role with human review of all findings.
  evidence_path: null
  supplier_evidence: null
  validation_suite_path: null
