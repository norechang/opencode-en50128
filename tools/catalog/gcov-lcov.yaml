# gcov + lcov — Coverage Measurement
# EN 50128 Tool Catalog Entry

id: gcov-lcov
name: gcov / lcov Coverage Tools
origin: third_party
category: coverage_analysis
tcl: T2
version:
  gcov: "13.3.0"
  lcov: "1.16"
location:
  gcov: "system (/usr/bin/gcov)"
  lcov: "system (/usr/bin/lcov, /usr/bin/genhtml)"
en50128_ref: "Table A.21 (Test Coverage — mandatory SIL 2-4), Section 6.7.4.3"
mandatory_by_sil:
  sil_0: recommended
  sil_1: recommended
  sil_2: mandatory
  sil_3: mandatory
  sil_4: mandatory
agents: [TST, VER, VAL]
key_flags:
  compile: "-fprofile-arcs -ftest-coverage"
  capture: "lcov --capture --directory . --output-file coverage.info"
  filter:  "lcov --remove coverage.info '*/test/*' '*/unity/*' --output-file coverage.info"
  report:  "genhtml coverage.info --output-directory coverage_html"
  check:   "lcov --summary coverage.info"
coverage_thresholds:
  sil_2:   {statement: highly_recommended, branch: mandatory}
  sil_3_4: {statement: mandatory, branch: mandatory, condition: mandatory}
qualification_status:
  status: to_be_provided
  notes: >
    T2 tools: coverage verdicts (statement %, branch %) are used directly in SIL
    gate decisions. No independent verification of the coverage measurement itself.
    Validation test suite required for gcov and lcov separately, covering:
    instrumented vs uninstrumented comparison, branch coverage accuracy, function
    coverage, known-coverage reference programs. Normative T2 minimum: §6.7.4.3
    (obtain spec/manual) + §6.7.4.10/§6.7.4.11 (CM/version control). A Tool
    Validation Report in §6.7.4.5 format is produced as a project policy extension
    per §6.7.4.4 Note 2 (not a §6.7.4.5 normative obligation for T2 tools).
    Project policy mandates TVR at SIL 3-4. Required before ISA evaluation.
  evidence_path: "deliverables/tools/GcovLcov-Tool-Validation-Report.md"
  template_path: "deliverables/tools/Tool-Validation-Report-template.md"
  supplier_evidence: null
  validation_suite_path: "tools/tool-validation/gcov/"
