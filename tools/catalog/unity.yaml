  template_path: "deliverables/tools/Tool-Validation-Report-template.md"
  supplier_evidence: >
    Unity is a widely-used, open-source C unit test framework specifically designed
    for embedded and safety-critical software. Maintained by ThrowTheSwitch.org.
    Extensive community validation and usage in safety-critical contexts.
  validation_suite_path: "tools/tool-validation/unity/"
